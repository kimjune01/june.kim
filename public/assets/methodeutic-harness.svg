<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 718" style="font-family: 'SF Mono', 'Fira Code', monospace;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="718" rx="12" fill="url(#bg)"/>

  <!-- Per-instance pipeline group -->
  <rect x="30" y="25" width="640" height="585" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="44" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">METHODEUTIC HARNESS PER INSTANCE</text>

  <!-- ============ INQUIRE ============ -->
  <rect x="140" y="60" width="300" height="78" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="93" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">INQUIRE</text>
  <text x="290" y="114" fill="#475569" font-size="11" text-anchor="middle">Propose hypotheses + kill conditions</text>

  <!-- BLIND-BLIND PUSHOUT (vertical inset) -->
  <rect x="480" y="60" width="160" height="96" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="560" y="78" fill="#64748b" font-size="10" font-weight="700" text-anchor="middle">Blind-blind pushout</text>
  <rect x="500" y="86" width="120" height="22" rx="4" fill="#f1f5f9" stroke="#334155" stroke-width="0.8"/>
  <text x="560" y="101" fill="#334155" font-size="10" text-anchor="middle">Model A</text>
  <rect x="500" y="112" width="120" height="22" rx="4" fill="#f1f5f9" stroke="#334155" stroke-width="0.8"/>
  <text x="560" y="127" fill="#334155" font-size="10" text-anchor="middle">Model B</text>
  <text x="560" y="149" fill="#64748b" font-size="9" font-weight="600" text-anchor="middle">→ merge on disagreement</text>
  <line x1="480" y1="99" x2="440" y2="99" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-thin)"/>

  <!-- arrow INQUIRE → GRAPH -->
  <line x1="290" y1="138" x2="290" y2="161" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="155" fill="#64748b" font-size="9">write</text>

  <!-- ============ HYPOTHESIS GRAPH (store; left-to-right tree echoing §application) ============ -->
  <rect x="140" y="166" width="300" height="72" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="290" y="186" fill="#10b981" font-size="13" font-weight="700" text-anchor="middle">Hypothesis graph</text>
  <!-- smem label inline with mini left-to-right tree -->
  <text x="205" y="217" fill="#64748b" font-size="9" text-anchor="middle" font-style="italic">smem</text>
  <path d="M 250 214 L 305 200 M 250 214 L 305 214 M 250 214 L 305 228 M 305 228 L 360 228" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.6"/>
  <circle cx="250" cy="214" r="6" fill="#94a3b8"/>
  <circle cx="305" cy="200" r="5" fill="#f59e0b"/>
  <circle cx="305" cy="214" r="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="305" cy="228" r="5" fill="#10b981"/>
  <circle cx="360" cy="228" r="5" fill="#3b82f6"/>

  <!-- arrow GRAPH → IMPLEMENT -->
  <line x1="290" y1="238" x2="290" y2="261" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="255" fill="#64748b" font-size="9">read</text>

  <!-- ============ IMPLEMENT ============ -->
  <rect x="140" y="266" width="300" height="78" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="299" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">IMPLEMENT</text>
  <text x="290" y="320" fill="#475569" font-size="11" text-anchor="middle">Derive patch + adversarial check</text>

  <!-- CHALLENGER inset -->
  <rect x="480" y="285" width="160" height="48" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="560" y="303" fill="#64748b" font-size="10" font-weight="700" text-anchor="middle">Challenger</text>
  <text x="560" y="320" fill="#475569" font-size="9" text-anchor="middle">cross-family critique</text>
  <line x1="480" y1="309" x2="440" y2="309" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-thin)"/>

  <!-- arrow IMPLEMENT → ATTEST -->
  <line x1="290" y1="344" x2="290" y2="367" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="361" fill="#64748b" font-size="9">patch</text>

  <!-- ============ ATTEST ============ -->
  <rect x="140" y="372" width="300" height="78" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="405" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">ATTEST</text>
  <text x="290" y="426" fill="#475569" font-size="11" text-anchor="middle">Run tests + binary verdict</text>

  <!-- writeback ATTEST → GRAPH (curves around left interior) -->
  <path d="M 140 412 Q 92 412 92 290 Q 92 202 140 202" stroke="#10b981" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)" opacity="0.7"/>
  <text x="84" y="305" fill="#10b981" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(-90 84 305)">writeback: kill / witness verdict</text>

  <!-- arrow ATTEST → GATE -->
  <line x1="290" y1="450" x2="290" y2="473" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="467" fill="#64748b" font-size="9">verdict + route</text>

  <!-- ============ GATE ============ -->
  <rect x="140" y="478" width="300" height="106" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="290" y="500" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">GATE</text>
  <text x="290" y="516" fill="#64748b" font-size="10" text-anchor="middle" font-style="italic">deterministic · no model</text>
  <line x1="170" y1="528" x2="410" y2="528" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="170" y="544" fill="#475569" font-size="10">→ continue-into-implement</text>
  <text x="170" y="560" fill="#475569" font-size="10">→ re-enter-inquire</text>
  <text x="170" y="576" fill="#475569" font-size="10">→ terminate-success / budget</text>

  <!-- Outer loop: GATE → INQUIRE (down left margin) -->
  <path d="M 140 531 L 50 531 L 50 99 L 140 99" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow-loop)"/>
  <text x="42" y="305" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(-90 42 305)">outer loop · re-enter-inquire with updated graph</text>

  <!-- ============ CAPTURE → PROVENANCE ============ -->
  <line x1="290" y1="610" x2="290" y2="636" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="627" fill="#334155" font-size="9">Capture</text>

  <!-- Provenance artifact -->
  <rect x="90" y="639" width="520" height="70" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="350" y="665" fill="#475569" font-size="13" font-weight="700" text-anchor="middle">Artifact</text>
  <text x="350" y="683" fill="#475569" font-size="10" text-anchor="middle">trajectories · hypothesis graph · captured diff</text>
  <text x="350" y="698" fill="#475569" font-size="10" text-anchor="middle">gate trace · grader output · cost ledger</text>
</svg>
