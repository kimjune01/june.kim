<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 850" style="font-family: 'SF Mono', 'Fira Code', monospace;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="850" rx="12" fill="url(#bg)"/>

  <!-- Per-instance pipeline group -->
  <rect x="30" y="25" width="700" height="720" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="44" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">PER-INSTANCE INQUIRY LOOP</text>

  <!-- ============ INQUIRE ============ -->
  <rect x="140" y="60" width="300" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="95" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">INQUIRE</text>
  <text x="290" y="116" fill="#475569" font-size="11" text-anchor="middle">Propose hypotheses + kill conditions</text>

  <!-- BLIND-BLIND PUSHOUT (inset right of RECON) -->
  <rect x="480" y="62" width="240" height="76" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="80" fill="#64748b" font-size="10" font-weight="700" text-anchor="middle">BLIND-BLIND PUSHOUT</text>
  <rect x="500" y="90" width="80" height="26" rx="4" fill="#f1f5f9" stroke="#334155" stroke-width="0.8"/>
  <text x="540" y="108" fill="#334155" font-size="10" text-anchor="middle">Model A</text>
  <rect x="620" y="90" width="80" height="26" rx="4" fill="#f1f5f9" stroke="#334155" stroke-width="0.8"/>
  <text x="660" y="108" fill="#334155" font-size="10" text-anchor="middle">Model B</text>
  <text x="600" y="131" fill="#64748b" font-size="9" font-weight="600" text-anchor="middle">→ merge on disagreement</text>
  <line x1="480" y1="100" x2="440" y2="100" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-thin)"/>

  <!-- arrow RECON → GRAPH -->
  <line x1="290" y1="140" x2="290" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="158" fill="#64748b" font-size="9">write</text>

  <!-- ============ HYPOTHESIS GRAPH ============ -->
  <rect x="140" y="170" width="300" height="180" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="290" y="190" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle">HYPOTHESIS GRAPH</text>
  <text x="290" y="205" fill="#64748b" font-size="9" text-anchor="middle" font-style="italic">smem · Pearl × credence × trajectory shape</text>

  <!-- Graph nodes (typed: A=abduction, D=deduction, I=induction) -->
  <circle cx="195" cy="245" r="11" fill="#3b82f6" opacity="0.85"/>
  <text x="195" y="249" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">A</text>
  <circle cx="255" cy="227" r="11" fill="#3b82f6" opacity="0.85"/>
  <text x="255" y="231" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">A</text>
  <circle cx="255" cy="280" r="11" fill="#3b82f6" opacity="0.85"/>
  <text x="255" y="284" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">A</text>
  <circle cx="320" cy="245" r="11" fill="#0ea5e9" opacity="0.85"/>
  <text x="320" y="249" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">D</text>
  <circle cx="320" cy="298" r="11" fill="#0ea5e9" opacity="0.85"/>
  <text x="320" y="302" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">D</text>
  <circle cx="380" cy="270" r="11" fill="#10b981" opacity="0.85"/>
  <text x="380" y="274" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">I</text>
  <!-- killed node -->
  <circle cx="205" cy="303" r="11" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <text x="205" y="307" fill="#94a3b8" font-size="10" font-weight="700" text-anchor="middle">✕</text>

  <!-- Edges -->
  <path d="M 195 245 L 255 227 M 195 245 L 255 280 M 255 227 L 320 245 M 255 280 L 320 245 M 255 280 L 320 298 M 320 245 L 380 270 M 320 298 L 380 270 M 205 303 L 255 280" stroke="#10b981" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Legend inside graph -->
  <text x="155" y="328" fill="#475569" font-size="9">A abduction · D deduction · I induction · ✕ killed</text>
  <text x="155" y="342" fill="#475569" font-size="9">edges carry kill predicates · trajectory shape</text>

  <!-- arrow GRAPH → CRAFT -->
  <line x1="290" y1="350" x2="290" y2="375" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="368" fill="#64748b" font-size="9">read</text>

  <!-- ============ IMPLEMENT ============ -->
  <rect x="140" y="380" width="300" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="415" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">IMPLEMENT</text>
  <text x="290" y="436" fill="#475569" font-size="11" text-anchor="middle">Derive patch + adversarial check</text>

  <!-- CHALLENGER inset -->
  <rect x="480" y="395" width="240" height="50" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="413" fill="#64748b" font-size="10" font-weight="700" text-anchor="middle">CHALLENGER</text>
  <text x="600" y="430" fill="#475569" font-size="9" text-anchor="middle">cross-family critique</text>
  <line x1="480" y1="420" x2="440" y2="420" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-thin)"/>

  <!-- arrow CRAFT → AUDIT -->
  <line x1="290" y1="460" x2="290" y2="485" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="478" fill="#64748b" font-size="9">patch</text>

  <!-- ============ ATTEST ============ -->
  <rect x="140" y="490" width="300" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="525" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">ATTEST</text>
  <text x="290" y="546" fill="#475569" font-size="11" text-anchor="middle">Official harness + trajectory shape</text>

  <!-- SHAPE CLASSIFIER inset -->
  <rect x="480" y="505" width="240" height="50" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="600" y="523" fill="#64748b" font-size="10" font-weight="700" text-anchor="middle">SHAPE CLASSIFIER</text>
  <text x="600" y="540" fill="#475569" font-size="9" text-anchor="middle">conv / div / osc / chaotic</text>
  <line x1="480" y1="530" x2="440" y2="530" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-thin)"/>

  <!-- writeback AUDIT → GRAPH (curves around left interior) -->
  <path d="M 140 530 Q 90 530 90 380 Q 90 260 140 260" stroke="#10b981" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)" opacity="0.7"/>
  <text x="82" y="390" fill="#10b981" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(-90 82 390)">writeback: kill / witness verdict</text>

  <!-- arrow AUDIT → GATE -->
  <line x1="290" y1="570" x2="290" y2="595" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="588" fill="#64748b" font-size="9">shape</text>

  <!-- ============ GATE ============ -->
  <rect x="140" y="600" width="300" height="125" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="290" y="624" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">GATE</text>
  <text x="290" y="640" fill="#64748b" font-size="10" text-anchor="middle" font-style="italic">deterministic</text>
  <text x="290" y="659" fill="#475569" font-size="10" text-anchor="middle">shape × budget × attempt × closure</text>
  <line x1="170" y1="671" x2="410" y2="671" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="170" y="687" fill="#475569" font-size="10">→ continue-into-implement</text>
  <text x="170" y="702" fill="#475569" font-size="10">→ re-enter-inquire</text>
  <text x="170" y="717" fill="#475569" font-size="10">→ terminate-success / budget</text>

  <!-- Outer loop: GATE → RECON (down left margin) -->
  <path d="M 140 665 L 50 665 L 50 100 L 140 100" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow-loop)"/>
  <text x="42" y="385" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(-90 42 385)">outer loop · re-enter-inquire with updated graph</text>

  <!-- ============ CAPTURE → PROVENANCE ============ -->
  <line x1="290" y1="745" x2="290" y2="772" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="762" fill="#334155" font-size="9">CAPTURE (off-box, polling)</text>

  <!-- Provenance artifact -->
  <rect x="80" y="775" width="600" height="65" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="380" y="798" fill="#475569" font-size="13" font-weight="700" text-anchor="middle">PROVENANCE ARTIFACT</text>
  <text x="380" y="815" fill="#475569" font-size="10" text-anchor="middle">trajectories · hypothesis graph · captured diff · gate trace · grader output · cost ledger</text>
  <text x="380" y="831" fill="#94a3b8" font-size="9" text-anchor="middle" font-style="italic">frozen by git tag · cited per scored run</text>
</svg>
