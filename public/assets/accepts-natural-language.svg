<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 638" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="638" fill="#fafafa" rx="4"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Natural Language ↔ Spec</text>

  <!-- Left column: Email as written -->
  <rect x="20" y="58" width="320" height="472" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" stroke-opacity="0.3"/>
  <text x="180" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#666">Email (what agents read)</text>

  <!-- Subject line -->
  <rect x="32" y="104" width="296" height="50" rx="4" fill="#eef3f8" stroke="#7a9ab8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="44" y="125" font-size="12" font-weight="600" fill="#2266aa">Subject:</text>
  <text x="104" y="125" font-size="12" fill="#444">METHODS | USDC on Base, $8</text>
  <text x="44" y="145" font-size="10" fill="#2266aa">← protocol type</text>
  <text x="200" y="145" font-size="10" fill="#999">← human summary</text>

  <!-- Body: natural language -->
  <rect x="32" y="174" width="296" height="108" rx="4" fill="#eef5f0" stroke="#6a9a78" stroke-width="1" stroke-opacity="0.3"/>
  <text x="44" y="198" font-size="12" fill="#444">I sell books. $8 each, $12 for any two.</text>
  <text x="44" y="220" font-size="12" fill="#444">Pay in USDC on Base (0x4a7F...)</text>
  <text x="44" y="242" font-size="12" fill="#444">or SOL on Solana (7kQ3...).</text>
  <text x="44" y="270" font-size="10" fill="#2a8044">↑ no JSON = accepts_natural_language: true</text>

  <!-- Body: structured fields -->
  <rect x="32" y="306" width="296" height="32" rx="4" fill="#f2eef5" stroke="#8a7a9a" stroke-width="1" stroke-opacity="0.3"/>
  <text x="180" y="327" text-anchor="middle" font-size="11" font-weight="500" fill="#7044aa">— or with JSON, when precision matters —</text>

  <rect x="32" y="358" width="296" height="160" rx="4" fill="#f5f0eb" stroke="#a08060" stroke-width="1" stroke-opacity="0.3"/>
  <text x="44" y="384" font-size="12" font-weight="600" fill="#b05800">ORDER body (prepaid):</text>
  <text x="44" y="412" font-size="12" font-family="monospace" fill="#444">"amount": "12000000"</text>
  <text x="44" y="436" font-size="12" font-family="monospace" fill="#444">"token": "USDC"</text>
  <text x="44" y="460" font-size="12" font-family="monospace" fill="#444">"chain": "base"</text>
  <text x="44" y="484" font-size="12" font-family="monospace" fill="#444">"proof": {"tx": "0x9c4e..."}</text>
  <text x="44" y="508" font-size="10" fill="#b05800">↑ amounts + proofs are always exact</text>

  <!-- Right column: What's structured vs free -->
  <rect x="380" y="58" width="320" height="388" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#666">Spec (what's required)</text>

  <!-- Protocol layer -->
  <rect x="392" y="104" width="296" height="78" rx="4" fill="#eef3f8" stroke="#7a9ab8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#2266aa">Subject line = routing</text>
  <text x="540" y="152" text-anchor="middle" font-size="12" fill="#666">9 keywords. Always structured.</text>
  <text x="540" y="174" text-anchor="middle" font-size="12" fill="#666">WHICH · METHODS · ORDER · INVOICE</text>

  <!-- Natural language layer -->
  <rect x="392" y="206" width="296" height="96" rx="4" fill="#eef5f0" stroke="#6a9a78" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#2a8044">Body = conversation</text>
  <text x="540" y="262" text-anchor="middle" font-size="12" fill="#666">Tasks, descriptions, recommendations.</text>
  <text x="540" y="286" text-anchor="middle" font-size="12" fill="#666">Natural language when both sides speak it.</text>

  <!-- Arrows connecting layers -->
  <line x1="328" y1="130" x2="388" y2="130" stroke="#7a9ab8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="328" y1="228" x2="388" y2="248" stroke="#6a9a78" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Settlement layer -->
  <rect x="392" y="326" width="296" height="112" rx="4" fill="#f5f0eb" stroke="#a08060" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#b05800">Settlement = exact</text>
  <text x="540" y="382" text-anchor="middle" font-size="12" fill="#666">Amounts, wallets, proofs, chain IDs.</text>
  <text x="540" y="406" text-anchor="middle" font-size="12" fill="#666">Always JSON. Cryptographic verification</text>
  <text x="540" y="428" text-anchor="middle" font-size="12" fill="#666">needs exact values, not conversation.</text>

  <line x1="328" y1="436" x2="388" y2="382" stroke="#a08060" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OOPS: spans both columns -->
  <rect x="20" y="546" width="680" height="72" rx="4" fill="#f5eeee" stroke="#a07070" stroke-width="1" stroke-opacity="0.3"/>
  <text x="360" y="572" text-anchor="middle" font-size="13" font-weight="600" fill="#bb3333">OOPS = both</text>
  <text x="360" y="596" text-anchor="middle" font-size="12" fill="#666">note tells a human. error tells a machine. Silence is always valid.</text>
  <text x="360" y="612" text-anchor="middle" font-size="11" fill="#999">No message requires a response. OOPS is a courtesy.</text>
</svg>
