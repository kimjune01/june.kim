<svg viewBox="0 0 500 245" xmlns="http://www.w3.org/2000/svg" style="font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;">

  <!-- Central perturbation node -->
  <circle cx="250" cy="50" r="32" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="46" text-anchor="middle" fill="#222" font-size="9">Spike</text>
  <text x="250" y="57" text-anchor="middle" fill="#222" font-size="9">traffic</text>

  <!-- Four branches -->

  <!-- 1. Convergence (far left) -->
  <line x1="222" y1="72" x2="80" y2="130" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="30" y="130" width="100" height="22" rx="4" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="144" text-anchor="middle" fill="#222" font-size="8">Add server</text>
  <text x="80" y="164" text-anchor="middle" fill="#22c55e" font-size="7" font-weight="bold">convergent</text>
  <text x="80" y="176" text-anchor="middle" fill="#222" font-size="6">load balances,</text>
  <text x="80" y="185" text-anchor="middle" fill="#222" font-size="6">latency settles</text>

  <!-- 2. Divergence (center left) -->
  <line x1="240" y1="78" x2="190" y2="130" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="140" y="130" width="100" height="22" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="144" text-anchor="middle" fill="#222" font-size="8">DB replica lags</text>
  <text x="190" y="164" text-anchor="middle" fill="#ef4444" font-size="7" font-weight="bold">divergent</text>
  <text x="190" y="176" text-anchor="middle" fill="#222" font-size="6">cascade failure,</text>
  <text x="190" y="185" text-anchor="middle" fill="#222" font-size="6">pools exhaust</text>

  <!-- 3. Oscillation (center right) -->
  <line x1="260" y1="78" x2="310" y2="130" stroke="#f59e0b" stroke-width="1.2"/>
  <rect x="260" y="130" width="100" height="22" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="310" y="144" text-anchor="middle" fill="#222" font-size="8">Autoscaler fires</text>
  <text x="310" y="164" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="bold">oscillatory</text>
  <text x="310" y="176" text-anchor="middle" fill="#222" font-size="6">pods up/down,</text>
  <text x="310" y="185" text-anchor="middle" fill="#222" font-size="6">thrashing</text>

  <!-- 4. Chaos (far right) -->
  <line x1="278" y1="72" x2="420" y2="130" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="370" y="130" width="100" height="22" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="420" y="144" text-anchor="middle" fill="#222" font-size="8">Retry storm</text>
  <text x="420" y="164" text-anchor="middle" fill="#8b5cf6" font-size="7" font-weight="bold">chaotic</text>
  <text x="420" y="176" text-anchor="middle" fill="#222" font-size="6">aperiodic cascade,</text>
  <text x="420" y="185" text-anchor="middle" fill="#222" font-size="6">GC pause → storm</text>

  <!-- Next perturbations (hypothesis edges from each) -->

  <!-- From convergence -->
  <line x1="80" y1="192" x2="80" y2="220" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="80" y="232" text-anchor="middle" fill="#222" font-size="6">test another node</text>

  <!-- From divergence -->
  <line x1="170" y1="192" x2="160" y2="215" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="160" y="226" text-anchor="middle" fill="#222" font-size="6">test primary DB</text>
  <line x1="210" y1="192" x2="220" y2="225" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="220" y="236" text-anchor="middle" fill="#222" font-size="6">test pool limits</text>

  <!-- From oscillation -->
  <line x1="290" y1="192" x2="280" y2="215" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="280" y="226" text-anchor="middle" fill="#222" font-size="6">tune cooldown</text>
  <line x1="330" y1="192" x2="340" y2="225" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="340" y="236" text-anchor="middle" fill="#222" font-size="6">test damping</text>

  <!-- From chaos -->
  <line x1="400" y1="192" x2="390" y2="215" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="390" y="226" text-anchor="middle" fill="#222" font-size="6">isolate service</text>
  <line x1="440" y1="192" x2="450" y2="225" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="236" text-anchor="middle" fill="#222" font-size="6">disable retries</text>

</svg>