<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="system-ui, sans-serif">
  <style>
    .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; fill: #2e7d32; }
    .codebg { fill: #f5f5f5; stroke: #ddd; stroke-width: 1; rx: 4; }
    .val-box { fill: #fafafa; stroke: #999; stroke-width: 1; rx: 4; }
    .fn-box { fill: #fff; stroke: #2e7d32; stroke-width: 1.5; rx: 6; stroke-dasharray: 4,3; }
    .val { font-family: ui-monospace, monospace; font-size: 13px; fill: #333; text-anchor: middle; }
    .vlabel { font-size: 10px; fill: #888; font-style: italic; text-anchor: middle; }
    .arrow { stroke: #2e7d32; stroke-width: 1.5; fill: none; marker-end: url(#a-fn); }
  </style>
  <defs>
    <marker id="a-fn" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect class="codebg" x="140" y="10" width="320" height="72"/>
  <text class="code" x="155" y="30">transfer state amt =</text>
  <text class="code" x="155" y="48">  state { alice.bal = alice.bal − amt,</text>
  <text class="code" x="155" y="66">          bob.bal   = bob.bal   + amt }</text>

  <text class="vlabel" x="75" y="108">input value</text>
  <rect class="val-box" x="20" y="118" width="110" height="56"/>
  <text class="val" x="75" y="140">{Alice: 500,</text>
  <text class="val" x="75" y="160">Bob: 200}</text>

  <line class="arrow" x1="135" y1="146" x2="210" y2="146"/>

  <rect class="fn-box" x="215" y="121" width="170" height="50"/>
  <text class="val" x="300" y="143" style="fill:#2e7d32">transfer s 100</text>
  <text class="vlabel" x="300" y="161">pure function</text>

  <line class="arrow" x1="390" y1="146" x2="465" y2="146"/>

  <text class="vlabel" x="525" y="108">output value</text>
  <rect class="val-box" x="470" y="118" width="110" height="56"/>
  <text class="val" x="525" y="140">{Alice: 400,</text>
  <text class="val" x="525" y="160">Bob: 300}</text>
</svg>
