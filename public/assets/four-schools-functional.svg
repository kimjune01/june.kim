<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 290" font-family="system-ui, sans-serif">
  <style>
    .title { font-size: 14px; font-weight: 600; fill: #333; text-anchor: middle; }
    .subtitle { font-size: 11px; fill: #888; text-anchor: middle; font-style: italic; }
    .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; fill: #2e7d32; }
    .codebg { fill: #f5f5f5; stroke: #ddd; stroke-width: 1; rx: 4; }
    .val-box { fill: #fafafa; stroke: #999; stroke-width: 1; rx: 4; }
    .fn-box { fill: #fff; stroke: #2e7d32; stroke-width: 1.5; rx: 6; stroke-dasharray: 4,3; }
    .label { font-size: 11px; fill: #555; text-anchor: middle; }
    .val { font-family: ui-monospace, monospace; font-size: 13px; fill: #333; text-anchor: middle; }
    .vlabel { font-size: 10px; fill: #888; font-style: italic; text-anchor: middle; }
    .arrow { stroke: #2e7d32; stroke-width: 1.5; fill: none; marker-end: url(#a-fn); }
  </style>
  <defs>
    <marker id="a-fn" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="#2e7d32"/>
    </marker>
  </defs>

  <text class="title" x="310" y="22">Functional — state is a value, function transforms it</text>
  <text class="subtitle" x="310" y="40">No mutation. The old value still exists; a new value is computed from it.</text>

  <rect class="codebg" x="130" y="55" width="360" height="62"/>
  <text class="code" x="145" y="74">transfer state amt =</text>
  <text class="code" x="145" y="92">  state { alice.bal = alice.bal − amt,</text>
  <text class="code" x="145" y="108">          bob.bal   = bob.bal + amt }</text>

  <text class="vlabel" x="80" y="148">input value</text>
  <rect class="val-box" x="20" y="155" width="120" height="80"/>
  <text class="label" x="80" y="175">{</text>
  <text class="val" x="80" y="195">Alice: 500</text>
  <text class="val" x="80" y="215">Bob: 200</text>
  <text class="label" x="80" y="232">}</text>

  <line class="arrow" x1="145" y1="195" x2="225" y2="195"/>

  <rect class="fn-box" x="225" y="170" width="170" height="50"/>
  <text class="val" x="310" y="192" style="fill:#2e7d32">transfer s 100</text>
  <text class="vlabel" x="310" y="212">pure function</text>

  <line class="arrow" x1="395" y1="195" x2="475" y2="195"/>

  <text class="vlabel" x="540" y="148">output value</text>
  <rect class="val-box" x="480" y="155" width="120" height="80"/>
  <text class="label" x="540" y="175">{</text>
  <text class="val" x="540" y="195">Alice: 400</text>
  <text class="val" x="540" y="215">Bob: 300</text>
  <text class="label" x="540" y="232">}</text>

  <text class="subtitle" x="310" y="270">The program IS a function from values to values.</text>
</svg>
