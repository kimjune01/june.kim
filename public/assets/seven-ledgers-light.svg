<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- the sale -->
  <g>
    <rect x="30" y="165" width="170" height="90" rx="10" fill="none" stroke="#2c8377" stroke-width="1.8"/>
    <text x="115" y="196" text-anchor="middle" font-size="11" fill="#999" letter-spacing="1.5">ONE SALE</text>
    <text x="115" y="218" text-anchor="middle" font-size="14" fill="#1f2937" font-weight="600">one customer buys,</text>
    <text x="115" y="236" text-anchor="middle" font-size="14" fill="#1f2937" font-weight="600">once</text>
  </g>

  <!-- dashed lines from sale to each ledger -->
  <g stroke="#bbb" stroke-width="1" stroke-dasharray="4 4" fill="none">
    <line x1="200" y1="196" x2="320" y2="70"/>
    <line x1="200" y1="203" x2="320" y2="160"/>
    <line x1="200" y1="210" x2="320" y2="250"/>
    <line x1="200" y1="217" x2="320" y2="340"/>
    <line x1="200" y1="203" x2="595" y2="115"/>
    <line x1="200" y1="210" x2="595" y2="205"/>
    <line x1="200" y1="217" x2="595" y2="295"/>
  </g>

  <!-- column A: four ledgers -->
  <g>
    <rect x="320" y="40" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="335" y="62" font-size="10.5" fill="#999" letter-spacing="1.2">PLATFORM DASHBOARD</text>
    <text x="335" y="84" font-size="13.5" fill="#1f2937" font-weight="600">2 conversions, 1 modeled</text>

    <rect x="320" y="130" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="335" y="152" font-size="10.5" fill="#999" letter-spacing="1.2">ANALYTICS (GA4)</text>
    <text x="335" y="174" font-size="13.5" fill="#1f2937" font-weight="600">1.4 conversions</text>

    <rect x="320" y="220" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="335" y="242" font-size="10.5" fill="#999" letter-spacing="1.2">CALL TRACKER</text>
    <text x="335" y="264" font-size="13.5" fill="#1f2937" font-weight="600">1 qualified call, no click ID</text>

    <rect x="320" y="310" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="335" y="332" font-size="10.5" fill="#999" letter-spacing="1.2">CRM</text>
    <text x="335" y="354" font-size="13.5" fill="#1f2937" font-weight="600">1 deal won, source unknown</text>
  </g>

  <!-- column B: three ledgers -->
  <g>
    <rect x="595" y="85" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="610" y="107" font-size="10.5" fill="#999" letter-spacing="1.2">AGENCY REPORT</text>
    <text x="610" y="129" font-size="13.5" fill="#1f2937" font-weight="600">ROAS 4.2&#215;</text>

    <rect x="595" y="175" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="610" y="197" font-size="10.5" fill="#999" letter-spacing="1.2">AFFILIATE NETWORK</text>
    <text x="610" y="219" font-size="13.5" fill="#1f2937" font-weight="600">1 sale, credit: extension</text>

    <rect x="595" y="265" width="230" height="62" rx="8" fill="none" stroke="#666" stroke-width="1.2"/>
    <text x="610" y="287" font-size="10.5" fill="#999" letter-spacing="1.2">BANK STATEMENT</text>
    <text x="610" y="309" font-size="13.5" fill="#1f2937" font-weight="600">money out: $1,250</text>
  </g>

  <!-- punchline -->
  <text x="430" y="408" text-anchor="middle" font-size="13" fill="#1a6b5f" font-weight="600">seven books, one event, no two agree &#183; and no lines between the books</text>
</svg>
