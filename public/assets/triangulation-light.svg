<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- the object: never held whole -->
  <circle cx="340" cy="240" r="62" fill="none" stroke="#a0a0a0" stroke-width="1.5" stroke-dasharray="5 5"/>
  <!-- rim facets each agent catches (lower half) -->
  <path d="M 402 240 A 62 62 0 0 1 371 294" fill="none" stroke="#3a7ca5" stroke-width="3.5"/>
  <path d="M 371 294 A 62 62 0 0 1 309 294" fill="none" stroke="#3a7ca5" stroke-width="3.5"/>
  <path d="M 309 294 A 62 62 0 0 1 278 240" fill="none" stroke="#3a7ca5" stroke-width="3.5"/>
  <text x="340" y="236" text-anchor="middle" font-size="13" fill="#555" font-style="italic">the object</text>
  <text x="340" y="254" text-anchor="middle" font-size="10.5" fill="#8a8a8a">no projection holds it whole</text>

  <!-- the view from nowhere: unoccupied limit over the rim no agent reaches -->
  <circle cx="340" cy="70" r="11" fill="none" stroke="#a0a0a0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="334" y1="79" x2="306" y2="186" stroke="#c2c2c2" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="346" y1="79" x2="374" y2="186" stroke="#c2c2c2" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="340" y="44" text-anchor="middle" font-size="13" fill="#555">the view from nowhere</text>
  <text x="340" y="100" text-anchor="middle" font-size="10.5" fill="#8a8a8a" font-style="italic">unoccupied</text>

  <!-- agent A, lower left -->
  <line x1="156" y1="356" x2="286" y2="271" stroke="#4a4a4a" stroke-width="1.4"/>
  <circle cx="150" cy="362" r="7" fill="#2b2b2b"/>
  <text x="138" y="382" text-anchor="middle" font-size="12" fill="#333">agent</text>

  <!-- agent B, lower right -->
  <line x1="524" y1="356" x2="394" y2="271" stroke="#4a4a4a" stroke-width="1.4"/>
  <circle cx="530" cy="362" r="7" fill="#2b2b2b"/>
  <text x="542" y="382" text-anchor="middle" font-size="12" fill="#333">agent</text>

  <!-- agent C, bottom -->
  <line x1="340" y1="392" x2="340" y2="304" stroke="#4a4a4a" stroke-width="1.4"/>
  <circle cx="340" cy="398" r="7" fill="#2b2b2b"/>
  <text x="340" y="420" text-anchor="middle" font-size="12" fill="#333">agent</text>

  <text x="222" y="320" text-anchor="middle" font-size="10.5" fill="#8a8a8a" font-style="italic">projection</text>
</svg>
