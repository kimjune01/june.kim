<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 990" font-family="system-ui, sans-serif">
  <style>
    .legend-name { font-size: 11px; fill: #333; font-weight: 600; }
    .legend-math { font-size: 11px; fill: #888; font-style: italic; font-family: ui-monospace, monospace; }
    .year { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; fill: #888; text-anchor: end; }
    .lang { font-family: ui-monospace, monospace; font-size: 12px; fill: #333; }
    .grounding { font-family: ui-monospace, monospace; font-size: 11px; fill: #555; font-style: italic; text-anchor: end; }
    .star { font-size: 16px; text-anchor: middle; }
    .ph-imp { fill: #1565c0; }
    .ph-func { fill: #2e7d32; }
    .ph-dec { fill: #c62828; }
    .ph-act { fill: #ef6c00; }
    .spine { stroke: #ddd; stroke-width: 1; }
