<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" font-family="system-ui, sans-serif">
  <style>
    .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; fill: #ef6c00; }
    .codebg { fill: #f5f5f5; stroke: #ddd; stroke-width: 1; rx: 4; }
    .actor { fill: #fff; stroke: #ef6c00; stroke-width: 1.5; }
    .actor-name { font-size: 14px; font-weight: 600; fill: #ef6c00; text-anchor: middle; }
    .actor-state { font-family: ui-monospace, monospace; font-size: 12px; fill: #333; text-anchor: middle; }
    .mailbox { fill: #fff8e1; stroke: #ef6c00; stroke-width: 1; stroke-dasharray: 3,2; rx: 3; }
    .mb-label { font-size: 10px; fill: #ef6c00; text-anchor: middle; font-style: italic; }
    .mb-msg { font-family: ui-monospace, monospace; font-size: 10px; fill: #555; text-anchor: middle; }
    .arrow { stroke: #ef6c00; stroke-width: 1.5; fill: none; marker-end: url(#a-act); }
    .msg { font-family: ui-monospace, monospace; font-size: 11px; fill: #ef6c00; text-anchor: middle; }
    .step { font-size: 10px; fill: #888; font-style: italic; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a-act" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="#ef6c00"/>
    </marker>
  </defs>

  <rect class="codebg" x="135" y="10" width="330" height="50"/>
  <text class="code" x="150" y="30">Alice ! {transfer, Bob, 100}</text>
  <text class="code" x="150" y="50">%% Alice then sends → Bob ! {credit, 100}</text>

  <text class="msg" x="68" y="120">{transfer,</text>
  <text class="msg" x="68" y="134">Bob, 100}</text>
  <line class="arrow" x1="20" y1="150" x2="130" y2="150"/>

  <circle class="actor" cx="180" cy="150" r="48"/>
  <text class="actor-name" x="180" y="146">Alice</text>
  <text class="actor-state" x="180" y="166">bal: 500→400</text>

  <rect class="mailbox" x="140" y="210" width="80" height="34"/>
  <text class="mb-label" x="180" y="222">📥 inbox</text>
  <text class="mb-msg" x="180" y="237">{transfer…}</text>

  <line class="arrow" x1="228" y1="150" x2="372" y2="150"/>
  <text class="msg" x="300" y="138">{credit, 100}</text>
  <text class="step" x="300" y="170">async send</text>

  <circle class="actor" cx="420" cy="150" r="48"/>
  <text class="actor-name" x="420" y="146">Bob</text>
  <text class="actor-state" x="420" y="166">bal: 200→300</text>

  <rect class="mailbox" x="380" y="210" width="80" height="34"/>
  <text class="mb-label" x="420" y="222">📥 inbox</text>
  <text class="mb-msg" x="420" y="237">{credit…}</text>
</svg>
