<svg viewBox="0 0 560 414" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #666; font-size: 11px; }
    .dark { fill: #333; }
    .accent { fill: #3b82f6; }
    .green { fill: #2d7d2d; }
    .red { fill: #c43c3c; }
    .bold { font-weight: bold; }
    .label { font-size: 10px; fill: #888; }
  </style>
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c43c3c" />
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaa" />
    </marker>
    <marker id="arrow-ok" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <!-- === THE CAUSE CHAIN === -->

  <rect x="130" y="20" width="300" height="32" fill="#faf8f4" stroke="#e8e4dc" stroke-width="1.5" rx="4" />
  <text x="280" y="40" text-anchor="middle" class="dark bold">ghost expression of type <tspan class="accent">!</tspan></text>

  <path d="M 280 52 L 280 68" stroke="#333" stroke-width="1.3" marker-end="url(#arrow-ok)" fill="none" />

  <rect x="130" y="70" width="300" height="32" fill="none" stroke="#ddd" stroke-width="1.5" rx="4" />
  <text x="280" y="90" text-anchor="middle" class="dark">erased before compilation</text>

  <path d="M 280 102 L 280 118" stroke="#c43c3c" stroke-width="1.3" marker-end="url(#arrow-red)" fill="none" />

  <rect x="130" y="120" width="300" height="32" fill="none" stroke="#ddd" stroke-width="1.5" rx="4" />
  <text x="280" y="140" text-anchor="middle" class="dark">MIR marks the next block unreachable</text>

  <path d="M 280 152 L 280 168" stroke="#c43c3c" stroke-width="1.3" marker-end="url(#arrow-red)" fill="none" />

  <rect x="130" y="170" width="300" height="32" fill="none" stroke="#ddd" stroke-width="1.5" rx="4" />
  <text x="280" y="190" text-anchor="middle" class="dark">Verus prunes a <tspan class="red bold">live</tspan> control-flow edge</text>

  <path d="M 280 202 L 280 218" stroke="#c43c3c" stroke-width="1.3" marker-end="url(#arrow-red)" fill="none" />

  <rect x="130" y="220" width="300" height="32" fill="none" stroke="#ddd" stroke-width="1.5" rx="4" />
  <text x="280" y="240" text-anchor="middle" class="dark">that code is never checked</text>

  <path d="M 280 252 L 280 268" stroke="#c43c3c" stroke-width="1.3" marker-end="url(#arrow-red)" fill="none" />

  <rect x="130" y="270" width="300" height="34" fill="#fdeeee" stroke="#c43c3c" stroke-width="2" rx="4" />
  <text x="280" y="291" text-anchor="middle" class="red bold" style="font-size:12px; letter-spacing:0.5px">UNSOUNDNESS</text>

  <!-- === THE FIX AXIS === -->
  <text x="280" y="328" text-anchor="middle" class="label">the fix turns on one axis: identical at <tspan class="accent bold">!</tspan>, opposite handling</text>

  <path d="M 210 304 L 178 350" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow-dim)" fill="none" />
  <path d="M 350 304 L 382 350" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow-dim)" fill="none" />

  <rect x="40" y="354" width="220" height="50" fill="none" stroke="#2d7d2d" stroke-width="1.5" rx="4" />
  <text x="150" y="375" text-anchor="middle" class="green bold" style="font-size:10px">ghost-erased uninhabited</text>
  <text x="150" y="394" text-anchor="middle" class="green bold" style="font-size:12px">KEEP the edge</text>

  <rect x="300" y="354" width="220" height="50" fill="none" stroke="#999" stroke-width="1.5" rx="4" />
  <text x="410" y="375" text-anchor="middle" class="dark bold" style="font-size:10px">genuine runtime divergence</text>
  <text x="410" y="394" text-anchor="middle" class="dark bold" style="font-size:12px">PRUNE the edge</text>

</svg>
