<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 90" font-family="system-ui, sans-serif" font-size="13">
  <style>
    .step{fill:#fff;stroke:#bbb;stroke-width:1.2;rx:4}
    .role{text-anchor:middle;dominant-baseline:central;font-weight:500;font-size:12px}
    .mech{text-anchor:middle;font-size:10px;fill:#555}
    .arrow{stroke:#999;stroke-width:1;fill:none;marker-end:url(#a)}
    .bk{stroke:#999;stroke-width:1.2;fill:none;stroke-dasharray:5,3}
    .bk-label{font-size:10px;fill:#888;font-style:italic}
  </style>
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#bbb"/></marker></defs>

  <rect class="step" x="10" y="8" width="160" height="34"/>
  <text class="role" x="90" y="20">Input</text>
  <text class="mech" x="90" y="50">Retrieval cue</text>
  <line class="arrow" x1="170" y1="25" x2="185" y2="25"/>

  <rect class="step" x="185" y="8" width="160" height="34"/>
  <text class="role" x="265" y="20">Working Memory</text>
  <text class="mech" x="265" y="50">Graph structures</text>
  <line class="arrow" x1="345" y1="25" x2="360" y2="25"/>

  <rect class="step" x="360" y="8" width="160" height="34"/>
  <text class="role" x="440" y="20">Elaboration</text>
  <text class="mech" x="440" y="50">Base-level activation</text>
  <line class="arrow" x1="520" y1="25" x2="535" y2="25"/>

  <rect class="step" x="535" y="8" width="160" height="34"/>
  <text class="role" x="615" y="20">Selection</text>
  <text class="mech" x="615" y="50">Spreading activation</text>
  <line class="arrow" x1="695" y1="25" x2="710" y2="25"/>

  <rect class="step" x="710" y="8" width="160" height="34"/>
  <text class="role" x="790" y="20">Output</text>
  <text class="mech" x="790" y="50">Buffer → WM</text>

  <rect x="440" y="70" width="400" height="18" rx="4" fill="#fff0f0" stroke="none"/>
  <path class="bk" d="M790,42 L790,62 Q790,67 785,67 L95,67 Q90,67 90,62 L90,42"/>
  <text class="bk-label" x="550" y="78">Learning — agent-directed storage only</text>
</svg>
