<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .node-text { text-anchor: middle; font-weight: 700; font-size: 16px; fill: #333; }
    .node-sub { text-anchor: middle; font-size: 11px; fill: #888; }
    .arrow { stroke: #aaa; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .arrow-missing { stroke: #c62828; stroke-width: 2; fill: none; marker-end: url(#ahr); stroke-dasharray: 8,5; }
    .label { font-size: 12px; fill: #777; font-weight: 600; font-style: italic; }
    .label-missing { font-size: 12px; fill: #c62828; font-weight: 600; font-style: italic; }
    .ck { font-weight: 700; font-size: 11px; fill: #c62828; }
    .cv { font-size: 11px; fill: #444; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#aaa"/>
    </marker>
    <marker id="ahr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Background: circle -->
  <circle cx="230" cy="170" r="148" stroke="#e8e8e8" stroke-width="1" fill="none"/>

  <!-- Background: inscribed triangle — vertices on the circle -->
  <!-- Center (230,170), radius 148. Top: (230, 22). Bottom-left: (230-148*sin60, 170+148*cos60) = (102, 244). Bottom-right: (358, 244) -->
  <polygon points="230,22 102,244 358,244" stroke="#e8ddd0" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Arrows: same-shaped quadratic arcs, rotated 120° -->
  <!-- Each starts 15% along edge from source, ends 15% from target -->
  <!-- Control point: edge midpoint pulled 30% toward center (230,170) -->

  <!-- Control points pulled AWAY from center (230,170), between triangle and circle -->

  <!-- epmem → smem (left side, missing — dashed red) -->
  <path class="arrow-missing" d="M211,55 Q120,100 121,211"/>

  <!-- smem → pmem (bottom, solid) -->
  <path class="arrow" d="M140,244 Q230,290 320,244"/>

  <!-- pmem → epmem (right side, solid) -->
  <path class="arrow" d="M339,211 Q340,100 249,55"/>

  <!-- Labels: outside the triangle, near their arrow -->
  <text class="label-missing" x="130" y="130" text-anchor="end">consolidate</text>
  <text class="label" x="230" y="280" text-anchor="middle">compile</text>
  <text class="label" x="340" y="130" text-anchor="start">execute</text>

  <!-- Nodes at vertices -->
  <text class="node-text" x="230" y="28">epmem</text>
  <text class="node-sub" x="230" y="46">what happened</text>

  <text class="node-text" x="102" y="240">smem</text>
  <text class="node-sub" x="102" y="258">what is true</text>

  <text class="node-text" x="358" y="240">pmem</text>
  <text class="node-sub" x="358" y="258">how to act</text>

</svg>
