<svg viewBox="0 0 480 250" xmlns="http://www.w3.org/2000/svg" style="font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10" fill="none" stroke="#888" stroke-width="1.4"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10" fill="none" stroke="#3b82f6" stroke-width="1.4"/></marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10" fill="none" stroke="#f59e0b" stroke-width="1.3"/></marker>
  </defs>

  <!-- Shared x positions: dots center=70, arrow1=140, diamond center=185, arrow2=225, output center=280 -->

  <!-- P-value pipeline (y center = 45) -->
  <g fill="#888">
    <circle cx="20" cy="48" r="1.8"/><circle cx="27" cy="40" r="1.8"/><circle cx="34" cy="33" r="1.8"/>
    <circle cx="41" cy="30" r="1.8"/><circle cx="48" cy="35" r="1.8"/><circle cx="55" cy="42" r="1.8"/>
    <circle cx="62" cy="53" r="1.8"/><circle cx="69" cy="58" r="1.8"/><circle cx="76" cy="54" r="1.8"/>
    <circle cx="83" cy="46" r="1.8"/><circle cx="90" cy="37" r="1.8"/><circle cx="97" cy="31" r="1.8"/>
    <circle cx="104" cy="29" r="1.8"/><circle cx="111" cy="34" r="1.8"/><circle cx="118" cy="42" r="1.8"/>
    <circle cx="125" cy="50" r="1.8"/><circle cx="132" cy="54" r="1.8"/>
  </g>
  <text x="76" y="72" text-anchor="middle" fill="#888" font-size="8">data</text>

  <line x1="142" y1="45" x2="157" y2="45" fill="none" stroke="#888" stroke-width="1" marker-end="url(#ag)"/>

  <polygon points="195,15 235,45 195,75 155,45" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="195" y="42" text-anchor="middle" fill="#222" font-size="9">p-value</text>
  <text x="195" y="52" text-anchor="middle" fill="#222" font-size="9">test</text>

  <line x1="237" y1="45" x2="252" y2="45" fill="none" stroke="#888" stroke-width="1" marker-end="url(#ag)"/>

  <circle cx="280" cy="45" r="24" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="280" y="45" text-anchor="middle" dominant-baseline="middle" fill="#222" font-size="9">p = 0.23</text>
  <text x="280" y="80" text-anchor="middle" fill="#888" font-size="7">fail to reject</text>

  <!-- divider -->
  <line x1="10" y1="95" x2="470" y2="95" stroke="#ddd" stroke-width="0.6" opacity="0.5"/>

  <!-- E-value pipeline (y center = 145) -->
  <g fill="#3b82f6">
    <circle cx="20" cy="148" r="1.8"/><circle cx="27" cy="140" r="1.8"/><circle cx="34" cy="133" r="1.8"/>
    <circle cx="41" cy="130" r="1.8"/><circle cx="48" cy="135" r="1.8"/><circle cx="55" cy="142" r="1.8"/>
    <circle cx="62" cy="153" r="1.8"/><circle cx="69" cy="158" r="1.8"/><circle cx="76" cy="154" r="1.8"/>
    <circle cx="83" cy="146" r="1.8"/><circle cx="90" cy="137" r="1.8"/><circle cx="97" cy="131" r="1.8"/>
    <circle cx="104" cy="129" r="1.8"/><circle cx="111" cy="134" r="1.8"/><circle cx="118" cy="142" r="1.8"/>
    <circle cx="125" cy="150" r="1.8"/><circle cx="132" cy="154" r="1.8"/>
  </g>
  <text x="76" y="172" text-anchor="middle" fill="#3b82f6" font-size="8">data</text>

  <line x1="142" y1="145" x2="157" y2="145" fill="none" stroke="#3b82f6" stroke-width="1" marker-end="url(#ab)"/>

  <polygon points="195,118 232,145 195,172 158,145" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="195" y="140" text-anchor="middle" fill="#222" font-size="9">e-value</text>
  <text x="195" y="150" text-anchor="middle" fill="#222" font-size="9">trajectory</text>
  <path d="M180 158 C184 153,188 163,192 158 S198 152,202 158 S208 163,212 158" fill="none" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>

  <line x1="234" y1="145" x2="257" y2="145" fill="none" stroke="#3b82f6" stroke-width="1" marker-end="url(#ab)"/>

  <!-- 4 bins (aligned with p-value circle center x=280) -->
  <rect x="262" y="126" width="48" height="15" rx="3" fill="none" stroke="#888" stroke-width="1" opacity="0.35"/>
  <text x="286" y="136" text-anchor="middle" fill="#888" font-size="7" opacity="0.5">converge</text>

  <rect x="314" y="126" width="48" height="15" rx="3" fill="none" stroke="#888" stroke-width="1" opacity="0.35"/>
  <text x="338" y="136" text-anchor="middle" fill="#888" font-size="7" opacity="0.5">diverge</text>

  <rect x="262" y="145" width="48" height="15" rx="3" fill="none" stroke="#22c55e" stroke-width="1.8"/>
  <text x="286" y="155" text-anchor="middle" fill="#22c55e" font-size="7" font-weight="bold">oscillate</text>

  <rect x="314" y="145" width="48" height="15" rx="3" fill="none" stroke="#888" stroke-width="1" opacity="0.35"/>
  <text x="338" y="155" text-anchor="middle" fill="#888" font-size="7" opacity="0.5">aperiodic</text>

  <!-- hypothesis edges -->
  <line x1="280" y1="160" x2="280" y2="185" fill="none" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#aa)"/>
  <circle cx="280" cy="202" r="12" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="280" y="202" text-anchor="middle" dominant-baseline="middle" fill="#f59e0b" font-size="9">?</text>
  <text x="280" y="222" text-anchor="middle" fill="#f59e0b" font-size="6">test freq?</text>

  <line x1="335" y1="160" x2="350" y2="185" fill="none" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#aa)"/>
  <circle cx="350" cy="202" r="12" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="350" y="202" text-anchor="middle" dominant-baseline="middle" fill="#f59e0b" font-size="9">?</text>
  <text x="350" y="222" text-anchor="middle" fill="#f59e0b" font-size="6">test interface?</text>
</svg>