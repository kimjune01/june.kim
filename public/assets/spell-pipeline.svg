<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 310" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .box { stroke: #555; stroke-width: 1.5; fill: #fff; rx: 8; }
    .box-ship { stroke: #555; stroke-width: 1.5; fill: #d4edd4; rx: 8; }
    .box-text { text-anchor: middle; dominant-baseline: central; font-weight: 700; font-size: 12px; fill: #333; }
    .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .contract { text-anchor: middle; font-size: 9px; fill: #555; font-weight: 500; }
    .output { text-anchor: middle; font-size: 10px; fill: #1565c0; font-weight: 600; }
    .input { text-anchor: middle; font-size: 10px; fill: #888; font-weight: 500; }
    .label { text-anchor: end; font-size: 11px; fill: #888; font-weight: 600; font-style: italic; }
  </style>
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#888"/>
    </marker>
  </defs>

  <!-- Row label: Architecture -->
  <text class="label" x="95" y="52">Architecture</text>

  <!-- Framework -->
  <rect class="box" x="105" y="30" width="130" height="44"/>
  <text class="box-text" x="170" y="52">Framework</text>
  <text class="input" x="170" y="90">broken system</text>
  <text class="output" x="170" y="104">→ diagnosed role</text>

  <line class="arrow" x1="235" y1="52" x2="255" y2="52"/>

  <!-- Parts Bin -->
  <rect class="box" x="255" y="30" width="120" height="44"/>
  <text class="box-text" x="315" y="52">Parts Bin</text>
  <text class="input" x="315" y="90">diagnosed role</text>
  <text class="output" x="315" y="104">→ candidate</text>

  <line class="arrow" x1="375" y1="52" x2="395" y2="52"/>

  <!-- Volley 1 -->
  <rect class="box" x="395" y="30" width="120" height="44"/>
  <text class="box-text" x="455" y="52">Volley (spec)</text>
  <text class="input" x="455" y="90">candidate</text>
  <text class="output" x="455" y="104">→ sharp spec</text>

  <line class="arrow" x1="515" y1="52" x2="535" y2="52"/>

  <!-- Merge -->
  <rect class="box" x="535" y="30" width="130" height="44"/>
  <text class="box-text" x="600" y="52">Merge</text>
  <text class="input" x="600" y="90">sharp spec</text>
  <text class="output" x="600" y="104">→ draft impl</text>

  <line class="arrow" x1="665" y1="52" x2="685" y2="52"/>

  <!-- Volley 2 -->
  <rect class="box" x="685" y="30" width="120" height="44"/>
  <text class="box-text" x="745" y="52">Volley (PR)</text>
  <text class="input" x="745" y="90">draft impl</text>
  <text class="output" x="745" y="104">→ clean PR</text>

  <line class="arrow" x1="805" y1="52" x2="825" y2="52"/>

  <!-- Ship -->
  <rect class="box-ship" x="825" y="30" width="100" height="44"/>
  <text class="box-text" x="875" y="52">PR</text>
  <text class="input" x="875" y="90">clean PR</text>
  <text class="output" x="875" y="104">→ merged code</text>

  <!-- Row label: Product -->
  <text class="label" x="95" y="192">Product</text>

  <!-- PageLeft -->
  <rect class="box" x="105" y="170" width="130" height="44"/>
  <text class="box-text" x="170" y="192">PageLeft</text>
  <text class="input" x="170" y="230">search query</text>
  <text class="output" x="170" y="244">→ prior art</text>

  <line class="arrow" x1="235" y1="192" x2="255" y2="192"/>

  <!-- Forge -->
  <rect class="box" x="255" y="170" width="120" height="44"/>
  <text class="box-text" x="315" y="192">Forge</text>
  <text class="input" x="315" y="230">prior art</text>
  <text class="output" x="315" y="244">→ working code</text>

  <line class="arrow" x1="375" y1="192" x2="395" y2="192"/>

  <!-- Design -->
  <rect class="box" x="395" y="170" width="120" height="44"/>
  <text class="box-text" x="455" y="192">Design</text>
  <text class="input" x="455" y="230">working code</text>
  <text class="output" x="455" y="244">→ designed UI</text>

  <line class="arrow" x1="515" y1="192" x2="535" y2="192"/>

  <!-- Ship -->
  <rect class="box-ship" x="535" y="170" width="100" height="44"/>
  <text class="box-text" x="585" y="192">Ship</text>
  <text class="input" x="585" y="230">designed UI</text>
  <text class="output" x="585" y="244">→ deployed</text>

  <!-- Note -->
  <text style="text-anchor:middle; font-size:10px; fill:#888; font-style:italic;" x="480" y="290">Each step converges. Composition compounds the guarantee.</text>
</svg>
