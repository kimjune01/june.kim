<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="680" height="420" fill="#ffffff"/>
  <!-- gridlines + y labels -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="55" y1="335" x2="655" y2="335"/>
    <line x1="55" y1="260" x2="655" y2="260"/>
    <line x1="55" y1="185" x2="655" y2="185"/>
    <line x1="55" y1="110" x2="655" y2="110"/>
    <line x1="55" y1="35"  x2="655" y2="35"/>
  </g>
  <g font-size="10" fill="#9ca3af" text-anchor="end">
    <text x="48" y="339">0</text>
    <text x="48" y="264">25</text>
    <text x="48" y="189">50</text>
    <text x="48" y="114">75</text>
    <text x="48" y="39">100</text>
  </g>
  <!-- bare-model bars (standardized SWE-Agent scaffold) -->
  <g fill="#94a3b8">
    <rect x="80"  y="204.2" width="70" height="130.8"/>
    <rect x="170" y="159.2" width="70" height="175.8"/>
    <rect x="260" y="142.1" width="70" height="192.9"/>
  </g>
  <!-- this-harness bars -->
  <g fill="#1d4ed8">
    <rect x="420" y="55.7" width="70" height="279.3"/>
    <rect x="510" y="49.1" width="70" height="285.9"/>
  </g>
  <!-- value labels -->
  <g font-size="13" font-weight="600" text-anchor="middle">
    <text x="115" y="197" fill="#475569">43.6</text>
    <text x="205" y="152" fill="#475569">58.6</text>
    <text x="295" y="135" fill="#475569">64.3</text>
    <text x="455" y="48"  fill="#1d4ed8">93.1</text>
    <text x="545" y="42"  fill="#1d4ed8">95.3</text>
  </g>
  <!-- model labels -->
  <g font-size="11" fill="#374151" text-anchor="middle">
    <text x="115" y="353">Sonnet 4.5</text>
    <text x="205" y="353">GPT-5.5</text>
    <text x="295" y="353">Opus 4.7</text>
    <text x="455" y="353">Open-weight</text>
    <text x="545" y="353">Frontier</text>
  </g>
  <!-- group labels -->
  <g font-size="12" font-weight="600" text-anchor="middle">
    <text x="205" y="380" fill="#64748b">Base model + minimal harness</text>
    <text x="500" y="380" fill="#1d4ed8">Methodeutic harness</text>
  </g>
  <!-- gap annotation: best bare model to harness -->
  <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3">
    <line x1="330" y1="142.1" x2="420" y2="142.1"/>
  </g>
  <text x="375" y="100" font-size="11" fill="#64748b" text-anchor="middle" font-style="italic">+31 to 37</text>
  <text x="375" y="113" font-size="9" fill="#9ca3af" text-anchor="middle">over best bare</text>
</svg>
