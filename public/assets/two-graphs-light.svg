<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Two disjoint hypothesis graphs as transposes: the SAME graph in the SAME layout, differing only in the experiment edge. Left (empirical) is tethered to the world; right (formal) is the identical graph sealed. Authored light; site applies filter:invert(1) for dark. -->

  <!-- ===================== EMPIRICAL (left): identical graph, tethered to the world ===================== -->
  <!-- the world: an external edge above the graph -->
  <path d="M125,60 L180,52 L240,62" fill="none" stroke="#1d1d1d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- THE experiment edge: the one edge that reaches out to the world, where a build can be broken -->
  <path d="M184,60 L181,116" fill="none" stroke="#1d1d1d" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M181,116 L175,108 M181,116 L187,109" fill="none" stroke="#1d1d1d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- edges -->
  <g fill="none" stroke="#8a8a8a" stroke-width="1.4" stroke-linecap="round">
    <path d="M100,140 L180,123"/>
    <path d="M180,123 L235,185"/>
    <path d="M100,140 L140,215"/>
    <path d="M140,215 L220,245"/>
    <path d="M220,245 L235,185"/>
    <path d="M140,215 L95,265"/>
    <path d="M180,123 L140,215"/>
  </g>
  <!-- nodes -->
  <g fill="#ffffff" stroke="#1d1d1d" stroke-width="1.7">
    <circle cx="100" cy="140" r="9"/>
    <circle cx="180" cy="123" r="9"/>
    <circle cx="235" cy="185" r="9"/>
    <circle cx="140" cy="215" r="9"/>
    <circle cx="220" cy="245" r="9"/>
    <circle cx="95"  cy="265" r="9"/>
  </g>
  <text x="184" y="44" text-anchor="middle" font-size="12" letter-spacing="1" fill="#777">world</text>
  <text x="165" y="342" text-anchor="middle" font-size="15" letter-spacing="2.5" fill="#1d1d1d">empirical</text>

  <!-- ===================== THE WALL: type boundary ===================== -->
  <path d="M345,58 L345,312" stroke="#555" stroke-width="1.3" stroke-linecap="round"/>
  <text transform="translate(336,236) rotate(-90)" font-size="11" letter-spacing="1.5" fill="#999">type boundary</text>

  <!-- ===================== FORMAL (right): the IDENTICAL graph, sealed (no experiment edge) ===================== -->
  <g fill="none" stroke="#8a8a8a" stroke-width="1.4" stroke-linecap="round">
    <path d="M450,140 L530,123"/>
    <path d="M530,123 L585,185"/>
    <path d="M450,140 L490,215"/>
    <path d="M490,215 L570,245"/>
    <path d="M570,245 L585,185"/>
    <path d="M490,215 L445,265"/>
    <path d="M530,123 L490,215"/>
  </g>
  <g fill="#1d1d1d">
    <circle cx="450" cy="140" r="8"/>
    <circle cx="530" cy="123" r="8"/>
    <circle cx="585" cy="185" r="8"/>
    <circle cx="490" cy="215" r="8"/>
    <circle cx="570" cy="245" r="8"/>
    <circle cx="445" cy="265" r="8"/>
  </g>
  <text x="515" y="342" text-anchor="middle" font-size="15" letter-spacing="2.5" fill="#1d1d1d">formal</text>
</svg>
