<svg viewBox="10 20 480 360" xmlns="http://www.w3.org/2000/svg" style="font-family: ui-monospace, monospace;">

  <!-- Layer 0: Implicit graph (low opacity) — prior knowledge -->
  <g opacity="0.35">
    <circle cx="80" cy="50" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="160" cy="30" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="250" cy="55" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="340" cy="35" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="420" cy="60" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="140" cy="75" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="300" cy="75" r="12" fill="none" stroke="#888" stroke-width="1.5"/>
    <line x1="92" y1="48" x2="148" y2="34" stroke="#888" stroke-width="1"/>
    <line x1="172" y1="32" x2="238" y2="52" stroke="#888" stroke-width="1"/>
    <line x1="262" y1="53" x2="328" y2="38" stroke="#888" stroke-width="1"/>
    <line x1="352" y1="38" x2="408" y2="57" stroke="#888" stroke-width="1"/>
    <line x1="88" y1="60" x2="130" y2="68" stroke="#888" stroke-width="1"/>
    <line x1="152" y1="75" x2="238" y2="58" stroke="#888" stroke-width="1"/>
    <line x1="262" y1="60" x2="290" y2="70" stroke="#888" stroke-width="1"/>
  </g>

  <!-- Layer 1: Experiment node -->
  <g>
    <circle cx="250" cy="130" r="36" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="250" y="127" text-anchor="middle" fill="#222" font-size="9">Tap</text>
    <text x="250" y="139" text-anchor="middle" fill="#222" font-size="9">alternator</text>

    <line x1="250" y1="67" x2="250" y2="94" stroke="#888" stroke-width="1" stroke-dasharray="3,4" opacity="0.3"/>

    <!-- Result: engine stalls -->
    <line x1="250" y1="166" x2="250" y2="185" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="190" y="185" width="120" height="24" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="250" y="201" text-anchor="middle" fill="#222" font-size="9">Engine stalls</text>

    <!-- Left branch: Battery? (validated) -->
    <line x1="215" y1="209" x2="130" y2="250" stroke="#22c55e" stroke-width="1.5"/>
    <text x="168" y="243" fill="#222" font-size="8">power?</text>
    <rect x="75" y="250" width="110" height="24" rx="4" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <text x="130" y="266" text-anchor="middle" fill="#222" font-size="9">Check battery</text>
    <text x="190" y="266" font-size="12">✅</text>

    <!-- Right branch: Wiring? (killed) -->
    <line x1="285" y1="209" x2="370" y2="250" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="315" y="250" width="110" height="24" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="370" y="266" text-anchor="middle" fill="#222" font-size="9">Check wiring</text>
    <text x="340" y="230" fill="#222" font-size="8">circuit?</text>

    <!-- Kill marker on left side of Check wiring box -->
    <text x="300" y="266" font-size="14">❌</text>
  </g>

  <!-- Layer 2: Results -->
  <g>
    <!-- Battery OK (validated) -->
    <line x1="110" y1="274" x2="90" y2="320" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="90" cy="332" r="14" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="336" text-anchor="middle" font-size="12">✅</text>
    <text x="90" y="358" text-anchor="middle" fill="#222" font-size="7">voltage</text>

    <!-- Capacity (validated) -->
    <line x1="150" y1="274" x2="170" y2="320" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="170" cy="332" r="14" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="170" y="336" text-anchor="middle" font-size="12">✅</text>
    <text x="170" y="358" text-anchor="middle" fill="#222" font-size="7">capacity</text>

    <!-- Kill generates new hypotheses -->
    <line x1="350" y1="274" x2="310" y2="320" stroke="#f59e0b" stroke-width="2"/>
    <text x="325" y="300" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">?</text>
    <circle cx="310" cy="332" r="14" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="310" y="358" text-anchor="middle" fill="#222" font-size="7">harness</text>

    <line x1="390" y1="274" x2="420" y2="320" stroke="#f59e0b" stroke-width="2"/>
    <text x="410" y="300" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">?</text>
    <circle cx="420" cy="332" r="14" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="420" y="358" text-anchor="middle" fill="#222" font-size="7">connection</text>
  </g>

  <!-- Labels -->
  <text x="30" y="45" fill="#888" font-size="8" opacity="0.6">prior repairs</text>
  <text x="310" y="118" fill="#3b82f6" font-size="8" text-anchor="start">experiment</text>
  <text x="310" y="248" fill="#ef4444" font-size="8" text-anchor="end">decompose</text>
  <text x="365" y="370" fill="#f59e0b" font-size="8" text-anchor="middle">frontier</text>

</svg>