<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <!-- boundary lines -->
  <line x1="250" y1="44" x2="250" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="250" y="36" text-anchor="middle" font-size="10" fill="#999">boundary</text>
  <line x1="530" y1="44" x2="530" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="530" y="36" text-anchor="middle" font-size="10" fill="#999">boundary</text>

  <!-- party boxes -->
  <rect x="40" y="70" width="140" height="44" rx="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="110" y="97" text-anchor="middle" font-size="13" fill="#222">Developers</text>

  <rect x="320" y="70" width="140" height="44" rx="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="390" y="97" text-anchor="middle" font-size="13" fill="#222">Evaluators</text>

  <rect x="600" y="70" width="140" height="44" rx="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="670" y="97" text-anchor="middle" font-size="13" fill="#222">Public record</text>

  <!-- crossings -->
  <line x1="182" y1="92" x2="316" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="64" text-anchor="middle" font-size="11" fill="#333">artifact + claim record</text>

  <line x1="462" y1="92" x2="596" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="64" text-anchor="middle" font-size="11" fill="#333">score + claim record</text>

  <!-- public record read by auditors -->
  <line x1="670" y1="116" x2="670" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="682" y="160" font-size="11" fill="#777">reads</text>

  <rect x="600" y="200" width="140" height="44" rx="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="670" y="227" text-anchor="middle" font-size="13" fill="#222">Auditors</text>

  <!-- receipts terminate the chain -->
  <line x1="670" y1="246" x2="670" y2="296" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="580" y="300" width="180" height="52" rx="6" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="1 0"/>
  <text x="670" y="322" text-anchor="middle" font-size="13" fill="#222">receipts</text>
  <text x="670" y="340" text-anchor="middle" font-size="11" fill="#777">re-runnable by anyone</text>
  <text x="670" y="376" text-anchor="middle" font-size="11" fill="#777">the door closes: no fourth party needed</text>

  <!-- scoped interior access -->
  <path d="M 598 226 C 340 300, 140 230, 112 120" fill="none" stroke="#9a9a9a" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrowMuted)"/>
  <text x="330" y="272" text-anchor="middle" font-size="11" fill="#777">interior access, scoped: omission testing only,</text>
  <text x="330" y="288" text-anchor="middle" font-size="11" fill="#777">opinion indexed to declarations</text>
</svg>
