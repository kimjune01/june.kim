<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <!-- exposure / the world pushing back -->
  <text x="310" y="22" text-anchor="middle" font-size="11" fill="#777">exposure · the world breaks a wrong build</text>
  <line x1="310" y1="30" x2="310" y2="56" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- claim node -->
  <rect x="30" y="58" width="140" height="44" rx="8" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="85" text-anchor="middle" font-size="15" fill="#222">a claim</text>

  <!-- claim -> build -->
  <line x1="170" y1="80" x2="246" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- build / run the test -->
  <rect x="250" y="58" width="120" height="44" rx="8" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="310" y="85" text-anchor="middle" font-size="15" fill="#222">run the test</text>

  <!-- build -> three verdicts -->
  <line x1="370" y1="80" x2="502" y2="62" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="370" y1="80" x2="502" y2="94" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="370" y1="80" x2="502" y2="126" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- verdicts -->
  <circle cx="514" cy="62" r="7" fill="#1a8a3a" stroke="#0f5c26" stroke-width="1"/>
  <text x="530" y="60" font-size="14" fill="#222" font-weight="600">TRUE</text>
  <text x="530" y="74" font-size="11" fill="#777">built and stood</text>

  <circle cx="514" cy="98" r="7" fill="#c0392b" stroke="#7d2519" stroke-width="1"/>
  <text x="530" y="96" font-size="14" fill="#222" font-weight="600">FALSE</text>
  <text x="530" y="110" font-size="11" fill="#777">built and broke</text>

  <circle cx="514" cy="134" r="7" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="3 2.5"/>
  <text x="530" y="132" font-size="14" fill="#222" font-weight="600">UNTRUE</text>
  <text x="530" y="146" font-size="11" fill="#777">no passing build (hung)</text>

  <!-- provenance edges down to roots -->
  <text x="92" y="132" text-anchor="middle" font-size="11" fill="#777">provenance edges</text>
  <line x1="100" y1="102" x2="62" y2="206" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <line x1="100" y1="102" x2="150" y2="206" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arrowMuted)"/>
  <line x1="100" y1="102" x2="238" y2="206" stroke="#9a9a9a" stroke-width="1.2" marker-end="url(#arrowMuted)"/>

  <rect x="22" y="210" width="80" height="30" rx="6" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="62" y="229" text-anchor="middle" font-size="11.5" fill="#333">dataset / labels</text>
  <rect x="110" y="210" width="80" height="30" rx="6" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="150" y="229" text-anchor="middle" font-size="11.5" fill="#333">calibration</text>
  <rect x="198" y="210" width="80" height="30" rx="6" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="238" y="229" text-anchor="middle" font-size="11.5" fill="#333">observation</text>

  <text x="150" y="262" text-anchor="middle" font-size="11" fill="#999">terminal witnesses: trusted roots where replay bottoms out</text>

  <!-- stranger replay loop: verdict back into the build -->
  <path d="M 600 140 C 600 330, 310 330, 310 106" fill="none" stroke="#9a9a9a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrowMuted)"/>
  <text x="455" y="350" text-anchor="middle" font-size="11.5" fill="#777">a distrusting stranger replays the build</text>
  <text x="455" y="366" text-anchor="middle" font-size="11.5" fill="#777">entitlement is surviving the replay, not the self-grade</text>
</svg>
 