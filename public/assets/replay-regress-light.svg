<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="14" fill="#222" font-weight="600">Attestation</text>
  <text x="360" y="46" text-anchor="middle" font-size="11.5" fill="#777">every truster needs a truster</text>

  <!-- claim -->
  <rect x="18" y="78" width="86" height="34" rx="8" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="61" y="99" text-anchor="middle" font-size="13" fill="#222">agent</text>
  <line x1="106" y1="95" x2="144" y2="95" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- attester -->
  <rect x="146" y="78" width="86" height="34" rx="8" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="189" y="99" text-anchor="middle" font-size="13" fill="#333">attester</text>
  <line x1="234" y1="95" x2="272" y2="95" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- checker 1 -->
  <rect x="274" y="78" width="86" height="34" rx="8" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="317" y="99" text-anchor="middle" font-size="13" fill="#333">auditor</text>
  <line x1="362" y1="95" x2="400" y2="95" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- checker 2 -->
  <rect x="402" y="78" width="86" height="34" rx="8" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="445" y="99" text-anchor="middle" font-size="13" fill="#333">checker</text>
  <line x1="490" y1="95" x2="528" y2="95" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- checker 3 -->
  <rect x="530" y="78" width="86" height="34" rx="8" fill="#f4f4f4" stroke="#bbb" stroke-width="1"/>
  <text x="573" y="99" text-anchor="middle" font-size="13" fill="#333">ensurer</text>
  <line x1="618" y1="95" x2="656" y2="95" stroke="#9a9a9a" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowMuted)"/>

  <!-- the regress: never bottoms out -->
  <text x="664" y="101" font-size="20" fill="#ccc">?</text>
  <text x="685" y="99" font-size="14" fill="#ddd">·&#160;·</text>
  <text x="360" y="138" text-anchor="middle" font-size="11" fill="#999">who vouches for the last? the chain never bottoms out</text>
</svg>
