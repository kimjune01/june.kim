<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 295" font-family="system-ui, sans-serif">
  <style>
    .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; fill: #c62828; }
    .codebg { fill: #f5f5f5; stroke: #ddd; stroke-width: 1; rx: 4; }
    .ent-box { fill: #fafafa; stroke: #999; stroke-width: 1; rx: 4; }
    .ent { font-family: ui-monospace, monospace; font-size: 12px; fill: #333; text-anchor: middle; }
    .ent-val { font-family: ui-monospace, monospace; font-size: 13px; fill: #333; text-anchor: middle; font-weight: 600; }
    .cn { fill: #fff; stroke: #c62828; stroke-width: 1.2; }
    .cn-label { font-family: ui-monospace, monospace; font-size: 12px; fill: #c62828; text-anchor: middle; font-weight: 600; }
    .edge { stroke: #c62828; stroke-width: 1; fill: none; }
  </style>

  <rect class="codebg" x="115" y="10" width="350" height="80"/>
  <text class="code" x="130" y="29">transfer(A, B, Amt) :−</text>
  <text class="code" x="130" y="47">  A.bal &gt;= Amt,</text>
  <text class="code" x="130" y="65">  A_new is A.bal − Amt,</text>
  <text class="code" x="130" y="83">  B_new is B.bal + Amt.</text>

  <rect class="ent-box" x="20" y="115" width="100" height="46"/>
  <text class="ent" x="70" y="133">A.bal</text>
  <text class="ent-val" x="70" y="152">500</text>

  <rect class="ent-box" x="240" y="115" width="100" height="46"/>
  <text class="ent" x="290" y="133">Amt</text>
  <text class="ent-val" x="290" y="152">100</text>

  <rect class="ent-box" x="460" y="115" width="100" height="46"/>
  <text class="ent" x="510" y="133">B.bal</text>
  <text class="ent-val" x="510" y="152">200</text>

  <line class="edge" x1="120" y1="138" x2="166" y2="138"/>
  <circle class="cn" cx="180" cy="138" r="14"/>
  <text class="cn-label" x="180" y="143">≥</text>
  <line class="edge" x1="194" y1="138" x2="240" y2="138"/>

  <line class="edge" x1="70" y1="161" x2="70" y2="210"/>
  <line class="edge" x1="290" y1="161" x2="290" y2="210"/>
  <line class="edge" x1="510" y1="161" x2="510" y2="210"/>

  <circle class="cn" cx="160" cy="210" r="14"/>
  <text class="cn-label" x="160" y="215">−</text>
  <line class="edge" x1="70" y1="210" x2="146" y2="210"/>
  <line class="edge" x1="290" y1="210" x2="174" y2="210"/>

  <circle class="cn" cx="420" cy="210" r="14"/>
  <text class="cn-label" x="420" y="215">+</text>
  <line class="edge" x1="290" y1="210" x2="406" y2="210"/>
  <line class="edge" x1="510" y1="210" x2="434" y2="210"/>

  <line class="edge" x1="160" y1="224" x2="160" y2="245"/>
  <line class="edge" x1="420" y1="224" x2="420" y2="245"/>

  <rect class="ent-box" x="110" y="245" width="100" height="40"/>
  <text class="ent" x="160" y="263">A_new</text>
  <text class="ent-val" x="160" y="279">400</text>

  <rect class="ent-box" x="370" y="245" width="100" height="40"/>
  <text class="ent" x="420" y="263">B_new</text>
  <text class="ent-val" x="420" y="279">300</text>
</svg>
