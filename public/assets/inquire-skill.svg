<svg viewBox="0 0 608 274" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #475569; font-size: 11px; }
    .dark { fill: #333; }
    .label { font-size: 10px; fill: #64748b; }
    .small { font-size: 10px; }
    .tiny { font-size: 9px; fill: #64748b; }
    .bold { font-weight: bold; }
    .amber { fill: #b45309; }
    .blue { fill: #1d4ed8; }
    .green { fill: #15803d; }
    .red { fill: #dc2626; }
    .ital { font-style: italic; }
  </style>
  <defs>
    <marker id="e" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="ew" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
    </marker>
    <marker id="el" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>

  <g transform="translate(0,-50)">
  <!-- OBSERVATION -->
  <rect x="36" y="62" width="240" height="40" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="50" y="86" class="dark small bold">Observation | Goal | Defect</text>
  <line x1="156" y1="104" x2="156" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#e)" />

  <!-- ABDUCTION -->
  <rect x="36" y="122" width="240" height="40" rx="5" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5" />
  <text x="50" y="146" class="blue small bold">ABDUCTION <tspan class="label" font-weight="normal">· generate hypotheses</tspan></text>
  <line x1="156" y1="164" x2="156" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#e)" />

  <!-- DEDUCTION -->
  <rect x="36" y="182" width="240" height="40" rx="5" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5" />
  <text x="50" y="206" class="blue small bold">DEDUCTION <tspan class="label" font-weight="normal">· design experiment</tspan></text>
  <line x1="156" y1="224" x2="156" y2="238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#e)" />

  <!-- INDUCTION -->
  <rect x="36" y="242" width="240" height="40" rx="5" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5" />
  <text x="50" y="266" class="blue small bold">INDUCTION <tspan class="label" font-weight="normal">· run the trial</tspan></text>

  <!-- loop back -->
  <path d="M 36 262 L 18 262 L 18 142 L 36 142" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#el)" />

  <!-- write arrows into the graph -->
  <path d="M 276 142 L 332 158" stroke="#cbd5e1" stroke-width="1.3" fill="none" marker-end="url(#ew)" />
  <path d="M 276 202 L 332 172" stroke="#cbd5e1" stroke-width="1.3" fill="none" marker-end="url(#ew)" />
  <path d="M 276 262 L 332 186" stroke="#cbd5e1" stroke-width="1.3" fill="none" marker-end="url(#ew)" />

  <!-- HYPOTHESIS GRAPH (smem) -->
  <rect x="336" y="62" width="252" height="220" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="462" y="86" text-anchor="middle" class="green small bold">HYPOTHESIS GRAPH</text>

  <!-- mini graph -->
  <!-- edges -->
  <path d="M 370 172 L 440 128" stroke="#cbd5e1" stroke-width="1.3" fill="none" />
  <path d="M 370 172 L 440 172" stroke="#cbd5e1" stroke-width="1.3" fill="none" />
  <path d="M 370 172 L 440 216" stroke="#cbd5e1" stroke-width="1.3" fill="none" />
  <path d="M 475 216 L 532 216" stroke="#cbd5e1" stroke-width="1.3" fill="none" />
  <!-- root -->
  <circle cx="366" cy="172" r="7" fill="#94a3b8" />
  <text x="366" y="192" text-anchor="middle" class="tiny">obs</text>
  <!-- killed abduction node -->
  <circle cx="455" cy="128" r="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" />
  <text x="468" y="125" class="tiny amber" style="text-decoration:line-through">H1</text>
  <text x="468" y="136" class="red tiny">&#10007; killed</text>
  <!-- killed abduction node -->
  <circle cx="455" cy="172" r="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" />
  <text x="468" y="169" class="tiny amber" style="text-decoration:line-through">H2</text>
  <text x="468" y="180" class="red tiny">&#10007; killed</text>
  <!-- witnessed node -->
  <circle cx="455" cy="216" r="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="468" y="213" class="tiny green bold">H3</text>
  <text x="468" y="224" class="green tiny">&#10003; witnessed</text>
  <!-- deduction node -->
  <circle cx="538" cy="216" r="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5" />
  <text x="538" y="236" text-anchor="middle" class="blue tiny">fix</text>

  <!-- footer -->
  <text x="304" y="308" text-anchor="middle" class="tiny ital">Named for Peirce's <tspan class="dark">inquiry</tspan>, the engine of discovery.</text>
  </g>
</svg>
