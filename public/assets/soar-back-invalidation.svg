<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 210" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <style>
    .tier{fill:#fff;stroke:#bbb;stroke-width:1.2;rx:6}
    .sub{text-anchor:middle;font-size:10px;fill:#6b7280}
    .fwd{stroke:#2e7d32;stroke-width:1.3;fill:none;marker-end:url(#fg)}
    .back{stroke:#c62828;stroke-width:1.3;fill:none;marker-end:url(#rb);stroke-dasharray:5,3}
    .ptr{stroke:#888;stroke-width:0.8;fill:none;marker-end:url(#sm);stroke-dasharray:2,2}
    .fwd-label{font-size:9px;fill:#2e7d32;text-anchor:middle}
    .back-label{font-size:9px;fill:#c62828;text-anchor:middle}
    .orphan{fill:#fff0f0;stroke:#c62828;stroke-width:1.5}
    .safe{fill:#c8e6c9;stroke:#2e7d32;stroke-width:1}
    .smem-node{fill:#e3f2fd;stroke:#1565c0;stroke-width:1.2}
    .ep-node{fill:#f3e5f5;stroke:#7b1fa2;stroke-width:1}
    .evicted{fill:none;stroke:#ccc;stroke-width:1.2;stroke-dasharray:4,3}
    .section{font-weight:600;font-size:10px;fill:#9ca3af;text-transform:uppercase;letter-spacing:2px}
  </style>
  <defs>
    <marker id="fg" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#2e7d32"/></marker>
    <marker id="rb" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#c62828"/></marker>
    <marker id="sm" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4" fill="#888"/></marker>
  </defs>

  <!-- Tier labels -->
  <text class="section" x="60" y="16">Working Memory</text>
  <text class="section" x="305" y="16">Semantic Memory</text>
  <text class="section" x="558" y="16">Episodic Memory</text>

  <!-- Tier boxes -->
  <rect class="tier" x="25" y="26" width="175" height="148"/>
  <rect class="tier" x="260" y="26" width="200" height="148"/>
  <rect class="tier" x="520" y="26" width="185" height="148"/>

  <!-- WM nodes: b is safe (backed by A), c is orphan (backed by evicted B) -->
  <circle class="safe" cx="80" cy="72" r="14"/>
  <text class="sub" x="80" y="73">b</text>

  <circle class="orphan" cx="80" cy="138" r="14"/>
  <text class="sub" x="80" y="139">c</text>
  <text class="sub" x="145" y="142" style="fill:#c62828;font-weight:600">orphan</text>

  <!-- SMEM nodes: A is live, B is evicted -->
  <circle class="smem-node" cx="320" cy="72" r="16"/>
  <text style="text-anchor:middle;dominant-baseline:central;font-weight:600;font-size:12px;fill:#1565c0" x="320" y="72">A</text>

  <circle class="evicted" cx="400" cy="72" r="16"/>
  <line x1="388" y1="60" x2="412" y2="84" stroke="#c62828" stroke-width="1.8"/>
  <line x1="412" y1="60" x2="388" y2="84" stroke="#c62828" stroke-width="1.8"/>
  <text class="sub" x="400" y="108" style="fill:#c62828;font-weight:600">evicted B</text>

  <circle class="smem-node" cx="360" cy="145" r="16"/>
  <text style="text-anchor:middle;dominant-baseline:central;font-weight:600;font-size:12px;fill:#1565c0" x="360" y="145">C</text>

  <!-- EPMEM nodes -->
  <circle class="ep-node" cx="565" cy="60" r="11"/>
  <text class="sub" x="565" y="61" style="font-size:9px">e1</text>

  <circle class="ep-node" cx="645" cy="60" r="11"/>
  <text class="sub" x="645" y="61" style="font-size:9px">e2</text>

  <circle class="ep-node" cx="565" cy="115" r="11"/>
  <text class="sub" x="565" y="116" style="font-size:9px">e3</text>

  <circle class="ep-node" cx="645" cy="115" r="11"/>
  <text class="sub" x="645" y="116" style="font-size:9px">e4</text>

  <circle class="ep-node" cx="605" cy="160" r="11"/>
  <text class="sub" x="605" y="161" style="font-size:9px">e5</text>

  <!-- R4 forget: b → A (safe) -->
  <path class="fwd" d="M94,72 Q198,58 302,72"/>
  <text class="fwd-label" x="198" y="56">R4 forget</text>

  <!-- Back-invalidation: B evicted → walk back to find orphan c -->
  <path class="back" d="M384,80 Q240,138 94,135"/>
  <text class="back-label" x="260" y="134">back-invalidate</text>

  <!-- c's broken dependency on B (straight, above the curve) -->
  <path d="M94,130 Q238,92 382,76" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,4" fill="none"/>
  <text class="back-label" x="200" y="90">R4 forgot → B</text>

  <!-- Consolidate: epmem → smem C -->
  <path class="fwd" d="M554,115 Q465,120 376,145"/>
  <path class="fwd" d="M594,160 Q485,162 376,148"/>
  <text class="fwd-label" x="480" y="150">consolidate</text>

  <!-- Union-find pointers: epmem → smem -->
  <path class="ptr" d="M554,60 Q445,55 336,70"/>
  <path class="ptr" d="M634,60 Q525,55 416,70"/>
  <path class="ptr" d="M634,115 Q505,118 376,142"/>

  <!-- Legend -->
  <text class="sub" x="360" y="200">green = safe path | red = broken path | dotted = union-find pointers</text>
</svg>
