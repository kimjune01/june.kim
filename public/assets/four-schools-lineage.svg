<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1480" font-family="system-ui, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 600; fill: #333; text-anchor: middle; }
    .section { font-size: 14px; font-weight: 600; fill: #555; }
    .lane { fill: #fafafa; stroke: #ddd; stroke-width: 1; rx: 4; }
    .ph-imp { fill: #1565c0; }
    .ph-func { fill: #2e7d32; }
    .ph-dec { fill: #c62828; }
    .ph-act { fill: #ef6c00; }
    .lane-header { font-size: 13px; font-weight: 600; text-anchor: middle; }
    .year { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; fill: #888; }
    .lang { font-family: ui-monospace, monospace; font-size: 12px; fill: #333; }
    .bridge-box { fill: #fff; stroke: #bbb; stroke-width: 1; rx: 6; }
    .bridge-name { font-size: 13px; font-weight: 600; fill: #333; }
    .bridge-langs { font-family: ui-monospace, monospace; font-size: 11px; fill: #444; }
    .bridge-note { font-size: 11px; fill: #888; font-style: italic; }
    .quad-box { fill: #fff8e1; stroke: #f57f17; stroke-width: 1.5; rx: 6; }
    .quad-name { font-size: 14px; font-weight: 600; fill: #c62828; text-anchor: middle; }
    .quad-langs { font-family: ui-monospace, monospace; font-size: 12px; fill: #333; text-anchor: middle; }
    .dot-imp { fill: #1565c0; }
    .dot-func { fill: #2e7d32; }
    .dot-dec { fill: #c62828; }
    .dot-act { fill: #ef6c00; }
    .legend { font-size: 10px; fill: #888; }
  </style>

  <text class="title" x="360" y="32">Lineage of paradigms and their syntheses</text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#888" font-style="italic">programming-language pointers, oldest at top</text>

  <text class="section" x="20" y="85">The Four Schools</text>

  <rect class="lane" x="15" y="100" width="165" height="220"/>
  <text class="lane-header ph-imp" x="97" y="120">Imperative</text>
  <line x1="25" y1="130" x2="170" y2="130" stroke="#ddd"/>
  <text class="year" x="28" y="150">1957</text><text class="lang" x="68" y="150">Fortran</text>
  <text class="year" x="28" y="170">1960</text><text class="lang" x="68" y="170">Algol</text>
  <text class="year" x="28" y="190">1972</text><text class="lang" x="68" y="190">C</text>
  <text class="year" x="28" y="210">1991</text><text class="lang" x="68" y="210">Python</text>
  <text class="year" x="28" y="230">1995</text><text class="lang" x="68" y="230">Java</text>
  <text class="year" x="28" y="250">1995</text><text class="lang" x="68" y="250">JavaScript</text>
  <text class="year" x="28" y="270">2009</text><text class="lang" x="68" y="270">Go</text>
  <text class="year" x="28" y="296">core</text><text class="lang" x="68" y="296" font-style="italic">DS&amp;A, OS, …</text>

  <rect class="lane" x="190" y="100" width="165" height="220"/>
  <text class="lane-header ph-func" x="272" y="120">Functional</text>
  <line x1="200" y1="130" x2="345" y2="130" stroke="#ddd"/>
  <text class="year" x="203" y="150">1958</text><text class="lang" x="243" y="150">Lisp</text>
  <text class="year" x="203" y="170">1973</text><text class="lang" x="243" y="170">ML</text>
  <text class="year" x="203" y="190">1990</text><text class="lang" x="243" y="190">Haskell</text>
  <text class="year" x="203" y="210">1996</text><text class="lang" x="243" y="210">OCaml</text>
  <text class="year" x="203" y="230">2007</text><text class="lang" x="243" y="230">Clojure</text>
  <text class="year" x="203" y="296">core</text><text class="lang" x="243" y="296" font-style="italic">λ-calculus</text>

  <rect class="lane" x="365" y="100" width="165" height="220"/>
  <text class="lane-header ph-dec" x="447" y="120">Declarative</text>
  <line x1="375" y1="130" x2="520" y2="130" stroke="#ddd"/>
  <text class="year" x="378" y="150">1972</text><text class="lang" x="418" y="150">Prolog</text>
  <text class="year" x="378" y="170">1974</text><text class="lang" x="418" y="170">SQL</text>
  <text class="year" x="378" y="190">1977</text><text class="lang" x="418" y="190">Datalog</text>
  <text class="year" x="378" y="210">1976</text><text class="lang" x="418" y="210">Make</text>
  <text class="year" x="378" y="230">1993</text><text class="lang" x="418" y="230">HTML</text>
  <text class="year" x="378" y="296">core</text><text class="lang" x="418" y="296" font-style="italic">Horn clauses</text>

  <rect class="lane" x="540" y="100" width="165" height="220"/>
  <text class="lane-header ph-act" x="622" y="120">Actors</text>
  <line x1="550" y1="130" x2="695" y2="130" stroke="#ddd"/>
  <text class="year" x="553" y="150">1973</text><text class="lang" x="593" y="150">Hewitt model</text>
  <text class="year" x="553" y="170">1986</text><text class="lang" x="593" y="170">Erlang</text>
  <text class="year" x="553" y="190">2009</text><text class="lang" x="593" y="190">Akka</text>
  <text class="year" x="553" y="210">2011</text><text class="lang" x="593" y="210">Elixir</text>
  <text class="year" x="553" y="230">2015</text><text class="lang" x="593" y="230">Pony</text>
  <text class="year" x="553" y="296">core</text><text class="lang" x="593" y="296" font-style="italic">π-calculus</text>

  <text class="section" x="20" y="365">The Six Bridges</text>

  <rect class="bridge-box" x="15" y="380" width="690" height="120"/>
  <circle class="dot-imp" cx="35" cy="402" r="6"/>
  <circle class="dot-func" cx="50" cy="402" r="6"/>
  <text class="bridge-name" x="65" y="406">Imperative + Functional</text>
  <text class="bridge-langs" x="35" y="432">1973 ML  ·  1990 Haskell (IO monad)  ·  1996 OCaml  ·  2004 Scala  ·  2005 F#</text>
  <text class="bridge-langs" x="35" y="452">2010 Rust (linear types)  ·  2011 Kotlin  ·  2012 Koka  ·  2014 Swift  ·  2022 OCaml 5 (effects)</text>
  <text class="bridge-note" x="35" y="480">Mature. Frontier: algebraic effects replacing monad transformers; effect inference.</text>

  <rect class="bridge-box" x="15" y="510" width="690" height="120"/>
  <circle class="dot-imp" cx="35" cy="532" r="6"/>
  <circle class="dot-dec" cx="50" cy="532" r="6"/>
  <text class="bridge-name" x="65" y="536">Imperative + Declarative</text>
  <text class="bridge-langs" x="35" y="562">1969 Hoare logic  ·  1986 Eiffel (DbC)  ·  2008 Liquid Haskell  ·  2009 Dafny</text>
  <text class="bridge-langs" x="35" y="582">2011 F*  ·  2021 Lean 4  ·  2024 LLM-aided proof (Goedel-Prover, …)</text>
  <text class="bridge-note" x="35" y="610">Frontier: cost of writing a spec collapsing; verified projects newly economical.</text>

  <rect class="bridge-box" x="15" y="640" width="690" height="120"/>
  <circle class="dot-imp" cx="35" cy="662" r="6"/>
  <circle class="dot-act" cx="50" cy="662" r="6"/>
  <text class="bridge-name" x="65" y="666">Imperative + Actors</text>
  <text class="bridge-langs" x="35" y="692">1986 Erlang  ·  2009 Akka  ·  2009 Go (CSP-lite)  ·  2010 Orleans (virtual actors)</text>
  <text class="bridge-langs" x="35" y="712">2015 Pony (no data races)  ·  2019 Temporal  ·  2023 Restate, Dapr</text>
  <text class="bridge-note" x="35" y="740">Frontier: durable execution. Actors absorbing the database.</text>

  <rect class="bridge-box" x="15" y="770" width="690" height="120"/>
  <circle class="dot-func" cx="35" cy="792" r="6"/>
  <circle class="dot-dec" cx="50" cy="792" r="6"/>
  <text class="bridge-name" x="65" y="796">Functional + Declarative</text>
  <text class="bridge-langs" x="35" y="822">1989 Coq  ·  1995 Mercury  ·  2007 Agda  ·  2007 Idris  ·  2021 Lean 4 (as a language)</text>
  <text class="bridge-langs" x="35" y="842">2021 egg / eqlog  ·  Soufflé Datalog  ·  differentiable Datalog (research)</text>
  <text class="bridge-note" x="35" y="870">Frontier: e-graphs for compilers; neuro-symbolic systems.</text>

  <rect class="bridge-box" x="15" y="900" width="690" height="120"/>
  <circle class="dot-func" cx="35" cy="922" r="6"/>
  <circle class="dot-act" cx="50" cy="922" r="6"/>
  <text class="bridge-name" x="65" y="926">Functional + Actors</text>
  <text class="bridge-langs" x="35" y="952">1986 Erlang  ·  2011 Elixir  ·  2017 Akka Typed  ·  2016 Unison</text>
  <text class="bridge-note" x="35" y="980">Frontier: Unison-style — content-addressed pure functions distributed across actors.</text>
  <text class="bridge-note" x="35" y="1000">Pure-vs-stateful becomes a deployment concern, not a language concern.</text>

  <rect class="bridge-box" x="15" y="1030" width="690" height="120"/>
  <circle class="dot-dec" cx="35" cy="1052" r="6"/>
  <circle class="dot-act" cx="50" cy="1052" r="6"/>
  <text class="bridge-name" x="65" y="1056">Declarative + Actors</text>
  <text class="bridge-langs" x="35" y="1082">1993 Honda session types  ·  2004 BPMN  ·  ~2007 behavior trees (game AI)  ·  2019 Temporal workflows</text>
  <text class="bridge-langs" x="35" y="1102">2023+ LangGraph / CrewAI / AutoGen / Inngest agents  ·  multiparty choreographies</text>
  <text class="bridge-note" x="35" y="1130">Least settled. Where multi-agent LLM systems are about to live.</text>

  <text class="section" x="20" y="1195">All Four</text>

  <rect class="quad-box" x="15" y="1210" width="690" height="180"/>
  <text class="quad-name" x="360" y="1238">The four-way intersection: cognitive architectures</text>
  <text class="quad-langs" x="360" y="1268">1983 Soar  ·  1993 ACT-R</text>
  <text class="quad-langs" x="360" y="1290">2023 LangGraph · CrewAI · AutoGen (proto-stacks)</text>
  <text class="quad-langs" x="360" y="1318" font-size="20" fill="#c62828">?</text>
  <text class="bridge-note" x="360" y="1342" text-anchor="middle">No canonical language for the four-way synthesis exists yet.</text>
  <text class="bridge-note" x="360" y="1362" text-anchor="middle">Whoever builds the Smalltalk for cognitive architectures owns a generation.</text>

  <text class="legend" x="15" y="1438">Each language sits in the column whose paradigm it most cleanly belongs to. Many appear in multiple bridges.</text>
  <text class="legend" x="15" y="1455">Erlang is in three (imperative + actors, functional + actors, and the actors lane itself) because it answered three questions at once.</text>
</svg>
