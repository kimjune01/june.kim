<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <style>
    .ok{fill:#f0faf0;stroke:#2e7d32;stroke-width:2}
    .broken{fill:#fffbeb;stroke:#b45309;stroke-width:1.5;stroke-dasharray:6,3}
    .partial{fill:#fffbeb;stroke:#d97706;stroke-width:1.5;rx:14;stroke-dasharray:6,3}
    .neutral{fill:#fafafa;stroke:#d1d5db;stroke-width:1.2}
    .name{text-anchor:middle;dominant-baseline:central;font-weight:700;font-size:14px;fill:#1f2937}
    .sub{text-anchor:middle;font-size:11px;fill:#6b7280}
    .tag-ok{text-anchor:middle;font-size:11px;fill:#2e7d32;font-weight:600}
    .tag-broken{text-anchor:middle;font-size:11px;fill:#b45309;font-weight:600}
    .tag-partial{text-anchor:middle;font-size:11px;fill:#d97706;font-weight:600}
    .tag-nil{text-anchor:middle;font-size:11px;fill:#9ca3af;font-weight:500}
    .section{font-weight:600;font-size:10px;fill:#9ca3af;text-anchor:middle;text-transform:uppercase;letter-spacing:2px}
    .conn{stroke:#d1d5db;stroke-width:1.2;fill:none}
    .conn-ok{stroke:#2e7d32;stroke-width:1.8;fill:none}
    .conn-broken{stroke:#b45309;stroke-width:1.2;fill:none;stroke-dasharray:5,3}
    .ah{fill:#d1d5db}.ah-ok{fill:#2e7d32}.ah-broken{fill:#b45309}
  </style>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" class="ah"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" class="ah-ok"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" class="ah-broken"/></marker>
  </defs>

  <!-- ═══ LTM ROW ═══ -->
  <text class="section" x="480" y="18">Long-Term Memories</text>

  <rect class="ok" rx="14" x="24" y="30" width="200" height="64"/>
  <text class="name" x="124" y="52">Procedural</text>
  <text class="sub" x="124" y="68">RETE network</text>
  <text class="tag-ok" x="124" y="84">✓ has backward pass</text>

  <rect class="broken" rx="14" x="252" y="30" width="200" height="64"/>
  <text class="name" x="352" y="52">Semantic</text>
  <text class="sub" x="352" y="68">SMEM · graph facts</text>
  <text class="tag-broken" x="352" y="84">✗ no auto-learning</text>

  <rect class="broken" rx="14" x="480" y="30" width="200" height="64"/>
  <text class="name" x="580" y="52">Episodic</text>
  <text class="sub" x="580" y="68">EPMEM · snapshots</text>
  <text class="tag-broken" x="580" y="84">✗ no generalization</text>

  <rect class="partial" rx="14" x="708" y="30" width="200" height="64"/>
  <text class="name" x="808" y="52">Perceptual LTM</text>
  <text class="sub" x="808" y="68">image memory</text>
  <text class="tag-partial" x="808" y="84">~ experimental</text>

  <!-- ═══ LEARNING ROW ═══ -->
  <text class="section" x="480" y="136">Learning Modules</text>

  <rect class="partial" rx="14" x="24" y="148" width="140" height="52"/>
  <text class="name" x="94" y="168">RL</text>
  <text class="tag-partial" x="94" y="186">~ delta-bar-delta</text>

  <rect class="broken" rx="14" x="176" y="148" width="140" height="52"/>
  <text class="name" x="246" y="168">Chunking</text>
  <text class="tag-broken" x="246" y="186">✗ no self-review</text>

  <rect class="broken" rx="14" x="356" y="148" width="170" height="52"/>
  <text class="name" x="441" y="168">Semantic Lrn.</text>
  <text class="tag-broken" x="441" y="186">✗ 3/6 missing</text>

  <rect class="broken" rx="14" x="556" y="148" width="170" height="52"/>
  <text class="name" x="641" y="168">Episodic Lrn.</text>
  <text class="tag-broken" x="641" y="186">✗ no attend</text>

  <rect class="partial" rx="14" x="756" y="148" width="140" height="52"/>
  <text class="name" x="826" y="168">SVS</text>
  <text class="tag-partial" x="826" y="186">~ experimental</text>

  <!-- ═══ Arrows: Learning → LTM ═══ -->
  <!-- RL → Procedural (functional path) -->
  <path class="conn-ok" d="M74,148 L74,120 Q74,104 84,104 L114,104 Q124,104 124,94" marker-end="url(#ag)"/>
  <!-- Chunking → Procedural (functional path) -->
  <path class="conn-ok" d="M226,148 L226,120 Q226,104 216,104 L144,104 Q134,104 134,94" marker-end="url(#ag)"/>
  <!-- Semantic Lrn → Semantic (broken path) -->
  <path class="conn-broken" d="M441,148 L441,120 Q441,104 421,104 L372,104 Q352,104 352,94" marker-end="url(#ar)"/>
  <!-- Episodic Lrn → Episodic (broken path) -->
  <path class="conn-broken" d="M641,148 L641,120 Q641,104 621,104 L600,104 Q580,104 580,94" marker-end="url(#ar)"/>
  <!-- SVS → Perceptual LTM -->
  <path class="conn" d="M826,148 L826,120 Q826,104 816,104 L818,104 Q808,104 808,94" marker-end="url(#a)"/>

  <!-- ═══ PROCESSING ROW ═══ -->
  <text class="section" x="480" y="248">Processing</text>

  <rect class="neutral" rx="14" x="160" y="260" width="280" height="64"/>
  <text class="name" x="300" y="282">Working Memory</text>
  <text class="sub" x="300" y="298">WME graph · central hub</text>
  <text class="tag-nil" x="300" y="314">nil (expected)</text>

  <rect class="ok" rx="14" x="500" y="260" width="280" height="64"/>
  <text class="name" x="640" y="282">Decision Cycle</text>
  <text class="sub" x="640" y="298">Input → Elab → Select → Apply → Output</text>
  <text class="tag-partial" x="640" y="314">partial — delegates to learning</text>

  <!-- WM ↔ Decision Cycle -->
  <line class="conn" x1="440" y1="286" x2="498" y2="286" marker-end="url(#a)"/>
  <line class="conn" x1="498" y1="300" x2="440" y2="300" marker-end="url(#a)"/>

  <!-- LTMs → Working Memory (all feed through WM) -->
  <path class="conn" d="M124,94 L124,230 Q124,240 134,240 L290,240 Q300,240 300,250 L300,258" marker-end="url(#a)"/>
  <path class="conn" d="M352,94 L352,230 Q352,240 342,240 L310,240 Q300,240 300,250 L300,258" marker-end="url(#a)"/>
  <path class="conn" d="M580,94 L580,230 Q580,240 570,240 L320,240 Q310,240 310,250 L310,258" marker-end="url(#a)"/>

  <!-- Learning → Working Memory -->
  <path class="conn" d="M94,200 L94,230 Q94,240 104,240 L280,240 Q290,240 290,250 L290,258" marker-end="url(#a)"/>

  <!-- ═══ EMBODIMENT ═══ -->
  <text class="section" x="480" y="368">Embodiment</text>

  <rect class="neutral" rx="14" x="220" y="380" width="160" height="44"/>
  <text class="name" x="300" y="406">Perception</text>

  <rect class="neutral" rx="14" x="560" y="380" width="160" height="44"/>
  <text class="name" x="640" y="406">Motor</text>

  <!-- Perception → WM -->
  <line class="conn" x1="300" y1="380" x2="300" y2="326" marker-end="url(#a)"/>
  <!-- Decision Cycle → Motor -->
  <line class="conn" x1="640" y1="326" x2="640" y2="378" marker-end="url(#a)"/>

  <!-- ═══ LEGEND ═══ -->
  <g transform="translate(100,460)">
    <rect class="ok" rx="14" x="0" y="0" width="14" height="14"/>
    <text font-size="11" x="20" y="11" fill="#6b7280">Backward pass works</text>

    <rect class="broken" rx="14" x="180" y="0" width="14" height="14"/>
    <text font-size="11" x="200" y="11" fill="#6b7280">Backward pass missing</text>

    <rect class="partial" rx="14" x="360" y="0" width="14" height="14"/>
    <text font-size="11" x="380" y="11" fill="#6b7280">Partial / experimental</text>

    <rect class="neutral" rx="14" x="540" y="0" width="14" height="14"/>
    <text font-size="11" x="560" y="11" fill="#6b7280">Nil (expected)</text>
  </g>
</svg>
