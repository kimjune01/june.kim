<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="1.2"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2e7d32" stroke-width="1.2"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1565c0" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="75" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">GOAL</text>
  <text x="280" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">VOLLEY 1</text>
  <text x="510" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">BLIND-BLIND-MERGE</text>
  <text x="735" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">VOLLEY 2</text>
  <text x="880" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">SHIP</text>

  <!-- Phase dividers -->
  <line x1="170" y1="12" x2="170" y2="310" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="390" y1="12" x2="390" y2="310" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="635" y1="12" x2="635" y2="310" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="835" y1="12" x2="835" y2="310" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- GOAL -->
  <rect x="15" y="60" width="120" height="56" rx="7" fill="#bbdefb" stroke="#90caf9" stroke-width="1"/>
  <text x="75" y="84" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Goal</text>
  <text x="75" y="104" text-anchor="middle" font-size="11" fill="#555" font-style="italic">one sentence</text>

  <!-- VOLLEY 1: Claude -->
  <rect x="195" y="52" width="100" height="52" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="245" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Claude</text>
  <text x="245" y="93" text-anchor="middle" font-size="10" fill="#555" font-style="italic">draft</text>

  <!-- VOLLEY 1: Codex -->
  <rect x="325" y="52" width="50" height="52" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="350" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Codex</text>

  <!-- Volley 1 arrows -->
  <line x1="295" y1="68" x2="320" y2="68" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="325" y1="88" x2="300" y2="88" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Volley 1 output -->
  <rect x="200" y="125" width="155" height="40" rx="7" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="277" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Sharp spec</text>

  <!-- Converge to output -->
  <line x1="245" y1="104" x2="260" y2="121" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="350" y1="104" x2="305" y2="121" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Input → Claude -->
  <line x1="135" y1="88" x2="190" y2="78" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- BLIND-BLIND-MERGE: Agent A -->
  <rect x="410" y="45" width="110" height="50" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="465" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Agent A</text>
  <text x="465" y="84" text-anchor="middle" font-size="10" fill="#999" font-style="italic">blind impl</text>

  <!-- BLIND-BLIND-MERGE: Agent B -->
  <rect x="535" y="45" width="85" height="50" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="577" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Agent B</text>
  <text x="577" y="84" text-anchor="middle" font-size="10" fill="#999" font-style="italic">blind impl</text>

  <!-- Merge output -->
  <rect x="430" y="125" width="155" height="40" rx="7" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="507" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Merged PR</text>

  <line x1="465" y1="95" x2="487" y2="121" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="577" y1="95" x2="530" y2="121" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Bug annotation -->
  <text x="507" y="182" text-anchor="middle" font-size="10" fill="#2e7d32">~½ bugs vs single impl</text>

  <!-- Spec → agents -->
  <line x1="355" y1="145" x2="405" y2="75" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="355" y1="145" x2="530" y2="75" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- VOLLEY 2: Claude -->
  <rect x="655" y="52" width="100" height="52" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="705" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Claude</text>
  <text x="705" y="93" text-anchor="middle" font-size="10" fill="#555" font-style="italic">review</text>

  <!-- VOLLEY 2: Codex -->
  <rect x="785" y="52" width="50" height="52" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="810" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Codex</text>

  <!-- Volley 2 arrows -->
  <line x1="755" y1="68" x2="780" y2="68" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="785" y1="88" x2="760" y2="88" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Volley 2 output -->
  <rect x="660" y="125" width="155" height="40" rx="7" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="737" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Clean PR</text>

  <line x1="705" y1="104" x2="720" y2="121" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="810" y1="104" x2="765" y2="121" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Merged PR → Volley 2 -->
  <line x1="585" y1="145" x2="650" y2="78" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- SHIP -->
  <rect x="850" y="60" width="80" height="56" rx="7" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="890" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">Ship</text>
  <text x="890" y="104" text-anchor="middle" font-size="9" fill="#555" font-style="italic">inspect or trust tests</text>

  <!-- Clean PR → Ship -->
  <path d="M815,145 C835,145 845,88 845,88" fill="none" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <!-- Human checkpoints -->
  <text x="75" y="260" text-anchor="middle" font-size="11" fill="#e65100">✓ human</text>
  <text x="277" y="260" text-anchor="middle" font-size="11" fill="#e65100">✓ human</text>
  <text x="737" y="260" text-anchor="middle" font-size="11" fill="#e65100">✓ human</text>
  <text x="890" y="260" text-anchor="middle" font-size="11" fill="#e65100">✓ human</text>

  <line x1="75" y1="116" x2="75" y2="250" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="277" y1="165" x2="277" y2="250" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="737" y1="165" x2="737" y2="250" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="890" y1="116" x2="890" y2="250" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
</svg>
