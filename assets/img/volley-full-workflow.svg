<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="1.2"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2e7d32" stroke-width="1.2"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1565c0" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">GOAL</text>
  <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">VOLLEY 1</text>
  <text x="730" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">BLIND-BLIND-MERGE</text>
  <text x="1060" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">VOLLEY 2</text>
  <text x="1310" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">SHIP</text>

  <!-- Phase dividers -->
  <line x1="260" y1="12" x2="260" y2="230" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="550" y1="12" x2="550" y2="230" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="910" y1="12" x2="910" y2="230" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="1210" y1="12" x2="1210" y2="230" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- GOAL -->
  <rect x="30" y="60" width="180" height="50" rx="7" fill="#bbdefb" stroke="#90caf9" stroke-width="1"/>
  <text x="120" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Goal</text>
  <text x="120" y="99" text-anchor="middle" font-size="11" fill="#555" font-style="italic">one sentence</text>

  <!-- VOLLEY 1: Claude -->
  <rect x="290" y="55" width="120" height="46" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="350" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Claude</text>

  <!-- VOLLEY 1: Codex -->
  <rect x="450" y="55" width="90" height="46" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="495" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Codex</text>

  <!-- Volley 1 arrows -->
  <line x1="410" y1="70" x2="445" y2="70" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="450" y1="88" x2="415" y2="88" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Volley 1 output -->
  <rect x="300" y="118" width="180" height="36" rx="7" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="390" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Sharp spec</text>

  <!-- Converge to output -->
  <line x1="350" y1="101" x2="370" y2="114" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="495" y1="101" x2="430" y2="114" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Input → Claude -->
  <line x1="210" y1="85" x2="285" y2="78" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- BLIND-BLIND-MERGE -->
  <rect x="580" y="48" width="140" height="42" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="650" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Agent A</text>
  <text x="650" y="82" text-anchor="middle" font-size="10" fill="#999" font-style="italic">blind impl</text>

  <rect x="740" y="48" width="140" height="42" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="810" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Agent B</text>
  <text x="810" y="82" text-anchor="middle" font-size="10" fill="#999" font-style="italic">blind impl</text>

  <rect x="640" y="118" width="180" height="36" rx="7" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="730" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Merged PR</text>

  <line x1="650" y1="90" x2="700" y2="114" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="810" y1="90" x2="760" y2="114" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Bug annotation -->
  <text x="730" y="170" text-anchor="middle" font-size="10" fill="#2e7d32">~½ bugs vs single impl</text>

  <!-- Spec → agents -->
  <line x1="480" y1="136" x2="575" y2="75" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="480" y1="136" x2="735" y2="75" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- VOLLEY 2: Claude -->
  <rect x="940" y="55" width="120" height="46" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="1000" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Claude</text>

  <!-- VOLLEY 2: Codex -->
  <rect x="1100" y="55" width="90" height="46" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="1145" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Codex</text>

  <!-- Volley 2 arrows -->
  <line x1="1060" y1="70" x2="1095" y2="70" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="1100" y1="88" x2="1065" y2="88" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Volley 2 output -->
  <rect x="950" y="118" width="180" height="36" rx="7" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="1040" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Clean PR</text>

  <line x1="1000" y1="101" x2="1020" y2="114" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="1145" y1="101" x2="1080" y2="114" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Merged PR → Volley 2 -->
  <line x1="820" y1="136" x2="935" y2="78" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- SHIP -->
  <rect x="1230" y="60" width="160" height="50" rx="7" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="1310" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">Ship</text>
  <text x="1310" y="99" text-anchor="middle" font-size="10" fill="#555" font-style="italic">human inspects or trusts tests</text>

  <!-- Clean PR → Ship -->
  <path d="M1130,136 C1170,136 1200,85 1225,85" fill="none" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <!-- Human checkpoints -->
  <text x="120" y="210" text-anchor="middle" font-size="10" fill="#e65100">✓ human</text>
  <text x="390" y="210" text-anchor="middle" font-size="10" fill="#e65100">✓ human</text>
  <text x="1040" y="210" text-anchor="middle" font-size="10" fill="#e65100">✓ human</text>
  <text x="1310" y="210" text-anchor="middle" font-size="10" fill="#e65100">✓ human</text>

  <line x1="120" y1="110" x2="120" y2="202" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="390" y1="154" x2="390" y2="202" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="1040" y1="154" x2="1040" y2="202" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="1310" y1="110" x2="1310" y2="202" stroke="#e65100" stroke-width="0.8" stroke-dasharray="3,3"/>
</svg>
