<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <style>
    .node{fill:#e8e8e8;stroke:#999;stroke-width:1}
    .super{fill:#c8e6c9;stroke:#2e7d32;stroke-width:1.2}
    .edge{stroke:#bbb;stroke-width:1}
    .sedge{stroke:#2e7d32;stroke-width:1.2}
    .label{text-anchor:middle;dominant-baseline:central;font-weight:600;font-size:12px;fill:#1f2937}
    .sub{text-anchor:middle;font-size:10px;fill:#6b7280}
    .arrow{stroke:#999;stroke-width:1.2;fill:none;marker-end:url(#a)}
    .section{font-weight:600;font-size:10px;fill:#9ca3af;text-transform:uppercase;letter-spacing:2px}
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#999"/></marker>
  </defs>

  <!-- Left: big tree (one episode snapshot) -->
  <text class="section" x="90" y="14">Graph snapshot</text>

  <!-- root -->
  <circle class="node" cx="90" cy="42" r="8"/>
  <line class="edge" x1="90" y1="50" x2="50" y2="75"/>
  <line class="edge" x1="90" y1="50" x2="130" y2="75"/>

  <!-- L1 -->
  <circle class="node" cx="50" cy="82" r="8"/>
  <circle class="node" cx="130" cy="82" r="8"/>
  <line class="edge" x1="50" y1="90" x2="30" y2="115"/>
  <line class="edge" x1="50" y1="90" x2="70" y2="115"/>
  <line class="edge" x1="130" y1="90" x2="110" y2="115"/>
  <line class="edge" x1="130" y1="90" x2="150" y2="115"/>

  <!-- L2 leaves -->
  <circle class="node" cx="30" cy="122" r="7"/>
  <circle class="node" cx="70" cy="122" r="7"/>
  <circle class="node" cx="110" cy="122" r="7"/>
  <circle class="node" cx="150" cy="122" r="7"/>
  <line class="edge" x1="30" y1="129" x2="20" y2="150"/>
  <line class="edge" x1="30" y1="129" x2="40" y2="150"/>
  <line class="edge" x1="70" y1="129" x2="60" y2="150"/>
  <line class="edge" x1="70" y1="129" x2="80" y2="150"/>
  <line class="edge" x1="110" y1="129" x2="100" y2="150"/>
  <line class="edge" x1="150" y1="129" x2="140" y2="150"/>
  <line class="edge" x1="150" y1="129" x2="160" y2="150"/>

  <!-- L3 leaves -->
  <circle class="node" cx="20" cy="156" r="5"/>
  <circle class="node" cx="40" cy="156" r="5"/>
  <circle class="node" cx="60" cy="156" r="5"/>
  <circle class="node" cx="80" cy="156" r="5"/>
  <circle class="node" cx="100" cy="156" r="5"/>
  <circle class="node" cx="140" cy="156" r="5"/>
  <circle class="node" cx="160" cy="156" r="5"/>

  <text class="sub" x="90" y="185">15 nodes</text>

  <!-- Arrow: coarsen -->
  <line class="arrow" x1="185" y1="100" x2="235" y2="100"/>
  <text class="sub" x="210" y="90">coarsen</text>

  <!-- Middle: smaller tree (coarsened snapshot) -->
  <text class="section" x="310" y="14">Coarsened</text>

  <circle class="super" cx="310" cy="50" r="10"/>
  <line class="sedge" x1="310" y1="60" x2="275" y2="90"/>
  <line class="sedge" x1="310" y1="60" x2="345" y2="90"/>

  <circle class="super" cx="275" cy="98" r="9"/>
  <circle class="super" cx="345" cy="98" r="9"/>
  <line class="sedge" x1="275" y1="107" x2="258" y2="132"/>
  <line class="sedge" x1="275" y1="107" x2="292" y2="132"/>
  <line class="sedge" x1="345" y1="107" x2="345" y2="132"/>

  <circle class="super" cx="258" cy="140" r="8"/>
  <circle class="super" cx="292" cy="140" r="8"/>
  <circle class="super" cx="345" cy="140" r="8"/>

  <text class="sub" x="310" y="185">6 supernodes</text>

  <!-- Arrow: compose × δ -->
  <line class="arrow" x1="395" y1="100" x2="445" y2="100"/>
  <text class="sub" x="420" y="90">compose</text>
  <text class="sub" x="420" y="78">× δ</text>

  <!-- Right: single semantic tree -->
  <text class="section" x="560" y="14">SMEM entry</text>

  <circle cx="560" cy="58" r="12" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="560" y1="70" x2="520" y2="105" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="560" y1="70" x2="600" y2="105" stroke="#2e7d32" stroke-width="1.5"/>

  <circle cx="520" cy="113" r="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="600" cy="113" r="10" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>

  <text class="sub" x="560" y="155">stable structure</text>
  <text class="sub" x="560" y="168" style="font-style:italic">freq ≥ k across δ windows</text>
</svg>
