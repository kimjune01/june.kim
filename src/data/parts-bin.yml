# Perceive: data structure × codebook type
perceive_structure_codebook_grid:
  - data_structure: flat
    fixed: "JSON parsing"
    learned: "Autoencoder encoding"
  - data_structure: sequence
    fixed: "A/D conversion"
    learned: "BPE tokenization"
  - data_structure: tree
