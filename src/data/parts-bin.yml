types:
  raw:        "Unprocessed environmental input"
  encoded:    "Parseable by downstream"
  indexed:    "Retrievable by key"
  selected:   "Strictly smaller subset"
  ranked:     "Ordered, diverse, bounded"
  policy:     "Routing function: maps data to rankings"
  persisted:  "Retrievable on next cycle"

columns:

  # ── Perceive ──────────────────────────────────────────────
  - name: perceive
    input_type: raw
    output_type: encoded
    store: data
    contract: "Parseable by next step. Injects new bits."
    grid_axes:
      rows: [batch, stream]
      cols: [fixed, learned]
    grid:
      - row: batch
        fixed: "Lexical analysis, JSON parsing"
        learned: "BPE tokenization"
      - row: stream
        fixed: "A/D conversion"
        learned: "Streaming tokenizer (filling-the-blanks #8)"
    operations:
      - name: Lexical analysis
        precondition: Raw byte stream
        postcondition: Token sequence, parseable
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: "Parsing (LL/LR)"
        precondition: Token stream, conforms to grammar
        postcondition: AST with explicit structure, traversable
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: JSON parsing
        precondition: Raw string, well-formed
        postcondition: Structured object, addressable by key
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: A/D conversion
        precondition: Continuous analog signal
        postcondition: Discrete samples, quantized
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n)"
      - name: SIFT descriptor extraction
        precondition: Raw pixel grid
        postcondition: Keypoint descriptors, matchable
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n log n)"
        ref: "https://www.cs.ubc.ca/~lowe/papers/ijcv04.pdf"
      - name: Rabin fingerprint (rolling hash)
        precondition: Raw byte stream + window size
        postcondition: Sequence of hash fingerprints, matchable by downstream
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n)"
        ref: "https://en.wikipedia.org/wiki/Rabin_fingerprint"
        source: "Rabin (1981)"
      - name: Soundex / Double Metaphone
        precondition: Raw name string
        postcondition: Phonetic code, matchable by approximate pronunciation
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n)"
        source: "Russell & Odell (1918); Philips (2000)"
      - name: "Thompson's NFA construction"
        precondition: Raw regex pattern string
        postcondition: Nondeterministic finite automaton, executable by matcher
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(m)"
        source: "Thompson (1968)"
      - name: Burrows-Wheeler Transform
        precondition: Raw string
        postcondition: Permuted string grouping similar contexts, reversible, compressible by downstream
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
        source: "Burrows & Wheeler (1994)"
      - name: Huffman encoding (apply fixed table)
        precondition: Raw symbol stream + precomputed prefix code table
        postcondition: Variable-length bit sequence, decodable
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
        source: "Huffman (1952)"
      - name: Sinusoidal positional encoding
        precondition: Token sequence without position information
        postcondition: Position-encoded sequence, relative positions recoverable as linear functions
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n * d)"
        ref: "https://arxiv.org/abs/1706.03762"
        source: "Vaswani et al. (2017)"
      - name: RAG retrieval
        precondition: Query + external document store with embeddings
        postcondition: Retrieved context prepended to input, parseable by downstream
        iteration_stable: true
        fidelity: lossy  # retrieval may miss relevant documents
        variation: none
        cost: "O(log n) with index"
        source: "Lewis et al. (2020); Zhao et al. (2023) §9.6"
      - name: MCP tool protocol
        precondition: Agent needs access to external tools and resources
        postcondition: Standardized tool/resource descriptions parseable by agent, governance via allowlists and audit logging
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1) per tool registration"
        ref: "https://modelcontextprotocol.io/"
        source: "Anthropic (2024); Arunkumar et al. (2026) §4.1.3"
      - name: FIX/ITCH binary protocol parsing
        precondition: Raw binary wire-format message stream (market data or order flow)
        postcondition: Structured order/trade records, parseable by downstream
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n) with zero-copy deserialization"
        source: "FIX Trading Community (1992); NASDAQ ITCH (2004)"
      - name: ABI-encoded event log decoding
        precondition: Raw blockchain transaction receipt with ABI-encoded event topics and data
        postcondition: Structured event records with typed fields, addressable by event signature
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
        ref: "https://docs.soliditylang.org/en/latest/abi-spec.html"
        source: "Ethereum ABI specification (Wood, 2014)"

  # ── Cache ─────────────────────────────────────────────────
  - name: cache
    input_type: encoded
    output_type: indexed
    store: data
    contract: "Retrievable by key."
    grid_axes:
      - "Idreos (2018) periodic table: five design primitives"
    ref: "https://stratos.seas.harvard.edu/publications/periodic-table-data-structures"
    operations:
      - name: Hash indexing
        precondition: Records with stable keys
        postcondition: Keyed index, exact retrieval by key
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1) amortized"
      - name: B-tree index construction
        precondition: Records with ordered keys
        postcondition: Balanced index, retrieval + range queries
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n log n)"
      - name: Trie insertion
        precondition: String keys over finite alphabet
        postcondition: Prefix-indexed, retrieval by string or prefix
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n * k)"
      - name: Inverted index construction
        precondition: Tokenized corpus with document IDs
        postcondition: Posting lists, retrieval by term
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: LSM-tree flush
        precondition: Sorted runs in memory
        postcondition: Persistent key-value index, retrievable after compaction
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n log n)"
      - name: Skip-list indexing
        precondition: Ordered entries
        postcondition: Probabilistic index, O(log n) retrieval
        iteration_stable: true
        fidelity: lossless
        variation: structural  # random level assignment
        cost: "O(n log n)"
      - name: RETE incremental matching
        precondition: Graph-structured working memory + production rules with multi-condition LHS
        postcondition: All matching rule instantiations identified, incrementally maintained
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(delta) per WME change, not O(rules * WM)"
        ref: "https://github.com/SoarGroup/Soar/blob/development/Core/SoarKernel/src/decision_process/rete.cpp"
        source: "Soar (Forgy, 1982)"
      - name: Suffix array construction (SA-IS)
        precondition: Encoded string over finite alphabet
        postcondition: Sorted array of suffix positions, substring-retrievable in O(m + log n)
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
        source: "Manber & Myers (1993); SA-IS: Nong, Zhang & Chan (2009)"
      - name: Suffix tree construction (Ukkonen)
        precondition: Encoded string over finite alphabet
        postcondition: Compressed trie of all suffixes, O(m) substring retrieval
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
        source: "Weiner (1973); Ukkonen (1995)"
      - name: FM-Index construction
        precondition: Encoded string (BWT + suffix array)
        postcondition: Compressed full-text index, O(m) count queries in sublinear space
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
        ref: "https://en.wikipedia.org/wiki/FM-index"
        source: "Ferragina & Manzini (2000)"
      - name: Residual connection + LayerNorm
        precondition: Sub-layer input x + sub-layer output f(x)
        postcondition: Normalized residual x + f(x), identity shortcut preserves gradient flow
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(d)"
        ref: "https://arxiv.org/abs/1706.03762"
        source: "Vaswani et al. (2017); He et al. (2016); Ba et al. (2016)"
      - name: Paged memory (MemGPT)
        precondition: Long conversation history exceeding context window
        postcondition: Tiered storage (main context / archival / recall) with controller-driven page-in/page-out
        iteration_stable: true
        fidelity: lossy  # evicted pages only retrieved on demand
        variation: none
        cost: "O(1) per page operation"
        ref: "https://arxiv.org/abs/2310.08560"
        source: "Packer et al. (2023); Arunkumar et al. (2026) §4.1.2"
      - name: Order book (price-time priority queue)
        precondition: Stream of limit orders with price, quantity, timestamp
        postcondition: Price-level indexed, retrievable by best bid/ask in O(1), maintained under millions of updates/sec
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(log n) insert/cancel, O(1) best bid/ask"
        source: "Harris (2003); NASDAQ matching engine architecture"
      - name: Merkle tree indexing
        precondition: Set of records with content-addressable keys
        postcondition: Tree-indexed, retrievable by key, tamper-evident (any mutation invalidates root hash)
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(log n) insert, O(log n) proof generation"
        ref: "https://en.wikipedia.org/wiki/Merkle_tree"
        source: "Merkle (1979); Ethereum Patricia-Merkle trie (Wood, 2014)"
      - name: UTXO set indexing
        precondition: Transaction outputs with spend status
        postcondition: Indexed by (txid, vout), retrievable for spend validation, unspent/spent gate built into index
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1) lookup, O(n) total set"
        source: "Nakamoto (2008); Bitcoin Core UTXO set"
      - name: Minisketch set reconciliation
        precondition: Two peers with highly overlapping sets (e.g., mempool txids) + agreed sketch capacity d
        postcondition: Compact sketch from which symmetric difference is exactly recoverable if |A Δ B| ≤ d, explicit failure otherwise
        iteration_stable: true
        fidelity: lossless  # exact within capacity bound
        variation: none
        cost: "O(n) sketch, O(d²) decode"
        ref: "https://github.com/sipa/minisketch"
        source: "Naumenko et al. (2019); Erlay (BIP 330)"
      - name: Action DAG (HTN cache)
        precondition: DAG of decomposition nodes entered through multiple roots; each root is a natural-language goal, each node decomposes into children, leaves are API calls; sub-actions shared across goals
        postcondition: Goal resolved to API-call sequence via recursive descent; compiled path = zero LLM calls; miss = LLM fires once to decompose, writes speculatively; success promotes to trusted cache
        iteration_stable: true  # each execution populates nodes, converges to full compilation
        fidelity: lossy  # LLM decomposition approximate
        variation: stochastic  # LLM-generated decompositions on cache miss
        cost: "O(depth) compiled; O(depth × LLM) novel goal"
        ref: "/action-dag"
        source: "HTN planning (Erol, Hendler & Nau 1994); Soar chunking (Laird, Rosenbloom & Newell 1986); compound: june.kim 2026"

  # ── Filter ────────────────────────────────────────────────
  - name: filter
    input_type: indexed
    output_type: selected
    store: data
    contract: "Strictly smaller. Losers suppressed, winners forwarded."
    grid_axes:
      rows: [predicate, similarity, dominance, causal]
      cols: [exact, bounded_approximation, probabilistic]
      depth: [flat, sequence, tree, graph, partial_order, embedding_space]  # data structure axis
    grid:
      # 2D slice (flat data structure, original grid)
      - row: predicate
        exact: "WHERE, range query"
        bounded_approximation: "Threshold filtering (soft margin)"
        probabilistic: "Bloom filter"
      - row: similarity
        exact: "Exact NN pruning"
        bounded_approximation: "k-NN radius pruning"
        probabilistic: "LSH filtering"
      - row: dominance
        exact: "Pareto filtering"
        bounded_approximation: "ε-dominance"
        probabilistic: "Stochastic dominance"
      - row: causal
        exact: "do-calculus gate"
        bounded_approximation: "Conformal causal selection (Duan-Wasserman-Ramdas 2024)"
        probabilistic: "Propensity score gate"
        refs:
          bounded_approximation: "https://doi.org/10.1515/jci-2023-0059"
    # 3D slice: data structure × selection semantics (bounded error column)
    structure_grid:
      - structure: flat
        predicate: "Threshold filtering"
        similarity: "k-NN radius pruning"
        dominance: "ε-dominance"
        causal:
          - "Conformal causal selection (Duan-Wasserman-Ramdas 2024) [logged]"
          - "Randomized A/B + Benjamini-Hochberg FDR (Benjamini-Hochberg 1995) [designed]"
        refs:
          causal: "https://doi.org/10.1515/jci-2023-0059"
          causal_designed: "https://www.jstor.org/stable/2346101"
      - structure: sequence
        predicate: "Change-point detection"
        similarity: "DTW pruning"
        dominance: "Dominant skyline over multiple time series (2013)"
        causal:
          - "Spillover-adjusted causal filter (filling-the-blanks #4) [logged]"
          - "Operant conditioning (Skinner 1938) [logged]"
          - "Controlled interrupted time series with designed intervention (Bernal-Cummins-Gasparrini 2017) [designed]"
        refs:
          dominance: "https://jcst.ict.ac.cn/en/article/doi/10.1007/s11390-013-1363-z"
          causal_designed: "https://academic.oup.com/ije/article/46/1/348/2622842"
      - structure: tree
        predicate: "XPath + depth bound"
        similarity: "Tree edit distance threshold"
        dominance: "Subtree stochastic dominance (filling-the-blanks #5)"
        causal: "Luo & Guo 2023 (thin: subgroup trees only)"
        refs:
          causal: "https://doi.org/10.1002/sim.9900"
      - structure: graph
        predicate: "Approx subgraph match"
        similarity: "Graph kernel pruning"
        dominance: "Subgraph skyline (TKDE 2016), Pareto-optimal community search (CIKM 2021)"
        causal: "Nodewise e-BH on exposure-mapped supermartingales (return-to-sender) [designed]"
        refs:
          dominance: "https://weiguozheng.github.io/pub/tkde16-skyline.pdf"
          causal: "/return-to-sender"
      - structure: partial_order
        predicate: "DAGGER (Ramdas 2019)"  # FDR-controlled filtering on DAGs/posets
        similarity: "Order-context similarity filter (filling-the-blanks #6)"
        dominance: "Smoothed nested testing (thin: hypothesis-poset only)"
        causal:
          - "Closure-level causal filter (filling-the-blanks #2) [logged]"
          - "Adaptive staggered rollout / PGAE (Eichhorn-Kessler-Banerjee 2022; Xiong et al. 2024) [designed]"
        refs:
          predicate: "https://doi.org/10.1093/biomet/asy066"
          dominance: "https://ideas.repec.org/a/oup/biomet/v109y2022i2p457-471..html"
          dominance_exact: "https://en.wikipedia.org/wiki/Dominance-based_rough_set_approach"
          causal_designed: "https://arxiv.org/abs/2205.14552"
      - structure: embedding_space
        predicate: "ε-approximate range search"
        similarity: "c-ANN (cover tree, HNSW)"
        dominance: "Metric skyline (thin: exact only, no bounded-error guarantees)"
        causal: "Embedding causal filter (filling-the-blanks #7)"
        refs:
          similarity: "https://huggingface.co/papers/1603.09320"
          dominance: "https://ceur-ws.org/Vol-567/paper03.pdf"
    # Plane 4: temporality × selection semantics (bounded error column)
    temporality_grid:
      - temporality: batch
        predicate: "Threshold filtering"
        similarity: "k-NN radius pruning"
        dominance: "ε-dominance"
        causal: "Conformal causal selection"
      - temporality: stream
        predicate: "Count-Min Sketch, Stable Bloom Filter"
        similarity: "Streaming LSH"
        dominance: "Sliding window skyline (Tao et al.)"
        causal: "Xie et al. 2018 (thin: online A/B only)"
        refs:
          predicate: "https://en.wikipedia.org/wiki/Count%E2%80%93min_sketch"
          dominance: "https://cse.hkust.edu.hk/~dimitris/PAPERS/TKDE06-Sky.pdf"
          causal: "https://arxiv.org/abs/1808.04904"
    # Plane 2: stationarity × selection semantics (bounded error column)
    stationarity_grid:
      - stationarity: static
        predicate: "Threshold filtering"
        similarity: "k-NN radius pruning"
        dominance: "ε-dominance"
        causal: "Conformal causal selection"
      - stationarity: drifting
        predicate: "ADWIN (Bifet & Gavalda 2007)"
        similarity: "Adaptive k-NN (thin: no formal error bounds)"
        dominance: "Dynamic skyline under changing attributes (2017+)"
        causal: "Weighted conformal p-values under covariate shift (Biometrika 2025)"
        refs:
          predicate: "https://dl.acm.org/doi/10.1145/1150402.1150423"
          similarity: "https://ieeexplore.ieee.org/document/6835986"
          dominance: "https://www.mdpi.com/2220-9964/6/5/137"
          causal: "https://academic.oup.com/biomet/advance-article/doi/10.1093/biomet/asaf066/8250683"
    operations:
      - name: "Predicate selection (WHERE)"
        precondition: Indexed relation + boolean predicate
        postcondition: Subset matching predicate, strictly smaller
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless  # no false negatives
        variation: none
        cost: "O(n)"
      - name: Range query
        precondition: Ordered index + interval bounds
        postcondition: Subset within interval, strictly smaller
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(log n + k)"
      - name: Threshold filtering
        precondition: Scored items + threshold t
        postcondition: Subset meeting threshold, strictly smaller
        grid_position: [predicate, bounded_approximation]
        iteration_stable: true
        fidelity: lossy  # threshold may exclude near-boundary items
        variation: none
        cost: "O(n)"
      - name: Regex extraction
        precondition: String corpus + pattern
        postcondition: Matching spans retained, non-matches discarded
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: k-NN radius pruning
        precondition: Metric index + query + radius r
        postcondition: Subset within radius, strictly smaller
        grid_position: [similarity, bounded_approximation]
        iteration_stable: true
        fidelity: lossy  # radius is approximate boundary
        variation: none
        cost: "O(n) or O(log n) with index"
      - name: LSH filtering
        precondition: High-dimensional vectors + hash family
        postcondition: Candidate set, probabilistic recall
        grid_position: [similarity, probabilistic]
        iteration_stable: true
        fidelity: lossy  # false negatives by design
        variation: structural  # hash collisions are stochastic
        cost: "O(n^rho) sublinear"
        ref: "https://www.pinecone.io/learn/series/faiss/locality-sensitive-hashing/"
      - name: Justification-based truth maintenance
        precondition: Graph-structured working memory + rule instantiations with support type (I or O)
        postcondition: I-supported structures auto-retract when creating instantiation unmatches, strictly smaller
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1) per retraction"
        ref: "https://github.com/SoarGroup/Soar/blob/development/Core/SoarKernel/src/soar_representation/instantiation.cpp"
        source: "Soar (Forbus & DeKleer, 1993)"
      - name: Pareto filtering
        precondition: Candidates with objective vectors
        postcondition: Non-dominated subset, strictly smaller
        grid_position: [dominance, exact]
        iteration_stable: true  # Pareto front of a Pareto front is itself
        fidelity: lossless
        variation: none
        cost: "O(n log n) for 2D, O(n^(d-1)) general"
      - name: KMP / Boyer-Moore string matching
        precondition: Indexed text + single pattern
        postcondition: Match positions only, non-matches discarded
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n + m)"
        source: "Knuth, Morris & Pratt (1977); Boyer & Moore (1977)"
      - name: Aho-Corasick multi-pattern matching
        precondition: Indexed text + set of patterns (compiled to automaton)
        postcondition: All pattern match positions, non-matches discarded
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n + m + z) where z = total matches"
        source: "Aho & Corasick (1975)"
      - name: Bitap approximate matching
        precondition: Indexed text + pattern + edit threshold k
        postcondition: Positions within k edits of pattern, rest discarded
        grid_position: [similarity, bounded_approximation]
        iteration_stable: true
        fidelity: lossy  # bounded false negatives at word boundaries
        variation: none
        cost: "O(nm/w) where w = machine word size"
        source: "Baeza-Yates & Gonnet (1992)"
      - name: BLAST heuristic sequence search
        precondition: Indexed sequence database + query sequence
        postcondition: High-scoring segment pairs, low-scoring regions discarded
        grid_position: [similarity, probabilistic]
        iteration_stable: true
        fidelity: lossy  # heuristic, may miss distant homologs
        variation: none
        cost: "O(n) expected per database sequence"
        source: "Altschul et al. (1990)"
      - name: Causal masking
        precondition: Attention weight matrix over sequence positions
        postcondition: Future positions masked to -inf before softmax, autoregressive constraint enforced
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless  # no information loss — future is undefined, not discarded
        variation: none
        cost: "O(n²)"
        ref: "https://arxiv.org/abs/1706.03762"
        source: "Vaswani et al. (2017)"
      - name: Policy-driven pruning (MemAgent)
        precondition: Accumulated memory entries + learned importance policy
        postcondition: Low-value entries discarded, memory bounded
        grid_position: [predicate, probabilistic]
        iteration_stable: true
        fidelity: lossy  # policy may discard useful entries
        variation: stochastic  # depends on learned policy
        cost: "O(n) per pruning pass"
        source: "Arunkumar et al. (2026) §4.1.2"
      - name: Hierarchical verification (MAKER)
        precondition: Worker agent outputs + verifier agents
        postcondition: Challenged outputs accepted or rejected, near-zero error on long chains
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless  # verification catches errors
        variation: none
        cost: "O(k) verifier calls per output"
        source: "Arunkumar et al. (2026) §5.3.2"
      - name: Mempool fee-rate eviction
        precondition: Indexed pending transactions + fee rates + mempool size limit
        postcondition: Low-fee transactions evicted, strictly smaller, fee threshold drifts with demand
        grid_position: [dominance, bounded_approximation]
        iteration_stable: true
        fidelity: lossy  # near-boundary transactions may be wrongly evicted under rapid fee shifts
        variation: none
        cost: "O(log n) per eviction"
        source: "Bitcoin Core mempool policy; Ethereum txpool"
      - name: MEV extraction filter
        precondition: Indexed pending transactions + dependency graph + value function over orderings
        postcondition: Subset selected where reordering yields extractable value, non-profitable orderings discarded
        grid_position: [causal, probabilistic]
        iteration_stable: false  # adversarial: other searchers change the landscape
        fidelity: lossy  # estimation of extractable value is probabilistic
        variation: stochastic  # depends on mempool state and competing searchers
        cost: "O(n²) pairwise ordering checks"
        ref: "https://arxiv.org/abs/1904.05234"
        source: "Daian et al. (2019); Flashbots (2021)"
      - name: Action DAG (embedding filter)
        precondition: Natural-language intent + embedding index over DAG nodes (roots and one level below)
        postcondition: Closest matching subtree retrieved by semantic similarity; two-level query disambiguates across goals sharing sub-actions; thresholding required — fallback to LLM decomposition on low-confidence match
        grid_position: [similarity, bounded_approximation]
        iteration_stable: true
        fidelity: lossy  # nearest-neighbor retrieval approximate; failure modes: wrong match, stale subtree, overgeneralized shared node
        variation: none  # deterministic given index state
        cost: "O(log n) with index"
        ref: "/action-dag"
        source: "Case-based reasoning (Kolodner 1993); Voyager skill library (Wang et al. 2023); compound: june.kim 2026"
      - name: Circuit breaker / kill switch
        precondition: Streaming P&L or position metrics + predicate thresholds (drawdown, exposure)
        postcondition: Orders halted when threshold breached, strictly smaller output (zero)
        grid_position: [predicate, exact]
        iteration_stable: true
        fidelity: lossless  # hard gate, no false negatives
        variation: none
        cost: "O(1) per tick"
        source: "SEC Rule 15c3-5 (2010); HFT risk management"
      - name: PC algorithm
        precondition: Fully connected graph of causal hypotheses + oracle for conditional independence tests (statistical or human)
        postcondition: DAG (CPDAG) with edges removed where conditional independence holds; root nodes are root causes
        grid_position: [causal, exact]
        identification_control: logged  # consumes whatever the oracle returns; the observational/interventional split for PC is about the oracle's data regime, not the algorithm itself
        iteration_stable: true  # same oracle answers → same DAG
        fidelity: lossless  # under faithfulness assumption, recovers true equivalence class
        variation: none
        cost: "O(n^d) where d = max degree; log₂(n) interventional queries suffice for full orientation (Eberhardt 2005)"
        ref: "https://doi.org/10.1177/089443939100900106"
        source: "Spirtes & Glymour (1991); Spirtes, Glymour & Scheines (1993) Causation, Prediction, and Search"
      - name: Nodewise e-BH on exposure-mapped supermartingales
        precondition: >-
          Interaction graph (agents as nodes, messages as edges) + designed randomization of per-node friction
          (throttle/delay/fanout cap) over decision windows + observed harm signal in each node's k-hop neighborhood +
          per-node AIPW supermartingale accumulated from doubly-robust scores (see consolidate op)
        postcondition: >-
          Rejected set of nodes whose accumulated e-values exceed the e-BH threshold at target level q.
          FDR ≤ q under arbitrary dependence between nodes. Anytime-valid: stop at any time, no alpha correction.
        grid_position: [causal, bounded_approximation]
        grid_coords: { structure: graph, selection: causal }
        identification_control: designed  # validity depends on designed randomization; without it, e-values are meaningless
        iteration_stable: false  # adversarial; attackers shift tactics, graph evolves
        fidelity: lossy  # finite-sample FDR control, not zero-error
        variation: structural  # randomized interventions are part of the operation
        cost: "O(|V|) per decision window for e-BH ranking + supermartingale updates; intervention cost dominates in practice"
        ref: "/return-to-sender"
        source: >-
          Aronow & Samii (2017) exposure mappings; Wang & Ramdas (2022) e-BH under arbitrary dependence;
          Grünwald, de Heide & Koolen (2024) e-values; compound: june.kim 2026
        cross_reference: consolidate/graph/AIPW e-value supermartingale
      - name: Randomized flat-unit experiment with multiplicity control
        precondition: >-
          Pool of treatment hypotheses (variant arms) + uniform-random assignment of units to arms +
          per-arm outcome observations + multiplicity-control wrapper (BH for FDR; Bonferroni / hierarchical / α-spending for FWER)
        postcondition: >-
          Rejected set of arms with controlled error rate. The randomization does the causal identification;
          the multiplicity wrapper handles the multiple-testing inflation. BH targets expected FDR ≤ q under
          independence/PRDS; FWER variants target probability of any false rejection ≤ α (FDA drug approval lineage).
          Composition is conventional, not anytime-valid; e-BH (return-to-sender) is the anytime-valid sibling.
        grid_position: [causal, bounded_approximation]
        grid_coords: { structure: flat, selection: causal }
        identification_control: designed  # randomized assignment is the identification strategy; observational A/B is invalid
        iteration_stable: true
        fidelity: lossy  # finite-sample error control; Type II error tunable via q/α and power
        variation: structural  # randomization is constitutive
        cost: "O(n log n) for BH/Bonferroni ranking; sample size dominated by power requirements"
        ref: "https://www.jstor.org/stable/2346101"
        source: >-
          Fisher (1935) randomized design; Benjamini & Hochberg (1995) FDR procedure;
          Bonferroni (1936) / Holm (1979) FWER procedures; Kohavi-Tang-Xu (2020) industrial A/B testing;
          FDA Kefauver-Harris Amendment (1962) two-trial standard
      - name: Operant conditioning
        precondition: >-
          Agent with action repertoire + environmental contingencies (reinforcers/punishers) + temporal sequence of
          (action, outcome) pairs drawn from the agent's own behavior distribution
        postcondition: >-
          Action emission probabilities reshaped so reinforced behaviors are emitted more often. Filter-Remember couple
          where the agent's own selection is the source of reinforcement, but identification is not designed —
          the agent observes only outcomes of actions it would have taken anyway.
        grid_position: [causal, probabilistic]
        grid_coords: { structure: sequence, selection: causal }
        identification_control: logged  # no designed randomization; reinforcement follows the agent's natural action distribution
        iteration_stable: true  # converges within a stationary contingency
        fidelity: lossy  # credit assignment is noisy on extended sequences
        variation: stochastic  # behavior emission is probabilistic
        cost: "O(1) per (action, outcome) pair"
        note: >-
          "Operant conditioning" is a colloquial label for a real algorithmic family — Rescorla-Wagner, TD-learning,
          SARSA, Q-learning, and policy gradients on the agent's own action stream all instantiate it. Cited here as
          the family name; the consolidate side has Delta-bar-delta as one Soar-style instance.
        source: >-
          Skinner (1938) The Behavior of Organisms; Rescorla & Wagner (1972) associative learning rule;
          Sutton (1988) TD-learning; Watkins (1989) Q-learning; Sutton et al. (2000) policy gradient
        cross_reference: consolidate/Delta-bar-delta
      - name: Controlled interrupted time series with designed intervention
        precondition: >-
          Single unit (or cohort) observed over equally-spaced time periods + planned intervention at known time t* +
          parallel control series + segmented regression model (level + trend, pre vs post)
        postcondition: >-
          Estimated level/trend change attributable to the intervention with confounders absorbed by the control series.
          Quasi-experimental: identification comes from designed intervention *timing*, not from random unit assignment.
          Sits on the designed side of identification_control because the investigator schedules the intervention,
          but it does not provide RCT-strength identification — assumptions on parallel trends and stable control
          must hold.
        grid_position: [causal, bounded_approximation]
        grid_coords: { structure: sequence, selection: causal }
        identification_control: designed  # the intervention timing is chosen by the investigator (timing-designed, not assignment-randomized)
        iteration_stable: true
        fidelity: lossy  # depends on parallel-trends and stable-control assumptions
        variation: none
        cost: "O(T) for segmented regression on T time points"
        ref: "https://academic.oup.com/ije/article/46/1/348/2622842"
        source: >-
          Campbell & Stanley (1963) quasi-experimental designs; Bernal, Cummins & Gasparrini (2017) ITS tutorial;
          Linden (2015) controlled ITS for single- and multi-group comparisons
      - name: Adaptive staggered rollout (PGAE)
        precondition: >-
          Population partitioned into cohorts (a partial order on treatment timing) + budget for sequential rollout +
          interim outcome observations + decision rule for the next cohort's treatment fraction
        postcondition: >-
          Cohort-by-cohort treatment assignment that adapts to interim estimates; unbiased TTE under low-order
          interference; valid post-experiment inference even after early stopping.
        grid_position: [causal, bounded_approximation]
        grid_coords: { structure: partial_order, selection: causal }
        identification_control: designed  # the rollout schedule is the experimental design and adapts to interim data
        iteration_stable: true
        fidelity: lossy  # polynomial-extrapolation variance scales with interaction order
        variation: structural  # randomization is part of the design
        cost: "O(K * n_k) per cohort where K = rollout stages, n_k = cohort size"
        ref: "https://arxiv.org/abs/2205.14552"
        source: >-
          Eichhorn, Kessler & Banerjee (2022) staggered rollout under interference;
          Xiong, Athey & Bayati (2024) optimal experimental design for staggered rollouts;
          PGAE — precision-guided adaptive experiment

  # ── Attend ────────────────────────────────────────────────
  - name: attend
    input_type: [policy, selected]  # policy routes data
    output_type: ranked
    store: policy  # reads from policy store
    contract: "Ordered, diverse, bounded. Survivors are dissimilar."
    grid_axes:
      rows: [top_k_slate, single_best, path_tree]
      cols: [none, implicit, explicit]
    grid:
      - row: top_k_slate
        none: "Heap top-k"
        implicit: "Beam search"
        explicit: "MMR, DPP top-k, xQuAD"
      - row: single_best
        none: "argmax"
        implicit: "Tournament selection"
        explicit: "Simulated annealing, CMA-ES"
      - row: path_tree
        none: "Dijkstra, A*"
        implicit: "MCTS"
        explicit: "Portfolio solvers"
    near_misses:
      - name: "Quicksort / Mergesort"
        diagnosis: "Order only. No diversity, no bound."
        iteration_stable: true  # on order; unstable on diversity
      - name: "Top-k selection"
        diagnosis: "Bounded, no diversity."
        iteration_stable: false  # same winners every cycle
      - name: "PageRank"
        diagnosis: "Ranking, no diversity, no bound."
        iteration_stable: false  # rich get richer
    operations:
      - name: MMR re-ranking
        precondition: Candidates + relevance scores + similarity measure
        postcondition: Top-k ordered, diversity penalized, bounded
        grid_position: [top_k_slate, explicit]
        iteration_stable: true
        fidelity: lossy
        variation: none  # deterministic given scores
        cost: "O(k * n)"
        ref: "https://www.cs.cmu.edu/~jgc/publication/The_Use_MMR_Diversity_Based_LTMIR_1998.pdf"
      - name: DPP top-k selection
        precondition: Candidates + relevance weights + similarity kernel
        postcondition: Top-k ranked, mutually dissimilar, bounded
        grid_position: [top_k_slate, explicit]
        iteration_stable: true
        fidelity: lossy
        variation: sampling  # DPP is a probability distribution over subsets
        cost: "O(n * k^2)"
        ref: "https://arxiv.org/abs/1207.6083"
      - name: xQuAD re-ranking
        precondition: Candidates + relevance + subtopic coverage
        postcondition: Top-k ordered, aspect coverage explicit, bounded
        grid_position: [top_k_slate, explicit]
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(k * n * |subtopics|)"
        ref: "https://link.springer.com/chapter/10.1007/978-3-642-12275-0_11"
      - name: Submodular maximization
        precondition: Candidates + submodular utility (relevance + coverage)
        postcondition: Top-k greedy-ranked, diminishing-return diversity, bounded
        grid_position: [top_k_slate, explicit]
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(k * n)"
      - name: Diversified beam search
        precondition: Stepwise expansions + diversity penalty
        postcondition: Top-b retained, non-redundant alternatives, bounded
        grid_position: [top_k_slate, implicit]
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(b * n * steps)"
      - name: Surprise gate + DPP thinning
        precondition: Stream of episodes + importance signals (reward, impasse, novelty) + similarity kernel
        postcondition: High-importance novel episodes stored at full fidelity; periodic DPP pass ensures diversity in stored set
        iteration_stable: true
        fidelity: lossy
        variation: none  # surprise gate is deterministic; DPP sampling adds stochasticity at compaction
        cost: "O(1) per episode (gate); O(k^3) periodic (DPP thin)"
        ref: "https://cdn.aaai.org/ojs/11595/11595-13-15123-1-2-20201228.pdf"
        source: "Prescription Soar — episodic discrimination (Isele & Cosgun, 2018; Science, 2024)"
      - name: Scaled dot-product attention
        precondition: Query, key, value matrices of compatible dimension
        postcondition: Weighted value vectors, soft lookup by query-key similarity
        grid_position: [top_k_slate, implicit]
        iteration_stable: true
        fidelity: lossy  # soft weighting discards low-attention information
        variation: none
        cost: "O(n² * d)"
        ref: "https://arxiv.org/abs/1706.03762"
        source: "Vaswani et al. (2017)"
      - name: Multi-head projection
        precondition: Q, K, V + h learned projection matrices per head
        postcondition: h parallel attention outputs concatenated and projected, each head attends to different subspace
        grid_position: [top_k_slate, implicit]
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(h * n² * d/h) = O(n² * d)"
        ref: "https://arxiv.org/abs/1706.03762"
        source: "Vaswani et al. (2017)"
      - name: In-context learning
        precondition: Prompt containing examples + query, frozen model weights
        postcondition: Output conditioned on examples — learning without weight updates
        grid_position: [top_k_slate, implicit]
        iteration_stable: true
        fidelity: lossy  # bounded by context window and attention capacity
        variation: none
        cost: "O(n² * d) where n = prompt + examples length"
        source: "Brown et al. (2020); Zhao et al. (2023) §6.2"
      - name: Chain-of-thought prompting
        precondition: Problem + instruction to show reasoning steps
        postcondition: Intermediate reasoning tokens generated before answer, serial decomposition of parallel knowledge
        grid_position: [path_tree, implicit]
        iteration_stable: true
        fidelity: lossy
        variation: stochastic  # sampling-dependent
        cost: "O(steps * n * d)"
        source: "Wei et al. (2022); Zhao et al. (2023) §6.3"
      - name: ReAct loop
        precondition: Observation from environment + reasoning trace so far
        postcondition: Next action selected via interleaved thought-action-observation chain
        grid_position: [path_tree, implicit]
        iteration_stable: true
        fidelity: lossy  # myopic, no backtracking
        variation: stochastic
        cost: "O(n * d) per step"
        ref: "https://arxiv.org/abs/2210.03629"
        source: "Yao et al. (2022); Arunkumar et al. (2026) §4.2.1"
      - name: Tree of Thoughts
        precondition: Problem + evaluation function for intermediate thoughts
        postcondition: Best reasoning path found via BFS/DFS over thought tree with backtracking
        grid_position: [path_tree, explicit]
        iteration_stable: true
        fidelity: lossy
        variation: stochastic  # depends on generation and evaluation
        cost: "O(b^d * n) where b = branching, d = depth"
        ref: "https://arxiv.org/abs/2305.10601"
        source: "Yao et al. (2023); Arunkumar et al. (2026) §4.2.1"
      - name: Block building (Flashbots auction)
        precondition: Candidate transactions with dependency constraints (partial order) + value function (MEV + fees)
        postcondition: Ordered block of bounded size, maximizing extracted value, no conflicting transactions
        grid_position: [top_k_slate, explicit]
        iteration_stable: false  # adversarial auction, outcome shifts each block
        fidelity: lossy
        variation: stochastic  # depends on competing builders and searcher bundles
        cost: "O(n log n) greedy, NP-hard optimal"
        ref: "https://docs.flashbots.net/flashbots-mev-boost/introduction"
        source: "Flashbots (2021); proposer-builder separation (PBS)"
      - name: Smart order routing (SOR)
        precondition: Order to execute + multiple venue order books with depth/latency profiles
        postcondition: "Routing decision: single best venue or split across venues minimizing slippage"
        grid_position: [single_best, implicit]
        iteration_stable: true
        fidelity: lossy  # venue state may change between decision and execution
        variation: none  # deterministic given current book snapshots
        cost: "O(v * d) where v = venues, d = depth levels"
        source: "SEC Reg NMS (2005); MiFID II best execution"
      - name: Diversified top-k path routing (DeFi liquidity)
        precondition: Venue/pool graph with edge costs (slippage, gas, failure probability) + split budget
        postcondition: Bounded slate of mutually dissimilar execution paths, explicit redundancy via failure decorrelation
        grid_position: [top_k_slate, explicit]
        iteration_stable: true
        fidelity: lossy  # approximation-bounded split optimization
        variation: none
        cost: "O(k * E) where E = edges in pool graph"
        ref: "https://web.stanford.edu/~boyd/papers/cfmm_routing.html"
        source: "Angeris et al. (2022); 1inch / Paraswap routing"
      - name: GES (Greedy Equivalence Search)
        precondition: Empty graph + scoring function (BIC/BDeu) over node-parent assignments, or human oracle for edge evaluation
        postcondition: CPDAG (completed partially directed acyclic graph) representing the Markov equivalence class; root nodes are candidate root causes
        grid_position: [path_tree, implicit]
        iteration_stable: true  # greedy, deterministic given scores
        fidelity: lossy  # recovers equivalence class, not unique DAG (interventions needed to fully orient)
        variation: none
        cost: "O(n^4) worst case; typically much faster on sparse graphs"
        ref: "https://www.jmlr.org/papers/volume3/chickering02b/chickering02b.pdf"
        source: "Chickering (2002); converges to same output as PC under faithfulness"
      - name: Simon's causal ordering
        precondition: System of modules with input-output contracts (equations); dependency graph between modules
        postcondition: DAG of causally ordered blocks (Dulmage-Mendelsohn decomposition); root blocks have no incoming dependencies — these are root causes
        grid_position: [path_tree, implicit]
        iteration_stable: true
        fidelity: exact  # decomposition is unique for a given equation system
        variation: none
        cost: "O(n + m) where n = modules, m = dependencies (Hopcroft-Karp matching)"
        ref: "https://doi.org/10.2307/1907758"
        source: "Simon (1953); Iwasaki & Simon (1994) formalized for causal models"

  # ── Consolidate ───────────────────────────────────────────
  - name: consolidate
    input_type: persisted  # reads from Remember (which caches ranked output)
    output_type: policy  # updated routing function
    store: policy  # writes to policy store (backward pass inside substrate)
    contract: "Lossy. Backward pass: reads persisted ranked outcomes, reshapes how each stage processes."
    grid_axes:
      - "I-Con (2025) periodic table"
    ref: "https://mhamilton.net/icon"
    operations:
      - name: Gradient descent update
        precondition: Loss contributions + current weights
        postcondition: Weights updated, future predictions altered
        identification_control: logged  # consumes whatever batch arrives; active variants are in experimental design / active learning
        iteration_stable: true  # convergence is the design goal
        fidelity: lossy
        variation: stochastic  # SGD noise
        cost: "O(n * d)"
      - name: Bayesian posterior update
        precondition: Prior parameters + weighted observations
        postcondition: Posterior compressed, future inference altered
        iteration_stable: true
        fidelity: lossy
        variation: none  # exact update is deterministic
        cost: "varies"
      - name: K-means update
        precondition: Weighted points + codebook size k
        postcondition: k prototypes replacing many points, lossy
        iteration_stable: true  # converges to local optimum
        fidelity: lossy
        variation: initialization  # random seed matters
        cost: "O(n * k * d)"
      - name: Incremental PCA
        precondition: Observations in high dimension
        postcondition: Low-rank basis, future projection altered
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n * d * k)"
      - name: Decision tree induction
        precondition: Ranked labeled examples
        postcondition: Compact rule set, future classification altered
        iteration_stable: true
        fidelity: lossy
        variation: none  # deterministic given data
        cost: "O(n * d * log n)"
      - name: Prototype condensation
        precondition: Ranked candidates + compression budget
        postcondition: Small exemplar set, lossy approximation for future matching
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n * k)"
      - name: EBC/Chunking
        precondition: Substate result that modifies superstate + dependency trace through rule firings
        postcondition: New production rule encoding the compiled reasoning, fires directly on future match
        iteration_stable: true
        fidelity: lossy  # generalizes from specific trace
        variation: none  # deterministic given trace (requires deterministic substate decisions)
        cost: "O(trace depth)"
        ref: "https://github.com/SoarGroup/Soar/blob/development/Core/SoarKernel/src/explanation_based_chunking/ebc_build.cpp"
        source: "Soar (Laird, 2022 §4; Assanie, 2022)"
      - name: Partial evaluation
        precondition: General program + known subset of inputs + execution trace (tree-structured)
        postcondition: Residual program specialized to known inputs, executes without interpretation on future match
        iteration_stable: true
        fidelity: lossy  # specializes away generality
        variation: none  # deterministic given trace and known inputs
        cost: "O(trace depth)"
        ref: "https://en.wikipedia.org/wiki/Partial_evaluation"
        source: "Futamura (1971); Jones, Gomard & Sestoft (1993)"
      - name: DreamCoder library learning
        precondition: >-
          Stream of solved program-synthesis tasks + initial domain-specific language (DSL) +
          recognition model that proposes programs from task specs
        postcondition: >-
          Refactored DSL with new abstractions extracted from recurring program fragments across tasks.
          Future task search uses the denser, higher-level vocabulary, narrowing the program space and
          enabling solutions that were intractable in the original DSL. Wake-sleep cycle: wake = solve tasks
          with current library; sleep = refactor library to compress observed solutions.
        identification_control: logged  # consumes whatever solved-task corpus accumulates; no designed probes
        iteration_stable: true  # converges as library compresses corpus
        fidelity: lossy  # abstractions are heuristic compressions
        variation: stochastic  # neural recognition model + sampling
        cost: "wake = O(tasks * search); sleep = O(library * corpus) per refactor pass"
        ref: "https://arxiv.org/abs/2006.08381"
        source: "Ellis et al. (2021) DreamCoder: Bootstrapping Inductive Program Synthesis with Wake-Sleep Library Learning"
        note: >-
          Library learning over a program grammar — distinct from Soar-style chunking (which compiles
          impasse-resolution traces into productions). DreamCoder's distinctive move is cross-task
          abstraction discovery, not episode-local rule compilation. The "agent" that uses the library
          is itself describable by recursive parts-bin lookup at the wake-phase level.
      - name: Voyager skill library update
        precondition: >-
          Episode trace from an embodied agent + existing skill library (executable code) +
          LLM compiler that turns successful traces into named, parameterized skill functions
        postcondition: >-
          New executable skill added to the library, indexed for retrieval. Subsequent task attempts
          can prompt the LLM with relevant retrieved skills, narrowing the action space to a curated
          set of compositional building blocks rather than raw actions.
        identification_control: logged  # exploration is curriculum-driven, not designed for identification
        iteration_stable: true
        fidelity: lossy  # LLM compilation is heuristic
        variation: stochastic  # LLM sampling
        cost: "O(trace length * LLM context) per skill compilation"
        ref: "https://arxiv.org/abs/2305.16291"
        source: "Wang et al. (2023) Voyager: An Open-Ended Embodied Agent with Large Language Models"
        note: >-
          Voyager is a compound architecture, not a single Consolidate operation. This entry covers the
          library-update step only. The curriculum proposer, action emission via LLM code synthesis, and
          retrieval over the skill library are separate operations — recoverable by recursive parts-bin
          lookup, not by adding more axes here. The skill library itself externalizes reusable
          composition primitives as code; "monoid" is a useful metaphor for the compositional structure
          but composition is partial and state-indexed, not a total binary operation.
      - name: Delta-bar-delta
        precondition: RL rules with numeric preferences + reward signal
        postcondition: Per-production learning rates adapted, future updates scaled individually
        identification_control: logged  # reinforces from the agent's own action distribution; no designed randomization for identification (kin to operant conditioning)
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(1) per rule per update"
        ref: "https://github.com/SoarGroup/Soar/blob/development/Core/SoarKernel/src/reinforcement_learning/reinforcement_learning.cpp"
        source: "Soar (Jacobs, 1988)"
      - name: EMA convergence gate
        precondition: RL rules with numeric preferences + running EMA of |ΔQ|
        postcondition: Converged decisions flagged as deterministic, eligible for chunking
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(1) per rule per update"
        source: "Prescription Soar — gates chunking on RL convergence"
      - name: Temporal graph coarsening
        precondition: Sequence of graph snapshots (episodic memory) + frequency threshold
        postcondition: Compressed graph structures encoding cross-episode regularities
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(δ) compositions (Casteigts et al., 2019)"
        ref: "https://link.springer.com/article/10.1007/s00224-018-9876-z"
        source: "Prescription Soar — episodic→semantic consolidation"
      - name: BPE merge table training
        precondition: Ranked corpus tokens (persisted from prior cycles)
        postcondition: Merge table reshaping future tokenization (Perceive codebook updated)
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n * V) where V = vocabulary size"
        source: "Gage (1994); Sennrich, Haddow & Birch (2016)"
      - name: Huffman table construction
        precondition: Symbol frequency distribution (persisted from prior encoding)
        postcondition: Optimal prefix code table reshaping future encoding
        iteration_stable: true
        fidelity: lossy  # frequency estimates compress the distribution
        variation: none
        cost: "O(n log n)"
        source: "Huffman (1952)"
      - name: Warmup + inverse-sqrt LR schedule
        precondition: Model parameters + step counter + warmup steps
        postcondition: Learning rate adjusted per step — linear warmup then inverse square root decay
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(1) per step"
        ref: "https://arxiv.org/abs/1706.03762"
        source: "Vaswani et al. (2017)"
      - name: Scaling laws
        precondition: Compute budget + data budget + parameter count
        postcondition: Predicted loss as power law of compute, data, and parameters — guides allocation before training
        iteration_stable: true
        fidelity: lossy  # empirical fit, not exact
        variation: none
        cost: "O(1) to evaluate"
        source: "Kaplan et al. (2020); Hoffmann et al. (2022); Zhao et al. (2023) §4.3"
      - name: RLHF
        precondition: Pre-trained model + human preference comparisons
        postcondition: Reward model trained on preferences, policy optimized against it via PPO
        iteration_stable: true
        fidelity: lossy
        variation: stochastic  # PPO sampling
        cost: "O(n * d) per update"
        source: "Ouyang et al. (2022); Zhao et al. (2023) §5.2"
      - name: DPO
        precondition: Pre-trained model + preference pairs (chosen, rejected)
        postcondition: Policy directly optimized on preferences without separate reward model
        iteration_stable: true
        fidelity: lossy
        variation: stochastic
        cost: "O(n * d) per update"
        ref: "https://arxiv.org/abs/2305.18290"
        source: "Rafailov et al. (2023); Zhao et al. (2023) §5.2"
      - name: LoRA
        precondition: Frozen base model + task-specific training data + rank r
        postcondition: Low-rank update matrices (A, B) trained, base model unchanged, mergeable at inference
        iteration_stable: true
        fidelity: lossy
        variation: none
        cost: "O(n * r * d) per update, r << d"
        ref: "https://arxiv.org/abs/2106.09685"
        source: "Hu et al. (2021); Zhao et al. (2023) §5.3"
      - name: Instruction tuning (SFT)
        precondition: Pre-trained model + (instruction, response) pairs
        postcondition: Model fine-tuned to follow instruction format, output aligned to user intent
        iteration_stable: true
        fidelity: lossy
        variation: stochastic
        cost: "O(n * d) per update"
        source: "Wei et al. (2021); Zhao et al. (2023) §5.1"
      - name: Reflexion (verbal reinforcement)
        precondition: Failed task attempt + outcome signal
        postcondition: Natural-language self-critique stored, future attempts conditioned on lessons learned
        iteration_stable: true
        fidelity: lossy  # verbal summary, not parametric update
        variation: stochastic  # depends on generation
        cost: "O(n * d) per reflection"
        ref: "https://arxiv.org/abs/2303.11366"
        source: "Shinn et al. (2023); Arunkumar et al. (2026) §4.2.2"
      - name: Episodic→semantic compression (MemInsight)
        precondition: Stream of episodic traces from agent interactions
        postcondition: Compressed semantic insights extracted, generalizations stored for future retrieval
        iteration_stable: true
        fidelity: lossy  # compression discards episode-specific detail
        variation: stochastic
        cost: "O(n * d) per compression pass"
        source: "Arunkumar et al. (2026) §4.1.2"
      - name: AMM curve update (x·y=k)
        precondition: Current reserve pair (x, y) + trade amount
        postcondition: Reserves updated along invariant curve, implicit price (marginal rate) reshaped for next trade
        iteration_stable: true  # converges to arbitrage-free price
        fidelity: lossy  # discrete trades approximate continuous price
        variation: none  # deterministic given trade
        cost: "O(1) per swap"
        ref: "https://uniswap.org/whitepaper.pdf"
        source: "Uniswap v1 (Adams, 2018); constant-product AMM"
      - name: Difficulty adjustment
        precondition: Last 2016 block timestamps (persisted) + target block interval
        postcondition: New difficulty target written to protocol, reshaping future mining competition
        iteration_stable: true  # negative feedback loop converges to target interval
        fidelity: lossy  # coarse 2016-block window
        variation: none  # deterministic given timestamps
        cost: "O(1) per adjustment"
        source: "Nakamoto (2008); Bitcoin difficulty retarget"
      - name: HFT strategy parameter optimization
        precondition: Trade history (persisted P&L, fills, slippage) + parameter search space
        postcondition: Updated strategy thresholds (spread, inventory limits, timing), reshaping future order generation
        iteration_stable: true  # converges within regime
        fidelity: lossy
        variation: stochastic  # Bayesian optimization / evolutionary search
        cost: "O(evaluations * backtest cost)"
        source: "Cartea, Jaimungal & Penalva (2015); Aldridge (2013)"
      - name: Self-supervised subgraph representation learning
        precondition: Persisted transaction graph (unlabeled or sparsely labeled) + contrastive/generative pretext task
        postcondition: Graph encoder policy mapping subgraphs to embeddings, reshaping future node/subgraph scoring
        identification_control: logged  # consumes the fixed graph; no designed queries
        iteration_stable: true
        fidelity: lossy
        variation: stochastic  # contrastive sampling
        cost: "O(E * d) per epoch where E = edges"
        ref: "https://arxiv.org/abs/2404.19109"
        source: "Bellei et al. (2024); Elliptic2 subgraph dataset"
      - name: AIPW e-value supermartingale (return-to-sender)
        precondition: >-
          Stream of (intervention window, exposure-mapped neighborhood, observed harm) triples per node +
          treatment model (propensity of throttle given neighborhood) + outcome model (expected harm given treatment).
          Designed randomization across windows is required for identification.
        postcondition: >-
          Per-node supermartingale updated via AIPW pseudo-outcome; running e-value written back as the
          Filter's policy parameter. Consistent if either treatment or outcome model is correct (doubly robust).
          The filter's next call to e-BH reads these e-values.
        grid_position: [graph, supervised]  # supervision signal is the observed harm under designed interventions
        identification_control: designed  # platform chooses which nodes to throttle, specifically to generate counterfactual contrast
        iteration_stable: false  # scores drift as attackers adapt and graph evolves
        fidelity: lossy  # doubly robust but finite-sample; positivity can collapse on dense neighborhoods
        variation: structural  # randomization is part of the learning signal, not noise around it
        cost: "O(|N_k(v)|) per node per window, where N_k is the k-hop neighborhood"
        ref: "/return-to-sender"
        source: >-
          Aronow & Samii (2017) exposure mappings; He & Song (2024) nodewise doubly robust estimation;
          Wang & Ramdas (2022) e-BH; compound: june.kim 2026
        cross_reference: filter/graph/causal (Nodewise e-BH on exposure-mapped supermartingales)

  # ── Remember ──────────────────────────────────────────────
  - name: remember
    input_type: ranked  # persists ranked output from Attend
    output_type: persisted
    store: data  # lossless persistence; also serves as cache for Consolidate
    contract: "Retrievable on next cycle's Perceive and by Consolidate. No additional loss."
    grid_axes: null  # periodic table not yet built
    operations:
      - name: WAL append + fsync
        precondition: Serialized state record
        postcondition: Durable on crash, recoverable next cycle
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1)"
      - name: Transaction commit
        precondition: Validated write set
        postcondition: Persisted, visible for future reads
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1)"
      - name: Git object write + commit
        precondition: Content-addressed objects + manifest
        postcondition: Durable commit graph, retrievable by hash
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: Checkpoint serialization
        precondition: In-memory model/state
        postcondition: Persisted checkpoint, loadable on next run
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: Copy-on-write snapshot commit
        precondition: Consistent compressed state image
        postcondition: Persistent snapshot, addressable by version
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1) amortized"
      - name: SSTable flush
        precondition: Immutable key-value run in memory
        postcondition: Durable on-disk run, retrievable by key
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(n)"
      - name: Quantization
        precondition: Trained model weights in FP32/FP16
        postcondition: Weights stored at reduced precision (INT8/INT4), behavior approximately preserved
        iteration_stable: true
        fidelity: lossy  # precision reduction, bounded error
        variation: none
        cost: "O(n) to quantize"
        source: "Dettmers et al. (2022); Zhao et al. (2023) §9.5"
      - name: NL episode stream (Generative Agents)
        precondition: Agent observations and actions as natural language
        postcondition: Timestamped episode stream persisted, retrievable by recency/importance/relevance
        iteration_stable: true
        fidelity: lossless  # full text preserved
        variation: none
        cost: "O(1) per episode write"
        ref: "https://arxiv.org/abs/2304.03442"
        source: "Park et al. (2023); Arunkumar et al. (2026) §4.1.2"
      - name: Blockchain append (consensus-validated WAL)
        precondition: Block of validated transactions + consensus proof (PoW/PoS)
        postcondition: Immutable append to distributed ledger, retrievable by block hash, tamper-evident
        iteration_stable: true
        fidelity: lossless
        variation: none  # deterministic given consensus
        cost: "O(n) per block, O(1) amortized per transaction"
        source: "Nakamoto (2008); Buterin (2014)"
      - name: Tick database append (kdb+/QuestDB)
        precondition: Timestamped market data records (quotes, trades)
        postcondition: Columnar time-series persisted, retrievable by time range, append-only
        iteration_stable: true
        fidelity: lossless
        variation: none
        cost: "O(1) per record append"
        source: "kdb+ (Kx Systems, 2003); QuestDB (2014)"
      - name: GHOSTDAG blockDAG ordering
        precondition: Live blockDAG with parent references + honest-majority assumption
        postcondition: Canonical blue-set ordering persisted over partial order, all blocks retained, concurrency preserved
        iteration_stable: true
        fidelity: lossless  # all blocks persisted; ordering is probabilistic but no data lost
        variation: none  # deterministic given DAG structure and parameters
        cost: "O(k * width) per block where k = GHOSTDAG parameter"
        ref: "https://eprint.iacr.org/2018/104"
        source: "Sompolinsky & Zohar (2018); Kaspa implementation"
