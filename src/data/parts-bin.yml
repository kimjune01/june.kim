# The Parts Bin — structured taxonomy
# Derived from The Natural Framework proof.
# Ten axes define the design space. Five planes are worth drawing.
# See /the-parts-bin for the full analysis.
#
# Jekyll: {{ site.data.parts-bin.columns }}
# Agent:  load YAML, query by step/store/grid coordinates.

axes:
  universal:
    - name: pipeline_stage
      values: [perceive, cache, filter, attend, consolidate, remember]
    - name: data_structure
      values: [flat, sequence, tree, graph, partial_order, embedding_space]
    - name: error_guarantee
      values: [exact, bounded, probabilistic]
    - name: temporality
      values: [batch, stream]
  stage_specific:
    - name: selection_semantics
      stage: filter
      values: [predicate, similarity, dominance, causal]
    - name: stationarity
      stage: filter
      values: [static, drifting]
    - name: output_form
      stage: attend
      values: [top_k_slate, single_best, path_tree]
    - name: redundancy_control
      stage: attend
      values: [none, implicit, explicit]
    - name: codebook_type
      stage: perceive
      values: [fixed, learned]
    - name: supervision_signal
      stage: consolidate
      values: [unsupervised, supervised, self_supervised]
    - name: identification_control
      stages: [filter, consolidate]  # cross-cutting: filter selects, consolidate learns
      values: [logged, designed]
      description: >-
        Does the method control the data used for identification, or does it only
        update on data generated by some other (exogenous or endogenous) policy?
        Logged: identification is from data the method did not design — observational
        records, fixed oracles, behavior streams. Designed: the method controls the
        data-generating process for identification — randomized assignment, scheduled
        intervention timing, adaptive cohort rollout. Orthogonal to whether updates
        are sequential (see sequential_control on operations) and to whether the
        design is fixed or adaptive (see design_adaptivity, not yet axis-ified).
        Narrowed from an earlier "passive/active" framing that conflated
        observational/interventional, fixed/adaptive, and querying/acting.

planes:
  # Systematic sweep of 45 possible planes. See /the-parts-bin#grid.
  #
  # Fully occupied (validate but don't predict):
  #   selection_semantics × error_guarantee (Filter, 4×3)
  #   output_form × redundancy_control (Attend, 3×3)
  #   stationarity × selection_semantics (Filter, 2×4)
  #   temporality × selection_semantics (Filter, 2×4)
  #   temporality × output_form (Attend, 2×3)
  #   temporality × redundancy_control (Attend, 2×3)
  #   error_guarantee × output_form (Attend, 3×3)
  #   error_guarantee × supervision_signal (Consolidate, 3×3)
  #   temporality × supervision_signal (Consolidate, 2×3)
  #   data_structure × codebook_type (Perceive, 6×2)
  #   pipeline_stage × temporality (6×2)
  #
  # Planes with blanks:
  - name: "Plane 1: Data structure × Selection semantics (bounded)"
    axes: [data_structure, selection_semantics]
    fixed: { error_guarantee: bounded }
    status: all_filled  # all cells now have implementations via filling-the-blanks
  - name: "Plane 2: Codebook type × Temporality (Perceive)"
    axes: [codebook_type, temporality]
    stage: perceive
    status: all_filled  # learned × stream filled by streaming tokenizer
  - name: "Plane 3: Pipeline stage × Data structure"
    axes: [pipeline_stage, data_structure]
    status: all_filled  # attend × partial_order filled by poset diverse top-k
  - name: "Plane 4: Pipeline stage × Error guarantee"
    axes: [pipeline_stage, error_guarantee]
    status: all_filled  # cache × bounded filled by cover tree; remember × bounded/probabilistic are structural (lossless contract)
  #
  # Projections (blanks are shadows of known blanks, not new):
  #   data_structure × output_form (Attend, 6×3)
  #   data_structure × redundancy_control (Attend, 6×3)

# Plane 5 data: stage × data structure (canonical algorithm per cell)
stage_structure_grid:
  - stage: perceive
    flat: "JSON parsing"
    sequence: ["A/D conversion", "Sinusoidal positional encoding (Vaswani 2017)", "FIX/ITCH protocol parsing"]
    tree: "XML parsing"
    graph: ["Edge list parsing", "RAG retrieval (Zhao 2023)", "MCP tool protocol (Arunkumar 2026)", "ABI event log decoding"]
    partial_order: "PC algorithm (thin)"
    embedding_space: "CLIP embedding"
  - stage: cache
    flat: ["Hash index", "Residual + LayerNorm (Vaswani 2017)", "Order book (price-time priority queue)", "UTXO set index", "Minisketch set reconciliation (Erlay)"]
    sequence: ["B-tree", "Paged memory / MemGPT (Arunkumar 2026)"]
    tree: ["Trie", "Merkle tree", "Action DAG HTN cache (june.kim 2026)"]
    graph: ["Adjacency index", "RETE incremental matching (Soar)"]
    partial_order: ["Transitive closure (thin)"]
    embedding_space: ["HNSW index", "→ Action DAG embedding filter (see filter)"]
  - stage: filter
    flat: ["WHERE", "Circuit breaker / kill switch", "Mempool fee-rate eviction"]
    sequence: ["Change-point detection", "Causal masking (Vaswani 2017)", "Policy-driven pruning / MemAgent (Arunkumar 2026)"]
    tree: ["XPath", "Hierarchical verification / MAKER (Arunkumar 2026)"]
    graph: ["Subgraph match", "Justification-based truth maintenance (Soar)", "MEV extraction filter", "PC algorithm (Spirtes & Glymour 1993)"]
    partial_order: ["DAGGER (thin)"]
    embedding_space: ["c-ANN search (cover tree)", "Action DAG embedding filter (june.kim 2026)"]
  - stage: attend
    flat: ["MMR", "Staged preference resolution (Soar)", "Scaled dot-product attention (Vaswani 2017)", "Multi-head projection (Vaswani 2017)"]
    sequence: ["Beam search", "Surprise gate + DPP thinning (prescription-soar)", "In-context learning (Zhao 2023)", "Chain-of-thought (Zhao 2023)", "ReAct loop (Arunkumar 2026)"]
    tree: ["MCTS", "Tree of Thoughts (Arunkumar 2026)"]
    graph: ["Diversified top-k graph pattern matching", "Diversified top-k path routing (DeFi liquidity graphs)", "GES (Chickering 2002)"]
    partial_order: ["Poset diverse top-k (filling-the-blanks #3)", "Block building / Flashbots auction", "Simon's causal ordering (Simon 1953)"]
    embedding_space: ["MMR re-ranking"]
    refs:
      graph: "https://doi.org/10.14778/2536258.2536263"
  - stage: consolidate
    flat: ["Gradient descent", "Delta-bar-delta (Soar)", "EMA convergence gate (prescription-soar)", "Scaling laws (Zhao 2023)", "RLHF (Zhao 2023)", "DPO (Zhao 2023)", "LoRA (Zhao 2023)", "Warmup + inverse-sqrt schedule (Vaswani 2017)", "AMM curve update (x·y=k)", "HFT strategy parameter optimization"]
    sequence: ["Grammar induction", "Instruction tuning / SFT (Zhao 2023)", "Reflexion / verbal reinforcement (Arunkumar 2026)", "Episodic→semantic compression / MemInsight (Arunkumar 2026)", "Difficulty adjustment (Bitcoin)"]
    tree: ["Decision tree induction", "EBC/Chunking (Soar)", "Partial evaluation (Futamura, 1971)"]
    graph: ["GNN training", "Temporal graph coarsening (prescription-soar)", "Self-supervised subgraph representation learning (blockchain)"]
    partial_order: ["Lattice learning (thin)"]
    embedding_space: ["Triplet-loss metric learning"]
  - stage: remember
    flat: ["WAL append", "Quantization (Zhao 2023)", "Tick database append (kdb+/QuestDB)"]
    sequence: ["SSTable flush", "Delta-based episodic storage (Soar)", "NL episode stream / Generative Agents (Arunkumar 2026)"]
    tree: ["Git commit", "Blockchain append (consensus-validated WAL)"]
    graph: ["Graph DB commit"]
    partial_order: ["Topological serialization", "GHOSTDAG blockDAG ordering (Kaspa)"]
    embedding_space: "FAISS index serialization"

# Plane 4 data: stage × error guarantee (canonical algorithm per cell)
stage_error_grid:
  - stage: perceive
    exact: "JSON parsing"
    bounded: "Kernel Vector Quantization"
    probabilistic: "SQ-VAE (thin)"
  - stage: cache
    exact: "Hash index"
    bounded: "Cover tree / navigating nets ((1+ε)-ANN cache)"
    refs:
      bounded: "https://research.ibm.com/publications/cover-trees-for-nearest-neighbor"
    probabilistic: "Bloom filter"
  - stage: filter
    exact: "WHERE"
    bounded: ["Conformal filter", "Approximate skyline"]
    probabilistic: "LSH"
  - stage: attend
    exact: ["A*", "Viterbi"]
    bounded: ["ARA*", "Sieve-Streaming"]
    probabilistic: ["DPP", "MCTS"]
  - stage: consolidate
    exact: "PCA via SVD"
    bounded: "k-means++"
    probabilistic: "SGD"
  - stage: remember
    exact: "WAL append"
    bounded: null  # structural: bounded persistence violates Remember contract (lossless)
    probabilistic: null  # structural: same reason

