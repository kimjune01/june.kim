    domains: [algebraic, combinatorial]
    works_when: "Count orbits of a group action; |orbits| = average number of fixed points"
    kill_conditions:
      - Group action hard to enumerate
      - "Need orbit structure, not just count"
      - Group is infinite (sum diverges)
    escalation: polya_enumeration
    lineage: { parent: double_counting, era: modern, reason: Double counting over group orbits }

  - id: polya_enumeration
