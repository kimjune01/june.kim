# The Proof Manual — structured taxonomy
# Grounded in the Calculus of Inductive Constructions (CIC).
# Six type constructors generate all proof techniques.
# See /the-proof-manual for the full analysis.
#
# Agent: load YAML, query by claim_type/domain/constructor.
# Procedure: classify claim+domain → grid lookup → check kill conditions → escalate on failure.

constructors:
  - name: pi
    symbol: "Π (a : A), B a"
    proves: [universal, implication]
  - name: sigma
    symbol: "Σ (a : A), B a"
    proves: [existence, witness]
  - name: inductive
    symbol: "inductive T where | ..."
    proves: [recursion, cases]
  - name: match
    symbol: "match x with ..."
    proves: [case_analysis, induction]
  - name: quotient
    symbol: "Quotient r"
    proves: [equivalence]
  - name: truncation
    symbol: "∃ in Prop"
    proves: [nonconstructive_existence]

axes:
  - name: claim_type
    values: [existence, uniqueness, upper_bound, lower_bound, impossibility, construction, equivalence]
    cic_targets:
      existence: "Σ type or truncated ∃"
      uniqueness: "Π into equality"
      upper_bound: "Π into ≤"
      lower_bound: "Σ with ≥"
      impossibility: "Π into False"
      construction: "Σ with computability"
      equivalence: "Iff or Equiv"
  - name: domain
    values: [discrete, continuous, algebraic, geometric, probabilistic, number_theoretic, combinatorial]

# The main grid: claim_type × domain → candidate technique IDs
claim_domain_grid:
  - claim: existence
    discrete: [pigeonhole, double_counting, ramsey, transfinite_induction, well_ordering, forcing, lowenheim_skolem, compactness_logic, inclusion_exclusion, charging_discharging, weight_function, fixed_point_tarski, game_tree_evaluation, pigeonhole_infinite]
    continuous: [ivt, brouwer_fixed_point, compactness, zorns_lemma, transfinite_induction, ultraproducts, barrier_function, energy_method, bootstrapping, density_argument, approximation_argument, weak_convergence, contour_integration, analytic_continuation, concentration_compactness, degree_theory, weight_function, continuity_method, separation_argument, fixed_point_schauder, sard, krein_milman, baire_category]
    algebraic: [nullstellensatz, structure_theorems, zorns_lemma, transfinite_induction, ultraproducts, forcing, lowenheim_skolem, compactness_logic, density_argument, sylow, character_theory, noether_normalization, going_up_down, spectral_sequence, tensor_product_trick, localization, long_exact_sequence, symmetric_functions, riemann_roch, deformation, probabilistic_polynomial, separation_argument, fixed_point_tarski]
    geometric: [borsuk_ulam, ham_sandwich, spectral_sequence, long_exact_sequence, lefschetz_fixed_point, degree_theory, morse_theory, riemann_roch, deformation, sard]
    probabilistic: [probabilistic_method, lovasz_local_lemma, inclusion_exclusion, deletion_method, martingale, stopping_time]
    number_theoretic: [descent, circle_method, sieve, well_ordering, contour_integration, analytic_continuation, localization, dirichlet_series]
    combinatorial: [regularity_lemma, polynomial_method, inclusion_exclusion, charging_discharging, deletion_method, dependent_random_choice, symmetric_functions, sunflower_lemma, probabilistic_polynomial, weight_function, game_tree_evaluation]

  - claim: uniqueness
    discrete: [exhaustion, parity]
    continuous: [banach_contraction, monotonicity, maximum_principle, energy_method]
    algebraic: [kernel_triviality, irreducibility, nakayama_lemma, localization]
    geometric: [convexity_argument]
    probabilistic: [second_moment]
    number_theoretic: [p_adic_hensel, localization]
    combinatorial: [exchange_argument]

  - claim: upper_bound
    discrete: [greedy, induction, encoding, contrapositive, inclusion_exclusion, charging_discharging, transfer_matrix, amortized_analysis, weight_function]
    continuous: [cauchy_schwarz, am_gm, gronwall, contrapositive, sandwich_squeeze, dominated_convergence, maximum_principle, barrier_function, energy_method, bootstrapping, density_argument, approximation_argument, sobolev_embedding, interpolation_spaces, littlewood_paley, calderon_zygmund, contour_integration, harnack_inequality, monotone_convergence, weight_function]
    algebraic: [spectral, trace_bound, contrapositive, density_argument, sylow, burnside_lemma, polya_enumeration, character_theory, nakayama_lemma, spectral_sequence, mayer_vietoris, characteristic_classes, symmetric_functions, bezout]
    geometric: [packing, volume_bound, spectral_sequence, mayer_vietoris, characteristic_classes, bezout, comparison_theorem]
    probabilistic: [chernoff, union_bound, expectation, inclusion_exclusion, martingale, talagrand, mcdiarmid, large_deviations, steins_method, stopping_time, fkg_inequality, four_functions]
    number_theoretic: [circle_method, sieve, contour_integration, dirichlet_series, large_sieve]
    combinatorial: [regularity_counting, fourier_on_groups, burnside_lemma, polya_enumeration, inclusion_exclusion, charging_discharging, container_method, flag_algebras, transfer_matrix, symmetric_functions, fkg_inequality, weight_function, four_functions]

  - claim: lower_bound
    discrete: [adversary, counting, information_theoretic, inclusion_exclusion, communication_complexity, weight_function]
    continuous: [minimax, fenchel_duality, weight_function]
    algebraic: [rank_argument, dimension_argument, riemann_roch, probabilistic_polynomial]
    geometric: [covering, isoperimetric, riemann_roch, comparison_theorem]
    probabilistic: [entropy, mutual_information, inclusion_exclusion, martingale, large_deviations, fkg_inequality]
    number_theoretic: [sieve, packing_lower, dirichlet_series]
    combinatorial: [sum_product, kruskal_katona, inclusion_exclusion, dependent_random_choice, flag_algebras, fkg_inequality, probabilistic_polynomial, weight_function]

  - claim: impossibility
    discrete: [diagonalization, reduction, invariant, contrapositive, well_ordering, forcing, lowenheim_skolem, game_tree_evaluation]
    continuous: [euler_characteristic, monodromy, contrapositive, degree_theory, separation_argument, baire_category]
    algebraic: [no_homomorphism, cohomological_obstruction, contrapositive, forcing, lowenheim_skolem, character_theory, mayer_vietoris, long_exact_sequence, characteristic_classes, probabilistic_polynomial, separation_argument]
    geometric: [dimension_argument, borsuk_ulam, mayer_vietoris, long_exact_sequence, degree_theory, cobordism, characteristic_classes, gauss_bonnet]
    probabilistic: [rice_theorem]
    number_theoretic: [local_global_failure, parity_obstruction, well_ordering]
    combinatorial: [ramsey_lower, vc_dimension, probabilistic_polynomial, game_tree_evaluation]

  - claim: construction
    discrete: [greedy, induction, potential_method, transfinite_induction, forcing, transfer_matrix]
    continuous: [gradient_descent, newton, iteration, transfinite_induction]
    algebraic: [free_resolution, grobner_basis, transfinite_induction, forcing, polya_enumeration, noether_normalization, tensor_product_trick]
    geometric: [triangulation, convex_hull, morse_theory, surgery]
    probabilistic: [sampling, mcmc, derandomization, deletion_method]
    number_theoretic: [modularity_lifting, descent]
    combinatorial: [shifting, compression, alteration, polya_enumeration, deletion_method, transfer_matrix]

  - claim: equivalence
    discrete: [bijection, encoding_decoding, transfer_matrix]
    continuous: [homeomorphism, diffeomorphism, transfer_principle, ultraproducts, dominated_convergence, density_argument, contour_integration, analytic_continuation, monotone_convergence, krein_milman]
    algebraic: [isomorphism, morita, derived_equivalence, transfer_principle, ultraproducts, density_argument, burnside_lemma, spectral_sequence, tensor_product_trick, localization, mayer_vietoris, long_exact_sequence, symmetric_functions, deformation, lefschetz_hyperplane]
    geometric: [poincare_duality, pontryagin, spectral_sequence, mayer_vietoris, long_exact_sequence, morse_theory, surgery, cobordism, deformation, gauss_bonnet, lefschetz_hyperplane]
    probabilistic: [coupling]
    number_theoretic: [reciprocity, class_field_theory, transfer_principle, contour_integration, analytic_continuation, localization, mobius_inversion, quadratic_reciprocity]
    combinatorial: [generating_function_identity, burnside_lemma, mobius_inversion, transfer_matrix, lgv_lemma, wz_method, symmetric_functions]

# Full technique metadata
# Every technique has: works_when, kill_conditions, escalation, lineage
techniques:

  # ── Existence ──

  - id: pigeonhole
    name: Pigeonhole principle
    constructor: truncation
    claim: existence
    domains: [discrete, combinatorial]
    works_when: "Objects outnumber containers"
    kill_conditions:
      - "Objects and containers are the same size"
      - "Container assignment isn't well-defined"
      - "Need a witness, not just existence"
    escalation: double_counting
    lineage: { parent: null, era: classical }

  - id: double_counting
    name: Double counting
    constructor: sigma
    claim: [existence, lower_bound]
    domains: [discrete, combinatorial]
    works_when: "Same quantity counted two ways gives a nontrivial equality"
    kill_conditions:
      - "No natural bipartite structure to count over"
      - "Both counts give the same trivial bound"
    escalation: probabilistic_method
    lineage: { parent: pigeonhole, era: classical, reason: "Pigeonhole gives existence but no structure" }

  - id: ramsey
    name: Ramsey theory
    constructor: truncation
    claim: existence
    domains: [discrete, combinatorial]
    works_when: "Any coloring of a large enough structure contains a monochromatic substructure"
    kill_conditions:
      - "Ramsey numbers too large to be useful (galactic bounds)"
      - "Need quantitative bounds, not just existence"
      - "Structure isn't defined by colorings"
    escalation: regularity_lemma
    lineage: { parent: pigeonhole, era: modern, reason: "Pigeonhole handles 2 classes; Ramsey handles k" }

  - id: ivt
    name: Intermediate Value Theorem
    constructor: truncation
    claim: existence
    domains: [continuous]
    works_when: "Continuous function on connected domain, need a root or intermediate value"
    kill_conditions:
      - "Discrete domain (no intermediate values)"
      - "Function not continuous"
      - "Need to locate the root, not just know it exists"
    escalation: brouwer_fixed_point
    lineage: { parent: null, era: early_modern }

  - id: brouwer_fixed_point
    name: Brouwer fixed point theorem
    constructor: truncation
    claim: existence
    domains: [continuous, geometric]
    works_when: "Continuous self-map on compact convex set"
    kill_conditions:
      - "Domain not compact"
      - "Domain not convex"
      - "Map not continuous"
      - "Need to find the fixed point, not just know it exists"
    escalation: banach_contraction
    lineage: { parent: ivt, era: modern, reason: "IVT only works in 1D" }

  - id: compactness
    name: Compactness argument
    constructor: truncation
    claim: existence
    domains: [continuous, geometric]
    works_when: "Sequence of approximate solutions in a compact space; limit is exact"
    kill_conditions:
      - "Space not compact (need to compactify or find a priori bounds)"
      - "Limit doesn't inherit the property (not closed under limits)"
      - "Need constructive witness, not limit"
    escalation: null
    lineage: { parent: ivt, era: modern, reason: "IVT needs explicit function; compactness extracts limits" }

  - id: probabilistic_method
    name: Probabilistic method (Erdős)
    constructor: truncation
    claim: existence
    domains: [discrete, combinatorial, probabilistic]
    works_when: "Random object has the property with positive probability"
    kill_conditions:
      - "Expected count < 1 → try second_moment"
      - "Dependencies too strong → try lovasz_local_lemma"
      - "Need explicit construction → try derandomization"
    escalation: lovasz_local_lemma
    lineage: { parent: double_counting, era: modern, reason: "Exact counts intractable" }

  - id: lovasz_local_lemma
    name: Lovász Local Lemma
    constructor: truncation
    claim: existence
    domains: [discrete, combinatorial, probabilistic]
    works_when: "Bad events are rare and mostly independent (dependency graph is sparse)"
    kill_conditions:
      - "Dependency graph is dense"
      - "Individual event probabilities too high"
      - "Need explicit witness → try constructive LLL (Moser-Tardos)"
    escalation: derandomization
    lineage: { parent: probabilistic_method, era: modern, reason: "Probabilistic method can't handle correlated bad events" }

  - id: nullstellensatz
    name: Hilbert's Nullstellensatz
    constructor: sigma
    claim: [existence, impossibility]
    domains: [algebraic]
    works_when: "Polynomial system over algebraically closed field; need to show solutions exist or don't"
    kill_conditions:
      - "Field not algebraically closed (reals, finite fields)"
      - "System not polynomial"
      - "Need to count or locate solutions, not just existence"
    escalation: grobner_basis
    lineage: { parent: null, era: modern }

  - id: structure_theorems
    name: Structure theorems (classification)
    constructor: sigma
    claim: [existence, equivalence]
    domains: [algebraic]
    works_when: "Object belongs to a classified family; structure theorem gives canonical form"
    kill_conditions:
      - "Classification doesn't exist for this family"
      - "Object doesn't fit the hypotheses (not finitely generated, not Noetherian, etc.)"
    escalation: null
    lineage: { parent: null, era: modern }

  - id: borsuk_ulam
    name: Borsuk-Ulam theorem
    constructor: truncation
    claim: [existence, impossibility]
    domains: [geometric]
    works_when: "Continuous map from S^n to R^n; need antipodal coincidence"
    kill_conditions:
      - "No natural antipodal structure"
      - "Map isn't continuous"
      - "Dimension is wrong (target dimension > source)"
    escalation: null
    lineage: { parent: brouwer_fixed_point, era: modern, reason: "Brouwer needs self-map; Borsuk-Ulam handles maps between different spaces" }

  - id: ham_sandwich
    name: Ham sandwich theorem
    constructor: truncation
    claim: existence
    domains: [geometric]
    works_when: "Need a hyperplane that bisects d measures in R^d simultaneously"
    kill_conditions:
      - "More measures than dimensions"
      - "Measures aren't absolutely continuous"
    escalation: null
    lineage: { parent: borsuk_ulam, era: modern, reason: "Application of Borsuk-Ulam" }

  # ── Uniqueness ──

  - id: exhaustion
    name: Exhaustive case check
    constructor: match
    claim: uniqueness
    domains: [discrete]
    works_when: "Finite case space; can check each"
    kill_conditions:
      - "Case space too large"
      - "Cases aren't cleanly enumerable"
    escalation: invariant
    lineage: { parent: null, era: classical }

  - id: parity
    name: Parity argument
    constructor: pi
    claim: [uniqueness, impossibility]
    domains: [discrete]
    works_when: "Quantity changes by ±1 at each step; parity constrains the outcome"
    kill_conditions:
      - "Steps change quantity by variable amounts"
      - "Parity alone doesn't distinguish the cases"
    escalation: invariant
    lineage: { parent: null, era: classical }

  - id: banach_contraction
    name: Banach contraction mapping
    constructor: sigma
    claim: [existence, uniqueness]
    domains: [continuous]
    works_when: "Complete metric space; map is a contraction (Lipschitz constant < 1)"
    kill_conditions:
      - "Space not complete"
      - "Map not contractive (Lipschitz ≥ 1)"
      - "Need the fixed point but iteration converges too slowly"
    escalation: null
    lineage: { parent: brouwer_fixed_point, era: modern, reason: "Brouwer gives existence only; Banach gives existence + uniqueness + algorithm" }

  - id: monotonicity
    name: Monotonicity / order argument
    constructor: pi
    claim: uniqueness
    domains: [continuous, discrete]
    works_when: "Function is monotone; unique crossing of a threshold"
    kill_conditions:
      - "Function not monotone"
      - "Multiple crossings"
    escalation: null
    lineage: { parent: null, era: classical }

  - id: kernel_triviality
    name: Kernel triviality
    constructor: pi
    claim: uniqueness
    domains: [algebraic]
    works_when: "Linear map; uniqueness iff kernel is trivial"
    kill_conditions:
      - "Map not linear"
      - "Kernel nontrivial (multiple solutions exist)"
    escalation: null
    lineage: { parent: null, era: modern }

  - id: irreducibility
    name: Irreducibility argument
    constructor: pi
    claim: uniqueness
    domains: [algebraic]
    works_when: "Object has no nontrivial decomposition"
    kill_conditions:
      - "Object is reducible"
      - "Irreducibility doesn't imply the uniqueness you need"
    escalation: null
    lineage: { parent: null, era: modern }

  - id: convexity_argument
    name: Convexity argument
    constructor: pi
    claim: uniqueness
    domains: [geometric, continuous]
    works_when: "Optimization over convex set with strictly convex objective"
    kill_conditions:
      - "Objective not strictly convex (flat regions → multiple optima)"
      - "Feasible set not convex"
    escalation: null
    lineage: { parent: null, era: modern }

  - id: second_moment
    name: Second moment method
    constructor: pi
    claim: [uniqueness, existence]
    domains: [probabilistic]
    works_when: "E[X²] / E[X]² is close to 1 (concentration)"
    kill_conditions:
      - "Variance too high relative to mean"
      - "Need tail bounds, not just concentration → try chernoff"
    escalation: chernoff
    lineage: { parent: probabilistic_method, era: modern, reason: "First moment gives existence; second moment gives concentration" }

  - id: p_adic_hensel
    name: Hensel's lemma (p-adic lifting)
    constructor: sigma
    claim: [existence, uniqueness]
    domains: [number_theoretic]
    works_when: "Root mod p lifts uniquely to root mod p^k; derivative nonzero mod p"
    kill_conditions:
      - "Derivative vanishes mod p (singular root)"
      - "Need archimedean information p-adics can't see"
    escalation: null
    lineage: { parent: null, era: modern }

  - id: exchange_argument
    name: Exchange argument
    constructor: pi
    claim: [uniqueness, upper_bound]
    domains: [combinatorial]
    works_when: "Swapping two elements doesn't improve the objective → current solution is optimal"
    kill_conditions:
      - "Swaps don't form a connected exchange graph"
      - "Local optimum ≠ global optimum (non-matroid)"
    escalation: null
    lineage: { parent: greedy, era: classical, reason: "Greedy constructs; exchange proves optimality" }

  # ── Upper bound ──

  - id: greedy
    name: Greedy + induction
    constructor: match
    claim: [upper_bound, construction]
    domains: [discrete, combinatorial]
    works_when: "Each step makes irrevocable local progress; matroid or submodular"
    kill_conditions:
      - "Greedy choice constrains future steps"
      - "Residual loses structure needed for inductive step"
      - "Problem not matroid/submodular"
    escalation: potential_method
    lineage: { parent: null, era: classical }

  - id: induction
    name: Mathematical induction
    constructor: match
    claim: [upper_bound, existence, construction]
    domains: [discrete, algebraic]
    works_when: "Well-ordered parameter; base case + inductive step"
    kill_conditions:
      - "Residual loses structure (subproblem not same type)"
      - "Inductive hypothesis too weak (strengthen it before abandoning)"
      - "No natural well-ordering"
    escalation: potential_method
    lineage: { parent: null, era: classical }

  - id: encoding
    name: Encoding / counting argument
    constructor: pi
    claim: upper_bound
    domains: [discrete, combinatorial]
    works_when: "Object has efficient description; count objects ≤ count descriptions"
    kill_conditions:
      - "Encoding is lossy"
      - "Description length hard to bound"
    escalation: information_theoretic
    lineage: { parent: null, era: modern }

  - id: cauchy_schwarz
    name: Cauchy-Schwarz / AM-GM
    constructor: pi
    claim: upper_bound
    domains: [continuous, algebraic]
    works_when: "Bound follows from convexity of a natural functional"
    kill_conditions:
      - "Inequality tight only at degenerate point (bound loose where it matters)"
      - "No natural inner product or convex structure"
    escalation: spectral
    lineage: { parent: null, era: early_modern }

  - id: am_gm
    name: AM-GM inequality
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: "Need to bound a product by a sum or vice versa"
    kill_conditions:
      - "Terms aren't positive"
      - "Bound too loose (need tighter tool like Schur or Muirhead)"
    escalation: cauchy_schwarz
    lineage: { parent: null, era: classical }

  - id: gronwall
    name: Gronwall's inequality
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: "ODE/integral inequality; u(t) ≤ α(t) + ∫β(s)u(s)ds"
    kill_conditions:
      - "Inequality not of Gronwall type (nonlinear coupling)"
      - "Coefficients not integrable"
    escalation: null
    lineage: { parent: null, era: modern }

  - id: spectral
    name: Spectral method (eigenvalue bounds)
    constructor: pi
    claim: [upper_bound, lower_bound]
    domains: [algebraic, geometric]
    works_when: "Relevant quantity captured by eigenvalues (expansion, mixing, rank)"
    kill_conditions:
      - "Algebra doesn't support eigenvalues (tropical semiring, non-commutative)"
      - "Relevant quantity not captured by spectrum (combinatorial property independent of eigenvalues)"
      - "Eigenvalues known but bound is loose"
    escalation: embed_solve_pullback
    lineage: { parent: cauchy_schwarz, era: modern, reason: "Need matrix structure, not just scalar inequality" }

  - id: trace_bound
    name: Trace bound
    constructor: pi
    claim: upper_bound
    domains: [algebraic]
    works_when: "tr(A) = ��λ_i; bound eigenvalue sum via trace"
    kill_conditions:
      - "Need individual eigenvalues, not sum"
      - "Trace is trivial (e.g., traceless matrices)"
    escalation: spectral
    lineage: { parent: spectral, era: modern }

  - id: packing
    name: Packing argument
    constructor: pi
    claim: upper_bound
    domains: [geometric]
    works_when: "Objects occupy volume; count ≤ total volume / per-object volume"
    kill_conditions:
      - "Objects overlap"
      - "Volume ratio doesn't capture the constraint"
    escalation: covering
    lineage: { parent: null, era: classical }

  - id: volume_bound
    name: Volume bound
    constructor: pi
    claim: upper_bound
    domains: [geometric]
    works_when: "Geometric object has bounded volume; count lattice points or substructures"
    kill_conditions:
      - "Volume hard to compute"
      - "Lattice points don't correspond to objects of interest"
    escalation: null
    lineage: { parent: packing, era: classical }

  - id: chernoff
    name: Chernoff bound
    constructor: pi
    claim: upper_bound
    domains: [probabilistic]
    works_when: "Sum of independent random variables; need exponential tail bound"
    kill_conditions:
      - "Variables not independent → try martingale (Azuma-Hoeffding)"
      - "Need exact distribution, not just tail"
      - "Variables not bounded → try sub-Gaussian bounds"
    escalation: null
    lineage: { parent: second_moment, era: modern, reason: "Second moment gives variance; Chernoff gives exponential tails" }

  - id: union_bound
    name: Union bound
    constructor: pi
    claim: upper_bound
    domains: [probabilistic]
    works_when: "P(∪A_i) ≤ ΣP(A_i); bound failure probability over many events"
    kill_conditions:
      - "Too many events (sum exceeds 1) → try lovasz_local_lemma"
      - "Events highly correlated (bound loose by factor of n)"
    escalation: lovasz_local_lemma
    lineage: { parent: null, era: classical }

  - id: expectation
    name: Expectation (first moment) method
    constructor: truncation
    claim: [existence, upper_bound]
    domains: [probabilistic]
    works_when: "E[X] > 0 implies X > 0 with positive probability"
    kill_conditions:
      - "E[X] < 1 (rare events)"
      - "Need concentration, not just existence → try second_moment"
    escalation: second_moment
    lineage: { parent: null, era: modern }

  - id: regularity_counting
    name: Regularity counting lemma
    constructor: pi
    claim: upper_bound
    domains: [combinatorial]
    works_when: "Count subgraphs in dense graphs via regular partition"
    kill_conditions:
      - "Graph is sparse (regularity needs density)"
      - "Need polynomial bounds (regularity gives tower-function)"
    escalation: fourier_on_groups
    lineage: { parent: regularity_lemma, era: modern }

  - id: fourier_on_groups
    name: Fourier analysis on groups
    constructor: pi
    claim: [upper_bound, existence]
    domains: [combinatorial, number_theoretic]
    works_when: "Detecting linear structure; large Fourier coefficients = structure"
    kill_conditions:
      - "Higher-order patterns (length 4+ APs) → need Gowers norms"
      - "Non-abelian group (characters don't form basis)"
    escalation: null
    lineage: { parent: regularity_counting, era: contemporary, reason: "Regularity bounds too weak for quantitative results" }

  # ���─ Lower bound ──

  - id: adversary
    name: Adversary argument
    constructor: sigma
    claim: lower_bound
    domains: [discrete]
    works_when: "Any algorithm can be forced into bad behavior by an adversary"
    kill_conditions:
      - "Adversary can't adapt to algorithm's choices (oblivious model)"
      - "Randomization defeats the adversary → try Yao's minimax"
    escalation: information_theoretic
    lineage: { parent: null, era: modern }

  - id: counting
    name: Counting lower bound
    constructor: sigma
    claim: lower_bound
    domains: [discrete]
    works_when: "Number of possible inputs exceeds number of distinguishable outputs"
    kill_conditions:
      - "Inputs aren't distinguishable (many map to same output)"
      - "Counting is loose"
    escalation: information_theoretic
    lineage: { parent: null, era: classical }

  - id: information_theoretic
    name: Information-theoretic lower bound
    constructor: pi
    claim: lower_bound
    domains: [discrete, probabilistic]
    works_when: "Processing can't create information; mutual information bounds"
    kill_conditions:
      - "Channel model doesn't match the problem"
      - "Bound is loose because problem has structure information theory ignores"
    escalation: reduction
    lineage: { parent: counting, era: modern, reason: "Counting is a special case of entropy" }

  - id: minimax
    name: Minimax / von Neumann
    constructor: sigma
    claim: lower_bound
    domains: [continuous]
    works_when: "Zero-sum game; min-max = max-min"
    kill_conditions:
      - "Game not zero-sum"
      - "Strategy spaces not compact/convex"
