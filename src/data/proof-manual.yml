      - Problem lacks the scaling structure needed to classify loss of compactness
    escalation: null
    lineage: { parent: weak_convergence, era: contemporary, reason: "Weak compactness extracts a limit, but concentration-compactness diagnoses why limits fail" }

  - id: monotone_convergence
