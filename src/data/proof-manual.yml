    works_when: Continuous map between oriented manifolds of same dimension; nonzero degree implies surjectivity
    kill_conditions:
      - "Dimensions don't match"
      - "Degree is zero (map might still be surjective, but degree gives nothing)"
      - Manifold not oriented
    escalation: lefschetz_fixed_point
    lineage: { parent: null, era: modern }

