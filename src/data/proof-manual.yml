    claim: [existence, construction]
    domains: [discrete, algebraic, continuous]
    works_when: Well-ordered set indexed by ordinals; inductive step handles successor and limit ordinals
    kill_conditions:
      - No natural well-ordering on the parameter space
      - "Limit ordinal step fails (accumulated construction doesn't converge)"
      - "Need an explicit finite bound, not just ordinal termination"
    escalation: zorns_lemma
    lineage: { parent: induction, era: modern, reason: Ordinary induction covers ω; transfinite covers all ordinals }

  - id: well_ordering
    name: Well-ordering argument (minimal counterexample)
    constructor: match
    claim: [existence, impossibility]
    domains: [discrete, number_theoretic]
    works_when: Assume counterexample exists; well-ordering gives minimal one; derive contradiction
    kill_conditions:
      - "Set not well-ordered (dense rationals, reals)"
      - "Minimal counterexample doesn't yield a strictly smaller one"
    escalation: transfinite_induction
    lineage: { parent: induction, era: classical, reason: Induction is constructive ascent; well-ordering is descent to minimum }

  - id: transfer_principle
    name: Transfer principle (model theory)
    constructor: pi
    claim: equivalence
    domains: [algebraic, continuous, number_theoretic]
    works_when: First-order statement true in one model transfers to elementarily equivalent model
    kill_conditions:
      - "Statement is not first-order (involves completeness, well-ordering, compactness)"
      - Models not elementarily equivalent
      - "Need quantitative bounds that don't transfer"
    escalation: ultraproducts
    lineage: { parent: null, era: modern, reason: "Łoś's theorem gives transfer for ultraproducts" }

  - id: ultraproducts
    name: Ultraproduct construction
    constructor: sigma
    claim: [existence, equivalence]
    domains: [algebraic, continuous]
    works_when: Need a single model capturing asymptotic behavior of a family of structures
    kill_conditions:
      - Property not preserved under ultraproducts (not first-order)
      - "Need explicit bounds, not asymptotic existence"
      - Ultrafilter choice makes result nonconstructive
    escalation: compactness
    lineage: { parent: transfer_principle, era: modern, reason: "Proves compactness theorem; builds models first-order logic can't construct directly" }

  - id: forcing
    name: Forcing (set theory)
    constructor: sigma
    claim: [impossibility, construction, existence]
    domains: [discrete, algebraic]
    works_when: Need to show a statement is independent of ZFC; build a model where it fails
    kill_conditions:
      - Statement is decidable in ZFC
      - Forcing conditions collapse cardinals you need preserved
      - Ground model already decides the statement
    escalation: null
    lineage: { parent: diagonalization, era: modern, reason: Diagonalization shows undecidability in computability; forcing shows independence in set theory }

  - id: lowenheim_skolem
    name: Löwenheim-Skolem
    constructor: sigma
    claim: [existence, impossibility]
    domains: [algebraic, discrete]
    works_when: First-order theory with infinite model; need model of different cardinality
    kill_conditions:
      - Need to preserve second-order properties (categoricity)
      - Need a specific cardinality the theory forbids
    escalation: ultraproducts
    lineage: { parent: compactness, era: modern, reason: Compactness gives models; Löwenheim-Skolem controls their size }

  - id: compactness_logic
    name: Compactness theorem (logic)
    constructor: truncation
    claim: existence
    domains: [discrete, algebraic]
    works_when: Every finite subset of a theory has a model; need a model of the whole theory
    kill_conditions:
      - "Theory is not first-order (second-order, infinitary logic)"
      - Need a model with specific properties not guaranteed by finite satisfiability
    escalation: ultraproducts
    lineage: { parent: null, era: modern, reason: Topological compactness analog in logic }


  # ── Analysis ──

  - id: sandwich_squeeze
    name: Squeeze theorem
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: Target quantity trapped between two others that converge to the same limit
    kill_conditions:
      - "Can't find tight upper and lower bounds that converge"
      - "Bounds don't converge to the same limit"
    escalation: dominated_convergence
    lineage: { parent: monotonicity, era: classical }

  - id: dominated_convergence
    name: Dominated convergence theorem
    constructor: pi
    claim: [equivalence, upper_bound]
    domains: [continuous]
    works_when: Pointwise convergent sequence of functions bounded by an integrable dominator
    kill_conditions:
      - No integrable dominator (sequence oscillates or grows without bound)
      - Convergence not pointwise (only in measure) — may still work via subsequence
      - "Need rate of convergence, not just limit interchange"
    escalation: null
    lineage: { parent: null, era: modern, reason: Justifies interchanging limit and integral }

  - id: maximum_principle
    name: Maximum principle
    constructor: pi
    claim: [upper_bound, uniqueness]
    domains: [continuous]
    works_when: "Solution to elliptic or parabolic PDE achieves extrema on the boundary, not interior"
    kill_conditions:
      - PDE not elliptic or parabolic (hyperbolic equations lack maximum principle)
      - Coefficients degenerate (equation loses ellipticity)
      - Domain unbounded without decay conditions
    escalation: barrier_function
    lineage: { parent: null, era: modern, reason: Fundamental for elliptic regularity }

  - id: barrier_function
    name: Barrier function method
    constructor: sigma
    claim: [upper_bound, existence]
    domains: [continuous]
    works_when: Construct a super/sub-solution that bounds the true solution via comparison principle
    kill_conditions:
      - "Can't construct a barrier (no explicit super/sub-solution)"
      - "Comparison principle fails (nonlinear coupling, systems)"
    escalation: energy_method
    lineage: { parent: maximum_principle, era: modern, reason: Maximum principle gives qualitative bound; barriers give quantitative }

  - id: energy_method
    name: Energy method
    constructor: pi
    claim: [upper_bound, existence, uniqueness]
    domains: [continuous]
    works_when: PDE has a conserved or dissipated energy functional; bound solutions via energy estimates
    kill_conditions:
      - No natural energy functional (non-variational PDE)
      - "Energy not coercive (doesn't control the norm you need)"
      - "Nonlinear terms can't be absorbed by energy dissipation"
    escalation: bootstrapping
    lineage: { parent: null, era: modern }

  - id: bootstrapping
    name: Bootstrapping (PDE regularity)
    constructor: match
    claim: [upper_bound, existence]
    domains: [continuous]
    works_when: Weak regularity implies slightly better regularity; iterate to optimal
    kill_conditions:
      - Regularity gain per step is zero (critical exponent)
      - "Bootstrap loop doesn't close (estimate requires more regularity than it produces)"
      - Need to cross a critical threshold where the method changes character
    escalation: null
    lineage: { parent: energy_method, era: modern, reason: Energy gives initial weak solution; bootstrapping upgrades regularity }

  - id: density_argument
    name: Density / approximation argument
    constructor: pi
    claim: [existence, equivalence, upper_bound]
    domains: [continuous, algebraic]
    works_when: "Prove for a dense subset (smooth functions, rationals, simple objects); extend by continuity"
    kill_conditions:
      - Property not preserved under limits
      - Extension map not continuous in the right topology
      - Dense subset is not actually dense in the required norm
    escalation: null
    lineage: { parent: null, era: modern }

  - id: approximation_argument
    name: Approximation argument (mollification / truncation)
    constructor: pi
    claim: [existence, upper_bound]
    domains: [continuous]
    works_when: Prove for regularized/truncated version; pass to limit
    kill_conditions:
      - Regularization destroys the key property
      - Estimates not uniform in the approximation parameter
      - "Limit object doesn't solve the original problem (solutions of approximating equations diverge)"
    escalation: compactness
    lineage: { parent: density_argument, era: modern, reason: Density extends from nice to general; approximation builds nice versions of the problem itself }

  - id: weak_convergence
    name: Weak convergence / compactness in function spaces
    constructor: truncation
    claim: existence
    domains: [continuous]
    works_when: Bounded sequence in reflexive Banach space; extract weakly convergent subsequence
    kill_conditions:
      - "Space not reflexive (L^1, L^∞)"
      - Nonlinear operations not weakly continuous (need compensated compactness or concentration-compactness)
      - Need strong convergence for the limit to inherit the property
    escalation: null
    lineage: { parent: compactness, era: modern, reason: Compactness in finite dimensions; weak compactness in infinite dimensions }

  - id: sobolev_embedding
    name: Sobolev embedding / interpolation
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: "Control stronger norm (pointwise, Hölder) by weaker norm (Sobolev) when dimension allows"
    kill_conditions:
      - Critical or supercritical exponent (embedding fails at the endpoint)
      - Domain lacks regularity (Lipschitz boundary needed)
      - Need the non-compact embedding (limiting case requires concentration arguments)
    escalation: null
    lineage: { parent: cauchy_schwarz, era: modern, reason: Cauchy-Schwarz bounds one integral; Sobolev relates norms across function spaces }

  - id: interpolation_spaces
    name: Interpolation of operators
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: Operator bounded on two endpoint spaces; need bounds on intermediate spaces
    kill_conditions:
      - Endpoint bounds unavailable or too weak
      - Operator not compatible with the interpolation functor (sublinear but not linear)
      - "Need sharp constants, not just boundedness"
    escalation: null
    lineage: { parent: sobolev_embedding, era: modern, reason: Riesz-Thorin and Marcinkiewicz handle operator norms between spaces }

  - id: littlewood_paley
    name: Littlewood-Paley decomposition
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: "Decompose function by frequency scale; estimate each piece separately, sum via square function"
    kill_conditions:
      - "Function has no natural frequency structure (discrete, algebraic)"
      - "Need sharp endpoint estimates where Littlewood-Paley theory fails (L^1, L^∞)"
      - Interactions between frequency scales dominate (need paraproduct analysis)
    escalation: null
    lineage: { parent: fourier_on_groups, era: modern, reason: Fourier gives global frequency info; Littlewood-Paley localizes by scale }

  - id: calderon_zygmund
    name: Calderón-Zygmund theory
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: Singular integral operator; need L^p bounds (1 < p < ∞)
    kill_conditions:
      - Kernel not of Calderón-Zygmund type (no size + smoothness estimates)
      - "Need L^1 or L^∞ bounds (only weak (1,1) available)"
      - Non-translation-invariant operator on non-homogeneous space
    escalation: littlewood_paley
    lineage: { parent: null, era: modern }

  - id: contour_integration
    name: Contour integration / residue calculus
    constructor: sigma
    claim: [upper_bound, existence, equivalence]
    domains: [continuous, number_theoretic]
    works_when: Integral along real line equals sum of residues in a contour; evaluate intractable integrals
    kill_conditions:
