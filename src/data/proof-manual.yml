      - "Can't close the contour (integrand doesn't decay on arcs)"
      - "Need real-variable bounds, not exact evaluation"
    escalation: null
    lineage: { parent: null, era: early_modern, reason: "Cauchy's residue theorem" }

  - id: analytic_continuation
    name: Analytic continuation
    constructor: sigma
    claim: [existence, equivalence]
    domains: [continuous, number_theoretic]
    works_when: Function defined on subdomain; unique extension to larger domain if holomorphic
    kill_conditions:
      - Natural boundary (function has singularities dense on the boundary of convergence)
      - Function not holomorphic on the subdomain
      - Multiple extensions possible (function not single-valued on the larger domain)
    escalation: null
    lineage: { parent: contour_integration, era: early_modern }

  - id: harnack_inequality
    name: Harnack inequality
    constructor: pi
    claim: upper_bound
    domains: [continuous]
    works_when: Nonnegative solution to elliptic PDE; pointwise values comparable across compact subdomain
    kill_conditions:
      - Solution changes sign
      - PDE not uniformly elliptic (degenerate coefficients)
      - Domain not connected
    escalation: maximum_principle
