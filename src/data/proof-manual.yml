    name: Lefschetz hyperplane theorem
    constructor: pi
    claim: equivalence
    domains: [geometric, algebraic]
    works_when: Smooth projective variety; homology of hyperplane section determines homology up to middle dimension
    kill_conditions:
      - Variety singular
      - Need middle-dimensional homology (exactly where Lefschetz says nothing)
      - Working with non-ample divisor
    escalation: null
    lineage: { parent: mayer_vietoris, era: modern, reason: Hyperplane section as a topological decomposition }

  - id: sard
    name: "Sard's theorem (generic transversality)"
    constructor: truncation
    claim: existence
    domains: [continuous, geometric]
    works_when: Smooth map; almost every value is a regular value (critical values have measure zero)
    kill_conditions:
      - Map not smooth enough (C^k with k too small)
      - "Need specific regular value, not generic"
      - "Finite-dimensional Sard doesn't apply in infinite dimensions (need Smale-Sard)"
    escalation: null
    lineage: { parent: null, era: modern }


  # ── Number theory ──

  - id: quadratic_reciprocity
    name: Quadratic reciprocity (and higher reciprocity)
    constructor: pi
    claim: equivalence
    domains: [number_theoretic]
    works_when: "Determine solvability of x² ≡ a mod p from arithmetic of p and a"
    kill_conditions:
      - Higher-degree congruences (need Artin reciprocity or class field theory)
      - Composite modulus (need CRT first)
    escalation: class_field_theory
    lineage: { parent: reciprocity, era: early_modern }

  - id: dirichlet_series
    name: Dirichlet series / L-functions
    constructor: pi
    claim: [existence, upper_bound, lower_bound]
    domains: [number_theoretic]
    works_when: "Arithmetic function encoded as Σ a(n)n^{-s}; analytic properties (poles, zeros, functional equation) give number-theoretic information"
    kill_conditions:
      - Analytic continuation not available (only converges in half-plane)
      - Zeros not well-understood (GRH needed but unproven)
      - Function not multiplicative (no Euler product)
    escalation: circle_method
    lineage: { parent: analytic_continuation, era: modern }

  - id: large_sieve
    name: Large sieve inequality
    constructor: pi
    claim: upper_bound
    domains: [number_theoretic]
    works_when: Exponential sum or character sum over well-spaced points; duality gives L² bound
    kill_conditions:
      - Points not well-spaced
      - "Need pointwise bound, not L² average"
    escalation: sieve
    lineage: { parent: sieve, era: modern, reason: Sieve gives combinatorial bounds; large sieve gives analytic bounds via duality }


  # ── Probability ──

  - id: martingale
    name: "Martingale methods (Azuma-Hoeffding, optional stopping)"
    constructor: pi
    claim: [upper_bound, lower_bound, existence]
    domains: [probabilistic]
    works_when: Adapted sequence with bounded differences; concentration around expectation
    kill_conditions:
      - Differences not bounded (heavy tails)
      - Filtration not natural (hard to express quantity as a martingale)
      - "Need stronger than Gaussian tails → try Talagrand"
    escalation: talagrand
    lineage: { parent: chernoff, era: modern, reason: Chernoff needs independence; martingale handles dependent sequences }

  - id: talagrand
    name: Talagrand concentration inequality
    constructor: pi
    claim: upper_bound
    domains: [probabilistic]
    works_when: Function of independent variables that is Lipschitz or convex; exponential concentration around median
    kill_conditions:
      - Function not Lipschitz (certification via witnesses needed)
      - Variables not independent
      - "Need concentration around mean, not median (may differ)"
    escalation: null
    lineage: { parent: martingale, era: contemporary, reason: Martingale handles bounded differences; Talagrand handles convex Lipschitz }

  - id: mcdiarmid
    name: "McDiarmid's inequality (bounded differences)"
    constructor: pi
    claim: upper_bound
    domains: [probabilistic]
    works_when: "Function of independent variables where changing one variable changes function by ≤ c_i"
    kill_conditions:
      - Variables not independent
      - Bounded difference condition fails (one variable can swing the function)
      - Need sub-Gaussian rate but differences are loose
    escalation: martingale
    lineage: { parent: chernoff, era: modern, reason: Chernoff handles sums; McDiarmid handles general functions of independent variables }

  - id: large_deviations
    name: "Large deviations (Cramér, Sanov)"
    constructor: pi
    claim: [upper_bound, lower_bound]
    domains: [probabilistic]
    works_when: Probability of rare event decays exponentially; rate function is Legendre transform of log-MGF
    kill_conditions:
      - "Moment generating function doesn't exist (heavy-tailed distribution)"
      - "Need exact probability, not just exponential rate"
      - Variables not i.i.d. (need Gärtner-Ellis extension)
    escalation: null
    lineage: { parent: chernoff, era: modern, reason: Chernoff gives one-sided bounds; large deviations give the sharp exponential rate }

  - id: steins_method
    name: "Stein's method"
    constructor: pi
    claim: upper_bound
    domains: [probabilistic]
    works_when: "Approximate distribution by a reference (Gaussian, Poisson); bound total variation or Wasserstein distance"
    kill_conditions:
      - No natural reference distribution
      - Stein equation for the reference distribution too hard to solve
      - "Need convergence rate, but dependency structure makes Stein coupling intractable"
    escalation: null
    lineage: { parent: null, era: modern, reason: "CLT gives limit; Stein's method gives quantitative error bounds" }

  - id: stopping_time
    name: Stopping time / optional stopping
    constructor: sigma
    claim: [existence, upper_bound]
    domains: [probabilistic]
    works_when: Martingale stopped at a random time; optional stopping theorem constrains expected value
    kill_conditions:
      - Stopping time not integrable (unbounded expected waiting time)
      - Martingale not uniformly integrable at the stopping time
    escalation: martingale
    lineage: { parent: martingale, era: modern }

  - id: fkg_inequality
    name: FKG inequality (correlation inequalities)
    constructor: pi
    claim: [upper_bound, lower_bound]
    domains: [probabilistic, combinatorial]
    works_when: Monotone events on a distributive lattice; positively correlated
    kill_conditions:
      - Events not monotone
      - Measure not log-supermodular (FKG condition fails)
      - Need negative correlation (use BK inequality instead)
    escalation: null
    lineage: { parent: null, era: modern }


  # ── Combinatorics ──

  - id: inclusion_exclusion
    name: Inclusion-exclusion principle
    constructor: sigma
    claim: [upper_bound, lower_bound, existence]
    domains: [discrete, combinatorial, probabilistic]
    works_when: Count elements in union/intersection of sets via alternating sum
    kill_conditions:
      - "Too many sets (2^n terms; alternating sum doesn't converge fast)"
      - Intersection sizes hard to compute
      - Cancellation makes the bound loose (partial inclusion-exclusion needed)
    escalation: mobius_inversion
    lineage: { parent: double_counting, era: classical }

  - id: mobius_inversion
    name: Möbius inversion
    constructor: sigma
    claim: equivalence
    domains: [combinatorial, number_theoretic]
    works_when: Poset with Möbius function; invert a sum over the poset to recover individual terms
    kill_conditions:
      - Poset has no tractable Möbius function
      - "Sum is over a structure that isn't a poset"
    escalation: generating_function_identity
    lineage: { parent: inclusion_exclusion, era: modern, reason: Inclusion-exclusion is Möbius inversion on the Boolean lattice }

  - id: charging_discharging
    name: Charging-discharging
    constructor: pi
    claim: [existence, upper_bound]
    domains: [discrete, combinatorial]
    works_when: Assign charges to elements; redistribute (discharge) to create contradiction with assumed structure
    kill_conditions:
      - "Discharging rules don't balance (total charge changes)"
      - Too many cases in discharging (hundreds of rules; see four-color theorem)
      - "Graph not planar or doesn't have the degree constraints needed"
    escalation: null
    lineage: { parent: double_counting, era: modern, reason: Double counting is global; charging-discharging is local redistribution }

  - id: deletion_method
    name: Deletion method (alteration)
    constructor: sigma
    claim: [existence, construction]
    domains: [combinatorial, probabilistic]
    works_when: Random object almost has the property; delete a small fraction to fix it
    kill_conditions:
      - Deletions cascade (fixing one violation creates others)
      - "Can't bound the number of deletions"
    escalation: lovasz_local_lemma
    lineage: { parent: probabilistic_method, era: modern, reason: Probabilistic method gives existence; deletion makes it constructive by removing defects }

  - id: container_method
    name: Container method (Balogh-Morris-Samotij / Saxton-Thomason)
    constructor: pi
    claim: upper_bound
    domains: [combinatorial]
    works_when: Hypergraph is uniform and has bounded codegrees; independent sets are contained in few small containers
    kill_conditions:
      - Codegree condition fails (too many correlated edges)
      - "Need lower bound on independent sets, not upper"
      - Hypergraph not uniform
    escalation: null
    lineage: { parent: regularity_lemma, era: contemporary, reason: Regularity handles dense graphs; containers handle sparse hypergraphs }

  - id: dependent_random_choice
    name: Dependent random choice
    constructor: sigma
    claim: [existence, lower_bound]
    domains: [combinatorial]
    works_when: Dense bipartite graph; random vertex subset with many common neighbors
    kill_conditions:
      - Graph not dense enough
      - "Need independent set, not common-neighbor set"
    escalation: regularity_lemma
    lineage: { parent: probabilistic_method, era: contemporary, reason: Simpler than regularity for Ramsey-type problems in dense graphs }

  - id: flag_algebras
    name: Flag algebras (Razborov)
    constructor: pi
    claim: [upper_bound, lower_bound]
    domains: [combinatorial]
    works_when: Extremal graph/hypergraph problem; express as semidefinite program over flag densities
    kill_conditions:
      - Problem not expressible in terms of subgraph densities
      - SDP relaxation has a gap (need exact solution but only get approximate)
      - "Stability/uniqueness needs separate argument (flag algebras give bounds, not structure)"
    escalation: null
    lineage: { parent: regularity_counting, era: contemporary, reason: Regularity gives qualitative structure; flag algebras give computer-verified quantitative bounds }

  - id: transfer_matrix
    name: Transfer matrix method
    constructor: sigma
    claim: [upper_bound, construction, equivalence]
    domains: [combinatorial, discrete]
    works_when: Count paths of length n in a graph; answer = entry of A^n where A is adjacency/transfer matrix
    kill_conditions:
      - State space too large (matrix is exponential in natural parameters)
      - No natural row-by-row decomposition of the combinatorial structure
      - "Need exact count, but characteristic polynomial is intractable"
    escalation: spectral
    lineage: { parent: generating_function_identity, era: modern, reason: Generating function encoded as matrix power }

  - id: lgv_lemma
    name: Lindström-Gessel-Viennot lemma
    constructor: sigma
    claim: equivalence
    domains: [combinatorial]
    works_when: Count non-intersecting lattice paths; equals determinant of path-count matrix
    kill_conditions:
      - Paths must be allowed to intersect (non-crossing condition not natural)
      - Graph is not acyclic (LGV requires DAG)
    escalation: bijection
    lineage: { parent: transfer_matrix, era: modern, reason: Transfer matrix counts all paths; LGV counts non-intersecting tuples via determinant }

  - id: wz_method
    name: Wilf-Zeilberger method
    constructor: sigma
    claim: equivalence
    domains: [combinatorial]
    works_when: Hypergeometric sum identity; algorithmic certificate proves telescoping
    kill_conditions:
      - Summand not hypergeometric
      - Multi-sum where creative telescoping is intractable
    escalation: generating_function_identity
    lineage: { parent: generating_function_identity, era: contemporary, reason: Generating function identity by algorithmic proof }

  - id: symmetric_functions
    name: "Symmetric function techniques (Schur, Hall-Littlewood)"
    constructor: sigma
    claim: [equivalence, upper_bound, existence]
    domains: [combinatorial, algebraic]
    works_when: "Problem has symmetric group action; expand in Schur basis, use Littlewood-Richardson rule"
    kill_conditions:
      - No natural symmetric group action
      - Need non-symmetric invariants
      - Schur expansion has too many terms to control
    escalation: character_theory
    lineage: { parent: generating_function_identity, era: modern }

  - id: sunflower_lemma
    name: Sunflower lemma (Erdős-Ko-Rado family)
    constructor: sigma
    claim: existence
    domains: [combinatorial]
    works_when: Large family of sets of bounded size contains a sunflower (sets pairwise sharing the same core)
    kill_conditions:
      - Sets not of bounded size
      - "Need specific core structure sunflower lemma doesn't guarantee"
    escalation: container_method
    lineage: { parent: pigeonhole, era: modern, reason: Pigeonhole finds one collision; sunflower finds structured family of collisions }

  - id: four_functions
    name: Four functions theorem (Ahlswede-Daykin)
    constructor: pi
    claim: upper_bound
    domains: [combinatorial, probabilistic]
    works_when: Lattice with four functions satisfying multiplicative inequality; implies correlation inequalities
    kill_conditions:
      - "Functions don't satisfy the four-function condition"
      - Lattice not distributive
    escalation: fkg_inequality
    lineage: { parent: fkg_inequality, era: modern, reason: Generalization of FKG and Holley inequalities }


  # ── Discrete ──

  - id: amortized_analysis
    name: Amortized analysis (potential method variant)
    constructor: pi
    claim: upper_bound
    domains: [discrete]
    works_when: Worst-case per-operation cost is high but average over sequence is low; potential function tracks credit
    kill_conditions:
      - No natural potential function
      - "Operations don't have amortized savings (each truly costs its worst case)"
    escalation: potential_method
    lineage: { parent: potential_method, era: modern }

  - id: communication_complexity
    name: Communication complexity lower bound
    constructor: pi
    claim: lower_bound
    domains: [discrete]
    works_when: "Two-party computation; bits communicated ≥ information content of output"
    kill_conditions:
      - Problem has low communication complexity (structured input)
      - Randomized/nondeterministic models weaken the bound
      - "Need computational, not communication, lower bound"
    escalation: information_theoretic
    lineage: { parent: information_theoretic, era: modern, reason: Information theory bounds channel capacity; communication complexity bounds protocol bits }

  - id: pigeonhole_infinite
    name: "Infinite pigeonhole (Ramsey for pairs / König's lemma)"
    constructor: truncation
    claim: existence
    domains: [discrete]
    works_when: Infinite set mapped to finite set of colors; infinite monochromatic subset exists
    kill_conditions:
      - Need explicit infinite subset (nonconstructive in general)
      - "Colors not finite (uncountable partition → need Ramsey on uncountable cardinals)"
    escalation: ramsey
    lineage: { parent: pigeonhole, era: classical, reason: Pigeonhole for finite; König/infinite pigeonhole for infinite }


  # ── Cross-cutting ──

  - id: probabilistic_polynomial
    name: Polynomial method (combinatorial nullstellensatz variant)
    constructor: pi
    claim: [existence, lower_bound, impossibility]
    domains: [combinatorial, algebraic]
    works_when: Encode combinatorial problem as polynomial; nonvanishing coefficient implies existence
    kill_conditions:
      - No natural polynomial encoding
      - Coefficient vanishes (method gives nothing)
      - Degree too high for the grid size
    escalation: polynomial_method
    lineage: { parent: polynomial_method, era: contemporary, reason: Polynomial method uses degree; combinatorial nullstellensatz uses coefficient }

  - id: weight_function
    name: Weight / potential function argument
    constructor: pi
    claim: [upper_bound, lower_bound, existence]
    domains: [discrete, continuous, combinatorial]
    works_when: Assign weights to elements; total weight is invariant or monotone; derive bound
    kill_conditions:
      - No natural weighting (all weight functions give trivial bounds)
      - Weight function has the same complexity as the original problem
    escalation: potential_method
    lineage: { parent: double_counting, era: classical }

  - id: fixed_point_schauder
    name: Schauder fixed point theorem
    constructor: truncation
    claim: existence
    domains: [continuous]
    works_when: Continuous map on compact convex subset of locally convex topological vector space
    kill_conditions:
      - Map not compact (image not precompact)
      - Domain not convex
      - Need uniqueness (Schauder only gives existence)
    escalation: banach_contraction
    lineage: { parent: brouwer_fixed_point, era: modern, reason: Brouwer is finite-dimensional; Schauder extends to infinite dimensions }

  - id: fixed_point_tarski
    name: Tarski / Knaster-Tarski fixed point theorem
    constructor: sigma
    claim: existence
    domains: [discrete, algebraic]
    works_when: Monotone function on a complete lattice has a fixed point
    kill_conditions:
      - Function not monotone
      - Domain not a complete lattice
      - Need least fixed point but can only find some fixed point
    escalation: zorns_lemma
    lineage: { parent: null, era: modern, reason: Order-theoretic fixed point; no continuity or contraction needed }

  - id: game_tree_evaluation
    name: Strategy stealing argument
    constructor: pi
    claim: [existence, impossibility]
    domains: [discrete, combinatorial]
    works_when: "Two-player game; if second player had a winning strategy, first player could steal it by making a free first move"
    kill_conditions:
      - "Extra move is not always advantageous (Go with komi, Hex with swap rule)"
      - Game not determined (infinite games without Axiom of Determinacy)
      - "Need explicit strategy, not just existence"
    escalation: null
    lineage: { parent: adversary, era: modern }

# Symmetry mismatch — the silent killer
symmetry_mismatches:
  - assumed: undirected
    actual: directed
    kills: [union_find, spanning_trees]
  - assumed: transitive
    actual: non_transitive
    kills: [reachability_composition, route_announcements]
  - assumed: time_independent
    actual: time_dependent
    kills: [static_data_structures, single_reachability_matrix]
  - assumed: commutative
    actual: non_commutative
    kills: [abelian_group_tools, fourier_on_groups]
  - assumed: local
    actual: global
    kills: [heuristics, distributed_without_communication]
  - assumed: linear
    actual: nonlinear
    kills: [superposition, spectral]

# Escalation ladders — multiple chains, not just one
escalation_ladders:
  - name: construction
    chain: [greedy, potential_method, game_equilibrium]
  - name: existence_probabilistic
    chain: [expectation, second_moment, lovasz_local_lemma, derandomization]
  - name: impossibility
    chain: [parity, invariant, cohomological_obstruction]
  - name: lower_bound_discrete
    chain: [counting, information_theoretic, reduction]
  - name: lower_bound_geometric
    chain: [packing, covering, isoperimetric, kruskal_katona]
  - name: upper_bound_probabilistic
    chain: [union_bound, chernoff]
  - name: embedding
    chain: [direct_construction, embed_solve_pullback]
  - name: analysis_pde
    chain: [energy_method, bootstrapping]
  - name: analysis_convergence
    chain: [monotone_convergence, dominated_convergence]
  - name: analysis_pde_bounds
    chain: [maximum_principle, barrier_function, energy_method]
  - name: probability_concentration
    chain: [chernoff, martingale, talagrand]
  - name: probability_methods
    chain: [mcdiarmid, martingale, large_deviations]
  - name: logic_foundations
    chain: [induction, transfinite_induction, zorns_lemma]
  - name: topology_homology
    chain: [mayer_vietoris, long_exact_sequence, spectral_sequence]
  - name: fixed_point
    chain: [brouwer_fixed_point, fixed_point_schauder, banach_contraction]
  - name: combinatorics_enumeration
    chain: [burnside_lemma, polya_enumeration, generating_function_identity]
  - name: number_theory_analytic
    chain: [dirichlet_series, circle_method, large_sieve, sieve]
  - name: algebra_local
    chain: [localization, noether_normalization, grobner_basis]
  - name: combinatorics_counting
    chain: [inclusion_exclusion, mobius_inversion, generating_function_identity]
  - name: geometry_curvature
    chain: [gauss_bonnet, comparison_theorem, characteristic_classes]
  - name: existence_fixed_point
    chain: [fixed_point_tarski, brouwer_fixed_point, fixed_point_schauder, banach_contraction]
  - name: impossibility_topological
    chain: [degree_theory, lefschetz_fixed_point, cohomological_obstruction]
